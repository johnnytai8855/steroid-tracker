        <p style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>mg ↔ mL 換算（輸入需要的 mg 和藥物濃度）</p>
        <div className="calc-row">
          <input className="calc-input" type="number" inputMode="decimal" placeholder="需要 mg"
            value={calcMg} onChange={e => setCalcMg(e.target.value)} />
          <span style={{color:'var(--text2)',fontSize:'0.85em'}}>mg ÷</span>
          <input className="calc-input" type="number" inputMode="decimal" placeholder="濃度 mg/mL"
            value={calcConc} onChange={e => setCalcConc(e.target.value)} />
          <span style={{color:'var(--text2)',fontSize:'0.85em'}}>mg/mL</span>
        </div>
        {calcMg && calcConc && parseFloat(calcConc) > 0 && (
          <div className="calc-result">
            = {(parseFloat(calcMg) / parseFloat(calcConc)).toFixed(2)} mL
            <span style={{fontSize:'0.6em',color:'var(--text2)',display:'block',marginTop:2}}>
              ({parseFloat(calcMg)}mg ÷ {parseFloat(calcConc)}mg/mL)
            </span>
          </div>
        )}
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:8}}>
          {[100, 200, 250, 300].map(c => (
            <button key={c} onClick={() => setCalcConc(String(c))}
              style={{background: calcConc === String(c) ? 'var(--blue)' : 'var(--card2)',border:'1px solid var(--border)',borderRadius:12,padding:'4px 10px',color: calcConc === String(c) ? '#fff' : 'var(--text2)',fontSize:'0.72em',cursor:'pointer'}}>
              {c} mg/mL
            </button>
          ))}
        </div>
      </div>

      {/* Vial Inventory */}
      <div className="card">
        <h3>📦 藥品庫存</h3>
        <button className="action-btn" style={{marginBottom:10}} onClick={() => setShowInventory(!showInventory)}>
          {showInventory ? '收起庫存管理' : '管理藥品庫存'}
        </button>
        {/* Quick alerts for low stock */}
        {DRUGS.filter(d => {
          const r = calcVialRemaining(d.key, inventory, data);
          return r && (r.isLow || r.isEmpty);
        }).map(d => {
          const r = calcVialRemaining(d.key, inventory, data);
          return (
            <div key={d.key} style={{background: r.isEmpty ? 'rgba(184,92,92,0.12)' : 'rgba(196,149,106,0.12)',border:`1px solid ${r.isEmpty ? 'var(--red)' : 'var(--orange)'}`,borderRadius:8,padding:'6px 10px',marginBottom:6,fontSize:'0.78em'}}>
              {r.isEmpty ? '🚨' : '⚠️'} {d.label}：剩餘 {r.remaining.toFixed(1)} {d.unit}
              {r.daysLeft !== null && ` — 預估還能用 ${r.daysLeft} 天`}
            </div>
          );
        })}
        {showInventory && (
          <div>
            {DRUGS.filter(d => d.conc || Object.values(data).some(e => (e.drugs?.[d.key]||0) > 0)).map(d => {
              const inv = inventory[d.key] || {};
              const remaining = calcVialRemaining(d.key, inventory, data);
              return (
                <div key={d.key} style={{marginBottom:10,padding:8,background:'var(--card2)',borderRadius:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{color: d.color,fontSize:'0.85em',fontWeight:600}}>{d.label}</span>
                    {remaining && <span style={{fontSize:'0.72em',color: remaining.isLow ? 'var(--orange)' : 'var(--green)'}}>
                      剩 {remaining.remaining.toFixed(1)} {d.unit} {remaining.daysLeft ? `(~${remaining.daysLeft}天)` : ''}
                    </span>}
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input className="drug-input" type="number" step="any" placeholder={`總量 (${d.unit})`}
                      value={inv.totalAmount || ''} style={{flex:1,fontSize:'0.82em',padding:'6px 8px'}}
                      onChange={e => saveInv({...inventory, [d.key]: {...inv, totalAmount: parseFloat(e.target.value) || 0}})} />
                    <input type="date" value={inv.openDate || ''} style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px',color:'var(--text)',fontSize:'0.75em'}}
                      onChange={e => saveInv({...inventory, [d.key]: {...inv, openDate: e.target.value}})} />
                  </div>
                  {remaining && remaining.totalAmount > 0 && (
                    <div className="inv-bar">
                      <div className="inv-fill" style={{width:`${Math.max(0,Math.min(100, remaining.remaining / remaining.totalAmount * 100))}%`,background: remaining.isLow ? 'var(--orange)' : 'var(--green)'}} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Blood Work Trends */}
      {bloodWork.length >= 2 && (
        <div className="card">
          <h3>📈 驗血趨勢圖</h3>
          <p style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>追蹤關鍵指標隨時間的變化趨勢（點擊圖例可顯示/隱藏）</p>
          <div className="chart-container" style={{height:320}}><canvas ref={bloodChartRef}></canvas></div>

          {/* Critical alerts from latest blood work */}
          {(() => {
            const latest = bloodWork[bloodWork.length - 1];
            const prev = bloodWork.length >= 2 ? bloodWork[bloodWork.length - 2] : null;
            const alerts = [];
            BLOOD_MARKERS.forEach(m => {
              const val = Number(latest[m.key]);
              if (isNaN(val) || latest[m.key] === '' || latest[m.key] === undefined) return;
              if (val <= m.critical_low) alerts.push({ marker: m, val, status: 'critical_low', icon: '🔴', text: `${m.label} ${val} ${m.unit} — 嚴重偏低（參考 ${m.low}-${m.high}）` });
              else if (val >= m.critical_high) alerts.push({ marker: m, val, status: 'critical_high', icon: '🔴', text: `${m.label} ${val} ${m.unit} — 嚴重偏高（參考 ${m.low}-${m.high}）` });
              else if (val < m.low) alerts.push({ marker: m, val, status: 'low', icon: '🟡', text: `${m.label} ${val} ${m.unit} — 偏低（參考 ${m.low}-${m.high}）` });
              else if (val > m.high) alerts.push({ marker: m, val, status: 'high', icon: '🟡', text: `${m.label} ${val} ${m.unit} — 偏高（參考 ${m.low}-${m.high}）` });
              // Check trend vs previous
              if (prev && prev[m.key] !== undefined && prev[m.key] !== '') {
                const prevVal = Number(prev[m.key]);
                const change = val - prevVal;
                const pctChange = prevVal !== 0 ? (change / prevVal * 100) : 0;
                if (Math.abs(pctChange) > 20) {
                  alerts.push({ marker: m, val, status: 'trend', icon: pctChange > 0 ? '📈' : '📉', text: `${m.label} ${pctChange > 0 ? '上升' : '下降'} ${Math.abs(pctChange).toFixed(0)}%（${prevVal} → ${val} ${m.unit}）` });
                }
              }
            });
            if (!alerts.length) return <div style={{background:'rgba(122,158,142,0.12)',borderRadius:8,padding:10,fontSize:'0.82em',color:'var(--green)',marginTop:8}}>✅ 最新報告 ({latest.date}) 所有數值正常範圍內</div>;
            return (
              <div style={{marginTop:8}}>
                <div style={{fontSize:'0.85em',fontWeight:600,color:'var(--red)',marginBottom:6}}>⚠️ 最新報告 ({latest.date}) 注意事項：</div>
                {alerts.map((a, i) => (
                  <div key={i} style={{fontSize:'0.82em',padding:'4px 8px',marginBottom:3,borderRadius:6,background: a.status.includes('critical') ? 'rgba(184,92,92,0.12)' : a.status === 'trend' ? 'rgba(107,127,153,0.08)' : 'rgba(196,149,106,0.12)',color: a.status.includes('critical') ? 'var(--red)' : a.status === 'trend' ? 'var(--blue)' : 'var(--orange)'}}>
                    {a.icon} {a.text}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}

      {/* Blood Work with Alert Thresholds */}
      <div className="card">
        <h3>🩸 血液報告</h3>
        <button className="action-btn" style={{marginBottom:10}} onClick={() => setShowBloodForm(!showBloodForm)}>
          {showBloodForm ? '收起' : '+ 新增血液報告'}
        </button>
        {showBloodForm && (
          <div style={{marginBottom:12}}>
            <div className="blood-field" style={{marginBottom:8}}>
              <label style={{fontSize:'0.78em',color:'var(--text2)'}}>日期</label>
              <input type="date" value={bloodForm.date} onChange={e => setBloodForm(f => ({...f, date: e.target.value}))}
                style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px',color:'var(--text)',fontSize:'0.9em'}} />
            </div>
            {BLOOD_MARKER_GROUPS.map(g => {
              const groupMarkers = BLOOD_MARKERS.filter(m => m.group === g.key);
              if (!groupMarkers.length) return null;
              return (
                <div key={g.key} style={{marginBottom:10}}>
                  <div style={{fontSize:'0.82em',fontWeight:600,color:'var(--blue)',padding:'6px 0',borderBottom:'1px solid var(--border)',marginBottom:6}}>{g.label}</div>
                  {groupMarkers.map(m => {
                    const status = getMarkerStatus(m, bloodForm[m.key]);
                    return (
                      <div className="marker-row" key={m.key}>
                        <div className="marker-label">
                          <span style={{color: m.color}}>{m.label}</span>
                          <div className="marker-range">{m.low}-{m.high} {m.unit}</div>
                        </div>
                        <div className="marker-value">
                          <input type="number" inputMode="decimal" placeholder={m.unit}
                            value={bloodForm[m.key] || ''}
                            onChange={e => setBloodForm(f => ({...f, [m.key]: e.target.value}))} />
                        </div>
                        {status && (
                          <span className="marker-status" style={{background: `${status.color}22`, color: status.color}}>
                            {status.label}
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            <textarea className="note-input" style={{marginTop:8,minHeight:40}} placeholder="備註（用藥狀態、空腹、時間等）"
              value={bloodForm.note} onChange={e => setBloodForm(f => ({...f, note: e.target.value}))} />
            <button className="save-btn" style={{marginTop:8}} onClick={addBloodWork}>儲存血液報告</button>
          </div>
        )}

        {bloodWork.length > 0 ? (
          <div>
            {bloodWork.slice().reverse().map((bw, i) => {
              const pkLevel = calcPKLevels(data, 30).find(l => l.date === bw.date);
              const alerts = BLOOD_MARKERS.filter(m => {
                const s = getMarkerStatus(m, bw[m.key]);
                return s && (s.status === 'critical_high' || s.status === 'critical_low');
              });
              return (
                <div key={i} style={{background:'var(--card2)',borderRadius:8,padding:10,marginBottom:8,borderLeft: alerts.length ? '3px solid var(--red)' : '3px solid var(--green)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <b style={{color:'var(--blue)',fontSize:'0.9em'}}>{bw.date}</b>
                    <button style={{background:'none',border:'none',color:'var(--red)',fontSize:'0.8em',cursor:'pointer'}}
                      onClick={() => saveBloodWork(bloodWork.filter(b => b.date !== bw.date))}>刪除</button>
                  </div>
                  {alerts.length > 0 && (
                    <div style={{background:'rgba(184,92,92,0.12)',borderRadius:6,padding:6,marginBottom:6,fontSize:'0.75em',color:'var(--red)'}}>
                      ⚠️ 異常項目：{alerts.map(m => `${m.label} ${bw[m.key]}${m.unit}`).join('、')}
                    </div>
                  )}
                  <div style={{fontSize:'0.78em'}}>
                    {BLOOD_MARKER_GROUPS.map(g => {
                      const gm = BLOOD_MARKERS.filter(m => m.group === g.key && bw[m.key] !== undefined && bw[m.key] !== '' && bw[m.key] !== null);
                      if (!gm.length) return null;
                      return (
                        <div key={g.key} style={{marginBottom:4}}>
                          <div style={{fontSize:'0.72em',color:'var(--blue)',fontWeight:600,padding:'3px 0'}}>{g.label}</div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2}}>
                            {gm.map(m => {
                              const s = getMarkerStatus(m, bw[m.key]);
                              return (
                                <div key={m.key} style={{display:'flex',justifyContent:'space-between',padding:'1px 0'}}>
                                  <span style={{color:'var(--text2)'}}>{m.label}</span>
                                  <span style={{color: s?.color || 'var(--text)', fontWeight: s?.status?.includes('critical') ? 700 : 400}}>
                                    {bw[m.key]} {m.unit}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {pkLevel && pkLevel.totalT > 0 && (
                    <div style={{fontSize:'0.72em',color:'var(--purple)',marginTop:4}}>
                      💉 抽血當日預估活性 T: {pkLevel.totalT}mg | E2 指數: {pkLevel.e2.toFixed(1)}
                    </div>
                  )}
                  {bw.note && <div style={{fontSize:'0.72em',color:'var(--text2)',marginTop:2}}>📝 {bw.note}</div>}
                </div>
              );
            })}
          </div>
        ) : (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>尚無血液報告。定期抽血追蹤 HCT、PSA、肝指數等安全指標。</p>
        )}
      </div>

      {/* Cycle/Protocol Management */}
      <div className="card">
        <h3>📋 Cycle / 療程管理</h3>
        <button className="action-btn" style={{marginBottom:10}} onClick={() => setShowProtocolForm(!showProtocolForm)}>
          {showProtocolForm ? '收起' : '+ 新增療程'}
        </button>
        {showProtocolForm && (
          <div style={{marginBottom:12}}>
            <input className="drug-input" placeholder="療程名稱（例：TRT Cruise、Blast Week 1-12）" style={{marginBottom:8}}
              value={protocolForm.name} onChange={e => setProtocolForm(f => ({...f, name: e.target.value}))} />
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input type="date" value={protocolForm.startDate} onChange={e => setProtocolForm(f => ({...f, startDate: e.target.value}))}
                style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}} />
              <span style={{alignSelf:'center',color:'var(--text2)'}}>→</span>
              <input type="date" value={protocolForm.endDate} onChange={e => setProtocolForm(f => ({...f, endDate: e.target.value}))}
                style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}} placeholder="結束日" />
            </div>
            <textarea className="note-input" style={{minHeight:40,marginBottom:8}} placeholder="用藥內容、備註"
              value={protocolForm.notes} onChange={e => setProtocolForm(f => ({...f, notes: e.target.value}))} />
            <button className="save-btn" onClick={() => {
              if (!protocolForm.name) return;
              const updated = [...protocols, { ...protocolForm, id: Date.now() }];
              saveProts(updated);
              setShowProtocolForm(false);
              setProtocolForm({ name: '', startDate: today(), endDate: '', drugs: {}, notes: '' });
            }}>儲存療程</button>
          </div>
        )}
        {protocols.length > 0 ? (
          protocols.slice().reverse().map(p => {
            const isActive = p.startDate <= selectedDate && (!p.endDate || p.endDate >= selectedDate);
            const dayCount = p.startDate ? Math.round((parseDate(selectedDate) - parseDate(p.startDate)) / 86400000) : 0;
            return (
              <div key={p.id} className={`protocol-card ${isActive ? 'protocol-active' : ''}`}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <b style={{color: isActive ? 'var(--green)' : 'var(--text2)',fontSize:'0.9em'}}>{p.name}</b>
                    {isActive && <span style={{fontSize:'0.7em',color:'var(--green)',marginLeft:6}}>進行中 Day {dayCount}</span>}
                  </div>
                  <button style={{background:'none',border:'none',color:'var(--red)',fontSize:'0.75em',cursor:'pointer'}}
                    onClick={() => saveProts(protocols.filter(x => x.id !== p.id))}>刪除</button>
                </div>
                <div style={{fontSize:'0.78em',color:'var(--text2)',marginTop:2}}>{p.startDate} → {p.endDate || '持續中'}</div>
                {p.notes && <div style={{fontSize:'0.75em',color:'var(--text2)',marginTop:2}}>{p.notes}</div>}
              </div>
            );
          })
        ) : (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>記錄你的 Cycle 或 TRT 療程，方便追蹤每個階段的變化。</p>
        )}
      </div>

      {/* iOS Shortcut quick link */}
      <div className="card">
        <h3>⚡ 自動化捷徑</h3>
        <p style={{fontSize:'0.82em',color:'var(--text2)',lineHeight:1.6}}>
          用 iOS 捷徑自動匯入睡眠和體重，URL 格式：
        </p>
        <div style={{background:'var(--card2)',borderRadius:6,padding:8,margin:'6px 0',fontSize:'0.75em',wordBreak:'break-all',color:'var(--green)'}}>
          {window.location.origin + window.location.pathname}?sleep=<b>BASE64_JSON</b>
        </div>
        <p style={{fontSize:'0.75em',color:'var(--text2)',lineHeight:1.5}}>
          JSON 格式：{'{"bedtime":"23:30","wakeTime":"07:15","deep":"95","rem":"60","light":"120","source":"autosleep"}'}<br/>
          體重：?weight=75.2<br/>
          可合併：?sleep=...&weight=75.2<br/><br/>
          捷徑步驟：讀取健康資料 → 轉 JSON → Base64 編碼 → 拷貝 → 打開 URL<br/>
          打開後 App 會自動儲存，不需手動操作！
        </p>
      </div>
    </div>
  );
}

function PhotoTimeline({ data, sortedDates }) {
  const [compareType, setCompareType] = useState('face');
  const [compareDate1, setCompareDate1] = useState('');
  const [compareDate2, setCompareDate2] = useState('');
  const [comparePhoto1, setComparePhoto1] = useState(null);
  const [comparePhoto2, setComparePhoto2] = useState(null);

  const photoDates = useMemo(() => {
    return sortedDates.filter(d => data[d]?.hasPhotos);
  }, [data, sortedDates]);

  const [photos, setPhotos] = useState([]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const loaded = [];
      for (const date of photoDates.slice(-20)) {
        const photo = await loadPhoto(date, compareType);
        if (photo) {
          loaded.push({ date, photo, analysis: compareType === 'face' ? data[date]?.faceAnalysis : data[date]?.bodyAnalysis });
        }
      }
      if (cancelled) return;
      setPhotos(loaded);
      if (loaded.length >= 2 && !compareDate1) {
        setCompareDate1(loaded[0].date);
        setCompareDate2(loaded[loaded.length - 1].date);
      }
    })();
    return () => { cancelled = true; };
  }, [photoDates, compareType, data]);

  // Load compare photos when dates change
  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (compareDate1) {
        const p = await loadPhoto(compareDate1, compareType);
        if (!cancelled) setComparePhoto1(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate1]?.faceAnalysis : data[compareDate1]?.bodyAnalysis } : null);
      }
      if (compareDate2) {
        const p = await loadPhoto(compareDate2, compareType);
        if (!cancelled) setComparePhoto2(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate2]?.faceAnalysis : data[compareDate2]?.bodyAnalysis } : null);
      }
    })();
    return () => { cancelled = true; };
  }, [compareDate1, compareDate2, compareType, data]);

  // Swelling trend chart
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!chartRef.current) return;
    const datesWithAnalysis = sortedDates.filter(d => data[d]?.faceAnalysis);
    if (datesWithAnalysis.length < 2) { if (chartInst.current) chartInst.current.destroy(); return; }

    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'line',
      data: {
        labels: datesWithAnalysis,
        datasets: [{
          label: '💪 充血度',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.pumpScore||0),
          borderColor: '#7a9e8e',
          backgroundColor: '#7a9e8e22',
          fill: false, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#7a9e8e'
        }, {
          label: '📐 線條',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.definitionScore||0),
          borderColor: '#7a94b0',
          backgroundColor: '#7a94b022',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#7a94b0'
        }, {
          label: '💧 水腫',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.waterScore||0),
          borderColor: '#c4956a',
          backgroundColor: '#c4956a22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#c4956a'
        }, {
          label: '腫脹指數',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.swellingIndex),
          borderColor: '#8b7fa8',
          backgroundColor: '#8b7fa822',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#8b7fa8', hidden: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#5c5850', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#8a847b', maxTicksLimit: 8 }, grid: { color: '#e8e3dc' } },
          y: { min: 0, max: 100, ticks: { color: '#8a847b' }, grid: { color: '#e8e3dc' } }
        }
      }
    });
    return () => { if (chartInst.current) chartInst.current.destroy(); };
  }, [data, sortedDates]);

  if (!photoDates.length) {
    return (
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <p style={{color:'var(--text2)',fontSize:'0.85em'}}>尚無照片紀錄。在紀錄頁拍攝臉部或身材照，即可在此追蹤變化。</p>
      </div>
    );
  }

  return (
    <>
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={`sym-btn ${compareType==='face'?'active':''}`}
            style={{background: compareType==='face'?'var(--purple)':'var(--card2)', color: compareType==='face'?'#fff':'var(--text2)', borderColor: compareType==='face'?'var(--purple)':'var(--border)'}}
            onClick={() => setCompareType('face')}>臉部</button>
          <button className={`sym-btn ${compareType==='body'?'active':''}`}

      {/* Side-by-side comparison */}
      {photos.length >= 2 && (
        <div className="ai-card">

            <select value={compareDate1} onChange={e => setCompareDate1(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
            <span style={{color:'var(--text2)',alignSelf:'center'}}>vs</span>
            <select value={compareDate2} onChange={e => setCompareDate2(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
          </div>
          <div style={{display:'flex',gap:8}}>
            {comparePhoto1 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto1.photo} alt={compareDate1} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate1}</div>
                {comparePhoto1.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto1.analysis.pumpLabel} | 線條:{comparePhoto1.analysis.definitionScore||0} | 水:{comparePhoto1.analysis.waterScore||0}</div>}
              </div>
            )}
            {comparePhoto2 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto2.photo} alt={compareDate2} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate2}</div>
                {comparePhoto2.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto2.analysis.pumpLabel} | 線條:{comparePhoto2.analysis.definitionScore||0} | 水:{comparePhoto2.analysis.waterScore||0}</div>}
              </div>
            )}
          </div>
          {comparePhoto1?.analysis && comparePhoto2?.analysis && (
            <div style={{marginTop:12,padding:10,background:'var(--card2)',borderRadius:8,fontSize:'0.82em'}}>
              <div style={{fontWeight:600,marginBottom:6,color:'var(--purple)'}}>差異分析</div>
              {['pumpScore','definitionScore','waterScore','swellingIndex','redness','warmth'].map(k => {
                const labels = {pumpScore:'💪 充血度',definitionScore:'📐 線條',waterScore:'💧 水腫',swellingIndex:'腫脹指數',redness:'泛紅',warmth:'色溫'};
                const diff = comparePhoto2.analysis[k] - comparePhoto1.analysis[k];
                return (
                  <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}>
                    <span style={{color:'var(--text2)'}}>{labels[k]}</span>
                    <span style={{color: diff > 5 ? 'var(--red)' : diff < -5 ? 'var(--green)' : 'var(--text2)'}}>
                      {diff > 0 ? '+' : ''}{diff} {diff > 5 ? '↑' : diff < -5 ? '↓' : '→'}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className="ai-card">
        <h3>🤖 臉部指數趨勢</h3>
        {sortedDates.filter(d => data[d]?.faceAnalysis).length < 2 ? (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>需要至少 2 天的臉部照片才能顯示趨勢圖</p>
        ) : (
          <div className="chart-container"><canvas ref={chartRef}></canvas></div>
        )}
      </div>
    </>
  );
}

// === Dedicated Photo Timeline Page (Face or Body) with Multi-Select & Lightbox ===
function PhotoTimelinePage({ data, type, setTab }) {
  const [photos, setPhotos] = useState([]);
  const [selected, setSelected] = useState([]);
  const [lightboxOpen, setLightboxOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const typeLabel = type === 'face' ? '臉部' : '身材';

  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);
  const photoDates = useMemo(() => sortedDates.filter(d => data[d]?.hasPhotos), [data, sortedDates]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    (async () => {
      const loaded = [];
      for (const date of photoDates) {
        const photo = await loadPhoto(date, type);
        if (photo && !cancelled) {
          const analysis = type === 'face' ? data[date]?.faceAnalysis : data[date]?.bodyAnalysis;
          loaded.push({ date, photo, analysis });
        }
      }
      if (!cancelled) {
        setPhotos(loaded);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [photoDates, type]);

  const toggleSelect = (date) => {
    setSelected(prev => prev.includes(date) ? prev.filter(d => d !== date) : [...prev, date]);
  };

  const openLightbox = () => {
    if (selected.length === 0) {
      // If nothing selected, show all
      setSelected(photos.map(p => p.date));
    }
    setLightboxOpen(true);
  };

  const lightboxPhotos = photos.filter(p => selected.includes(p.date));

  return (
    <div className="page">
      <button className="back-btn" onClick={() => setTab('chart')}>← 返回分析</button>
      <div className="card">
        <h3>{type === 'face' ? '🤳' : '💪'} {typeLabel}變化時間軸</h3>
        <p style={{fontSize:'0.82em',color:'var(--text2)',marginBottom:10}}>
          共 {photos.length} 張照片 — 點選照片可多選，再點「對比」放大比較
        </p>
        {selected.length > 0 && (
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button className="save-btn" style={{flex:1,padding:'10px',fontSize:'0.85em'}} onClick={openLightbox}>
              🔍 對比已選 {selected.length} 張
            </button>
            <button className="action-btn" style={{flex:'0 0 70px',margin:0,fontSize:'0.82em'}} onClick={() => setSelected([])}>
              清除
            </button>
          </div>
        )}
        {loading ? (
          <div style={{textAlign:'center',padding:30,color:'var(--text2)'}}>載入照片中...</div>
        ) : photos.length === 0 ? (
          <div style={{textAlign:'center',padding:30,color:'var(--text2)'}}>
            尚無{typeLabel}照片。在紀錄頁拍攝{typeLabel}照即可在此追蹤變化。
          </div>
        ) : (
          <div className="timeline-grid">
            {photos.map(p => (
              <div key={p.date} className={`timeline-cell ${selected.includes(p.date) ? 'selected' : ''}`}
                onClick={() => toggleSelect(p.date)}>
                <img src={p.photo} alt={p.date} loading="lazy" />
                <div className="tl-date">
                  {p.date.slice(5)}
                  {p.analysis && <span style={{display:'block',fontSize:'0.9em'}}>💪{p.analysis.pumpScore||0} 📐{p.analysis.definitionScore||0} 💧{p.analysis.waterScore||0}</span>}
                </div>
                <div className="tl-check">✓</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Lightbox overlay */}
      {lightboxOpen && (
        <div className="lightbox-overlay" onClick={(e) => { if (e.target === e.currentTarget) setLightboxOpen(false); }}>
          <div className="lightbox-header">
            <span style={{fontSize:'0.9em'}}>{typeLabel}對比 — {lightboxPhotos.length} 張</span>
            <button onClick={() => setLightboxOpen(false)}>✕</button>
          </div>
          <div className="lightbox-body">
            {lightboxPhotos.map(p => (
              <div className="lb-item" key={p.date}>
                <img src={p.photo} alt={p.date} />
                <div className="lb-info">
                  {p.date}
                  {p.analysis && <><br/>💪 {p.analysis.pumpLabel||''} | 📐 線條:{p.analysis.definitionScore||0} | 💧 水:{p.analysis.waterScore||0}</>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


// === Cloud Sync Component ===
function CloudSyncPanel({ data, updateData }) {
  const [config, setConfig] = useState(() => getFirebaseConfig() || { apiKey:'', projectId:'', appId:'' });
  const [uid, setUid] = useState(getFirebaseUID);
  const [connected, setConnected] = useState(false);
  const [status, setStatus] = useState('');
  const [showSetup, setShowSetup] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [lastBackup, setLastBackup] = useState('');

  // Auto-connect if config exists
  useEffect(() => {
    const saved = getFirebaseConfig();
    if (saved?.apiKey && saved?.projectId) {
      const ok = initFirebase(saved);
      setConnected(ok);
      if (ok) setStatus('✓ 已連線');
    }
  }, []);

  const handleConnect = () => {
    if (!config.apiKey || !config.projectId) {
      setStatus('✗ 請填入 API Key 和 Project ID');
      return;
    }
    const fullConfig = {
      apiKey: config.apiKey,
      authDomain: `${config.projectId}.firebaseapp.com`,
      projectId: config.projectId,
      storageBucket: `${config.projectId}.appspot.com`,
      appId: config.appId || 'default'
    };
    const ok = initFirebase(fullConfig);
    if (ok) {
      saveFirebaseConfig(fullConfig);
      setConnected(true);
      setStatus('✓ 連線成功！');
    } else {
      setStatus('✗ 連線失敗，請檢查設定');
    }
  };

  const handleBackup = async () => {
    if (!uid.trim()) { setStatus('✗ 請輸入你的識別碼'); return; }
    setSyncing(true);
    setStatus('⏳ 上傳中...');
    try {
      saveFirebaseUID(uid.trim());
      const result = await cloudBackup(uid.trim(), data);
      setLastBackup(new Date().toLocaleString('zh-TW'));
      setStatus(`✓ 備份成功！${result.totalDays} 天紀錄（${result.sizeMB}MB）`);
    } catch (e) {
      setStatus('✗ 備份失敗: ' + e.message);
    }
    setSyncing(false);
  };

  const handleRestore = async () => {
    if (!uid.trim()) { setStatus('✗ 請輸入你的識別碼'); return; }
    if (!window.confirm('從雲端還原會合併現有資料，確定繼續？')) return;
    setSyncing(true);
    setStatus('⏳ 下載中...');
    try {
      saveFirebaseUID(uid.trim());
      const result = await cloudRestore(uid.trim());
      const merged = { ...data };
      Object.entries(result.data).forEach(([date, cloudEntry]) => {
        const localEntry = data[date];
        if (!localEntry) {
          merged[date] = cloudEntry;
        } else {
          const cloudTime = cloudEntry.updatedAt ? new Date(cloudEntry.updatedAt).getTime() : 0;
          const localTime = localEntry.updatedAt ? new Date(localEntry.updatedAt).getTime() : 0;
          if (cloudTime > localTime) merged[date] = cloudEntry;
        }
      });
      updateData(merged);
      setLastBackup(result.lastBackup ? new Date(result.lastBackup).toLocaleString('zh-TW') : '');
      setStatus(`✓ 還原成功！合併後共 ${Object.keys(merged).length} 天紀錄`);
    } catch (e) {
      setStatus('✗ 還原失敗: ' + e.message);
    }
    setSyncing(false);
  };

  const handlePhotoBackup = async () => {
    if (!uid.trim()) { setStatus('✗ 請輸入你的識別碼'); return; }
    setSyncing(true);
    setStatus('⏳ 上傳照片中（可能需要較長時間）...');
    try {
      saveFirebaseUID(uid.trim());
      const result = await cloudBackupPhotos(uid.trim());
      setStatus(result.count ? `✓ 已備份 ${result.count} 張照片` : '沒有照片需要備份');
    } catch (e) {
      setStatus('✗ 照片備份失敗: ' + e.message);
    }
    setSyncing(false);
  };

  const handlePhotoRestore = async () => {
    if (!uid.trim()) { setStatus('✗ 請輸入你的識別碼'); return; }
    setSyncing(true);
    setStatus('⏳ 下載照片中...');
    try {
      saveFirebaseUID(uid.trim());
      const result = await cloudRestorePhotos(uid.trim());
      setStatus(result.count ? `✓ 已還原 ${result.count} 張照片` : '雲端無照片備份');
    } catch (e) {
      setStatus('✗ 照片還原失敗: ' + e.message);
    }
    setSyncing(false);
  };

  return (
    <div className="card" style={{border:'1px solid var(--blue)'}}>
      <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        ☁️ 雲端備份
        <span style={{fontSize:'0.7em',fontWeight:400,color: connected ? 'var(--green)' : 'var(--text2)'}}>
          {connected ? '● 已連線' : '○ 未連線'}
        </span>
      </h3>

      {!connected && (
        <div style={{marginBottom:12}}>
          <p style={{fontSize:'0.82em',color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>
            使用 Firebase 免費方案備份資料到雲端，更新 App 不再遺失資料。
          </p>
          <button className="action-btn" style={{marginBottom:8}} onClick={() => setShowSetup(!showSetup)}>
            {showSetup ? '收起設定' : '⚙️ 設定 Firebase 連線'}
          </button>
          
          {showSetup && (
            <div style={{background:'var(--card2)',borderRadius:10,padding:12,fontSize:'0.82em'}}>
              <p style={{color:'var(--text2)',marginBottom:10,lineHeight:1.8}}>
                <b>一次性設定（3分鐘）：</b><br/>
                1. 前往 <a href="https://console.firebase.google.com" target="_blank" style={{color:'var(--blue)'}}>console.firebase.google.com</a><br/>
                2. 建立新專案（名稱隨意）<br/>
                3. 左側選「Firestore Database」→ 建立資料庫 → 選「測試模式」<br/>
                4. 專案設定（⚙️）→ 一般 → 往下找到「你的應用程式」→ 新增 Web 應用 → 複製設定
              </p>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div>
                  <label style={{fontSize:'0.85em',color:'var(--text2)'}}>API Key</label>
                  <input className="drug-input" value={config.apiKey} 
                    onChange={e => setConfig({...config, apiKey: e.target.value})}
                    placeholder="AIzaSy..." style={{fontSize:'0.85em'}} />
                </div>
                <div>
                  <label style={{fontSize:'0.85em',color:'var(--text2)'}}>Project ID</label>
                  <input className="drug-input" value={config.projectId}
                    onChange={e => setConfig({...config, projectId: e.target.value})}
                    placeholder="my-tracker-xxxxx" style={{fontSize:'0.85em'}} />
                </div>
                <div>
                  <label style={{fontSize:'0.85em',color:'var(--text2)'}}>App ID（選填）</label>
                  <input className="drug-input" value={config.appId}
                    onChange={e => setConfig({...config, appId: e.target.value})}
                    placeholder="1:xxx:web:xxx" style={{fontSize:'0.85em'}} />
                </div>
                <button className="save-btn" onClick={handleConnect}>連線 Firebase</button>
              </div>
            </div>
          )}
        </div>
      )}

      {connected && (
        <div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:'0.82em',color:'var(--text2)',display:'block',marginBottom:4}}>你的識別碼（自訂，用來識別你的資料）</label>
            <input className="drug-input" value={uid} onChange={e => setUid(e.target.value)}
              placeholder="例如：dai 或你的 email" style={{fontSize:'0.9em'}} />
          </div>

          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <button className="action-btn" style={{flex:1,margin:0,background:'var(--blue)',color:'#fff',fontWeight:600,opacity:syncing?0.5:1}} 
              disabled={syncing} onClick={handleBackup}>
              ⬆️ 上傳備份
            </button>
            <button className="action-btn" style={{flex:1,margin:0}} disabled={syncing} onClick={handleRestore}>
              ⬇️ 下載還原
            </button>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <button className="action-btn" style={{flex:1,margin:0,fontSize:'0.8em'}} disabled={syncing} onClick={handlePhotoBackup}>
              📸 備份照片
            </button>
            <button className="action-btn" style={{flex:1,margin:0,fontSize:'0.8em'}} disabled={syncing} onClick={handlePhotoRestore}>
              📸 還原照片
            </button>
          </div>

          {lastBackup && (
            <p style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:4}}>上次備份：{lastBackup}</p>
          )}

          <button style={{background:'none',border:'none',color:'var(--text2)',fontSize:'0.75em',cursor:'pointer',padding:'4px 0',textDecoration:'underline'}} 
            onClick={() => { 
              localStorage.removeItem(FIREBASE_CONFIG_KEY); 
              localStorage.removeItem(FIREBASE_UID_KEY);
              _firestore = null; setConnected(false); setStatus('已斷開連線'); 
            }}>
            斷開連線 / 重新設定
          </button>
        </div>
      )}

      {status && (
        <p style={{
          marginTop:8, fontSize:'0.85em', padding:'8px 12px', borderRadius:8,
          background: status.startsWith('✓') ? 'rgba(122,158,142,0.12)' : status.startsWith('✗') ? 'rgba(184,92,92,0.12)' : 'rgba(107,127,153,0.08)',
          color: status.startsWith('✓') ? 'var(--green)' : status.startsWith('✗') ? 'var(--red)' : 'var(--blue)'
        }}>{status}</p>
      )}
    </div>
  );
}

function MorePage({ data, updateData }) {
  const [importStatus, setImportStatus] = useState('');
  const fileRef = useRef(null);

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const dates = Object.keys(data).sort();
    let csv = 'Date,' + DRUGS.map(d=>d.label).join(',') + ',' + SYMPTOMS.map(s=>s.label).join(',') + ',睡眠時數,睡眠品質,深睡分鐘,REM分鐘,Note\n';
    dates.forEach(date => {
      const e = data[date];
      const drugs = DRUGS.map(d => e.drugs?.[d.key] || '');
      const allSyms = flattenSymptoms(e.symptoms);
      const syms = SYMPTOMS.map(s => allSyms.includes(s.key) ? 1 : '');
      let sleepHrs = '', sleepQ = '', deepMin = '', remMin = '';
      if (e.sleep?.bedtime && e.sleep?.wakeTime) {
        const [bh,bm] = e.sleep.bedtime.split(':').map(Number);
        const [wh,wm] = e.sleep.wakeTime.split(':').map(Number);
        let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
        sleepHrs = (mins/60).toFixed(1);
      }
      if (e.sleep?.quality) sleepQ = e.sleep.quality;
      if (e.sleep?.deep) deepMin = e.sleep.deep;
      if (e.sleep?.rem) remMin = e.sleep.rem;
      csv += `${date},${drugs.join(',')},${syms.join(',')},${sleepHrs},${sleepQ},${deepMin},${remMin},${(e.note||'').replace(/,/g,'；')}\n`;
    });
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const importJSON = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        const merged = { ...data, ...imported };
        updateData(merged);
        setImportStatus(`✓ 匯入成功！合併後共 ${Object.keys(merged).length} 天紀錄`);
      } catch { setImportStatus('✗ 檔案格式錯誤'); }
    };
    reader.readAsText(file);
  };

  const clearAll = () => {
    if (window.confirm('確定要清除所有資料嗎？此操作無法復原！')) {
      updateData({});
    }
  };

  const totalDays = Object.keys(data).length;

  return (
    <div className="page">
      <div className="card">
        <h3>📤 匯出資料</h3>
        <button className="action-btn" onClick={exportJSON}>匯出 JSON（完整備份）</button>
        <button className="action-btn" onClick={exportCSV}>匯出 CSV（可用 Excel 開啟）</button>
      </div>

      <CloudSyncPanel data={data} updateData={updateData} />

      <div className="card">
        <h3>📥 匯入資料</h3>
        <button className="action-btn" onClick={() => fileRef.current?.click()}>選擇 JSON 檔案匯入</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importJSON} />
        {importStatus && <p style={{marginTop:8,fontSize:'0.85em',color: importStatus.startsWith('✓') ? 'var(--green)' : 'var(--red)'}}>{importStatus}</p>}
      </div>

      <div className="card">
        <h3>ℹ️ 資料統計</h3>
        <p style={{fontSize:'0.9em'}}>
          目前共有 <b style={{color:'var(--blue)'}}>{totalDays}</b> 天紀錄<br/>
          資料儲存於瀏覽器本機。可透過上方雲端備份同步到 Firebase。<br/>
          建議定期備份，避免更新時遺失資料。
        </p>
      </div>

      <div className="card">
        <h3>⚠️ 危險操作</h3>
        <button className="action-btn" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={clearAll}>清除所有資料</button>
      </div>

      <div className="card">
        <h3>📸 照片管理（IndexedDB）</h3>
        <button className="action-btn" onClick={async () => {
          try {
            const photos = await getAllPhotos();
            const keys = Object.keys(photos);
            if (!keys.length) { alert('沒有儲存的照片'); return; }
            const blob = new Blob([JSON.stringify(photos)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `steroid_photos_${today()}.json`;
            a.click(); URL.revokeObjectURL(url);
            alert(`✓ 已匯出 ${keys.length} 張照片`);
          } catch(err) { alert('匯出失敗: ' + err.message); }
        }}>匯出所有照片（JSON）</button>
        <button className="action-btn" onClick={() => {
          const input = document.createElement('input');
          input.type = 'file'; input.accept = '.json';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
              try {
                const photos = JSON.parse(ev.target.result);
                const count = await importPhotos(photos);
                alert(`✓ 匯入 ${count} 張照片成功！`);
              } catch(err) { alert('✗ 檔案格式錯誤: ' + err.message); }
            };
            reader.readAsText(file);
          };
          input.click();
        }}>匯入照片（JSON）</button>
        <button className="action-btn" style={{color:'var(--orange)',borderColor:'var(--orange)'}} onClick={async () => {
          try {
            const keys = await getAllPhotoKeys();
            if (!keys.length) { alert('沒有儲存的照片'); return; }
            if (window.confirm(`確定要刪除全部 ${keys.length} 張照片嗎？`)) {
              await clearAllPhotos();
              alert('已清除所有照片');
            }
          } catch(err) { alert('清除失敗: ' + err.message); }
        }}>清除所有照片</button>
        <p style={{fontSize:'0.78em',color:'var(--text2)',marginTop:8}}>
          照片儲存於 IndexedDB，不受瀏覽器快取清理影響。建議定期匯出備份。
        </p>
      </div>

      <AutoSleepImport data={data} updateData={updateData} />

      <div className="card" style={{fontSize:'0.78em',color:'var(--text2)'}}>
        用藥追蹤 App v9.2 — 注射/肽類分離 + 不再自動填入 + 驗血趨勢圖<br/>
        本工具僅供個人紀錄用途，不構成醫療建議。
      </div>
    </div>
  );
}

// === AutoSleep CSV Import Component ===
function AutoSleepImport({ data, updateData }) {
  const [csvPreview, setCsvPreview] = useState(null);
  const [importResult, setImportResult] = useState('');
  const csvFileRef = useRef(null);

  const handleCSVFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const entries = parseAutoSleepCSV(ev.target.result);
        if (!entries.length) {
          setImportResult('⚠️ 無法解析 CSV，請確認是 AutoSleep 匯出的格式');
          return;
        }
        setCsvPreview(entries);
      } catch (err) {
        setImportResult('⚠️ 檔案格式錯誤：' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const doImport = () => {
    if (!csvPreview) return;
    const { newData, count } = bulkImportSleep(data, csvPreview);
    updateData(newData);
    setImportResult(`✓ 成功匯入 ${count} 天的 AutoSleep 資料！`);
    setCsvPreview(null);
    setTimeout(() => setImportResult(''), 4000);
  };

  const existingDates = csvPreview ? csvPreview.filter(e => data[e.date]?.sleep).length : 0;

  return (
    <div className="card">
      <h3>😴 AutoSleep 匯入</h3>
      <p style={{fontSize:'0.82em',color:'var(--text2)',lineHeight:1.6,marginBottom:10}}>
        從 AutoSleep App 匯出 CSV，直接匯入所有睡眠紀錄
      </p>

      <div style={{background:'var(--card2)',borderRadius:8,padding:12,fontSize:'0.78em',color:'var(--text)',lineHeight:1.7,marginBottom:10}}>
        <b style={{color:'var(--blue)'}}>匯出步驟：</b><br/>
        1. 開啟 AutoSleep App → 按「歷史」<br/>
        2. 右上角「⋯」→「匯出資料」<br/>
        3. 選擇日期範圍 → 格式選 CSV<br/>
        4. 傳到 iPhone 或 AirDrop 到電腦<br/>
        5. 在這裡點下面的按鈕上傳
      </div>

      <button className="action-btn" style={{background:'var(--blue)',color:'#fff',fontWeight:600}}
        onClick={() => csvFileRef.current?.click()}>
        📁 選擇 AutoSleep CSV 檔案
      </button>
      <input ref={csvFileRef} type="file" accept=".csv,.CSV" style={{display:'none'}} onChange={handleCSVFile} />

      {csvPreview && (
        <div style={{marginTop:12}}>
          <div style={{background:'var(--card2)',borderRadius:8,padding:12}}>
            <div style={{fontSize:'0.9em',fontWeight:600,color:'var(--green)',marginBottom:8}}>
              📊 預覽：找到 {csvPreview.length} 天睡眠資料
            </div>
            <div style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>
              日期範圍：{csvPreview[0].date} ~ {csvPreview[csvPreview.length-1].date}
              {existingDates > 0 && <span style={{color:'var(--orange)'}}> （{existingDates} 天會覆蓋現有資料）</span>}
            </div>
            <div style={{maxHeight:200,overflowY:'auto',fontSize:'0.75em'}}>
              {csvPreview.slice(0, 10).map((e, i) => {
                const s = e.sleep;
                return (
                  <div key={i} style={{padding:'4px 0',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
                    <span>{e.date}</span>
                    <span>{s.bedtime}→{s.wakeTime}</span>
                    <span>深睡{s.deep}m</span>
                    <span>HR{s.sleepHR}</span>
                    <span>HRV{s.hrv}</span>
                    <span>SpO2 {s.spo2}%</span>
                  </div>
                );
              })}
              {csvPreview.length > 10 && <div style={{padding:4,color:'var(--text2)'}}>...還有 {csvPreview.length - 10} 天</div>}
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="save-btn" style={{flex:1}} onClick={doImport}>✓ 確認匯入 {csvPreview.length} 天</button>
            <button className="action-btn" style={{flex:'0 0 80px',margin:0}} onClick={() => setCsvPreview(null)}>取消</button>
          </div>
        </div>
      )}

      {importResult && (
        <div style={{marginTop:8,padding:8,borderRadius:8,textAlign:'center',fontSize:'0.85em',
          background: importResult.includes('✓') ? 'rgba(122,158,142,0.12)' : 'rgba(196,149,106,0.12)',
          color: importResult.includes('✓') ? 'var(--green)' : 'var(--orange)'}}>
          {importResult}
        </div>
      )}

      <div style={{marginTop:12,fontSize:'0.75em',color:'var(--text2)',lineHeight:1.5}}>
        匯入的資料包含：入睡/起床時間、深睡、效率、睡眠心率、HRV、血氧飽和度等完整資訊。<br/>
        AutoSleep 的深睡/品質/效率會自動轉換成本系統的格式。
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
