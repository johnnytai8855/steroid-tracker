<style>
/* === 日式北歐 Japandi Theme === */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');
:root{--bg:#f7f4f0;--card:#ffffff;--card2:#f0ece6;--border:#e2ddd5;--blue:#6b7f99;--pink:#c4856a;--green:#7a9e8e;--purple:#8b7fa8;--orange:#c4956a;--red:#b85c5c;--text:#2d2a26;--text2:#8a847b;--radius:14px;--shadow:0 1px 3px rgba(45,42,38,0.06),0 1px 2px rgba(45,42,38,0.04)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;font-weight:400;letter-spacing:0.01em;line-height:1.6}
.header{background:var(--card);padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.header h1{font-size:1.1em;color:var(--text);font-weight:500;letter-spacing:0.05em}
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom);box-shadow:0 -1px 3px rgba(45,42,38,0.04)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;color:var(--text2);font-size:0.68em;cursor:pointer;border:none;background:none;transition:all 0.3s;font-weight:400;letter-spacing:0.02em}
.tab.active{color:var(--blue);font-weight:600}
.tab svg{width:20px;height:20px;margin-bottom:3px;stroke-width:1.5}
.page{padding:16px;max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;border:none;box-shadow:var(--shadow)}
.card h3{color:var(--text);font-size:0.92em;margin-bottom:12px;font-weight:600;letter-spacing:0.02em}
.drug-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.drug-label{min-width:100px;font-size:0.85em;color:var(--text2);font-weight:400}
.drug-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:1em;outline:none;width:100%;transition:border-color 0.2s,box-shadow 0.2s}
.drug-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(107,127,153,0.1)}
.drug-unit{font-size:0.8em;color:var(--text2);min-width:30px}
.sym-grid{display:flex;flex-wrap:wrap;gap:8px}
.sym-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.82em;cursor:pointer;transition:all 0.2s;user-select:none}
.sym-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sym-btn.positive.active{background:var(--green);border-color:var(--green)}
.sym-btn.negative.active{background:var(--red);border-color:var(--red)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.date-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:0.88em;box-shadow:var(--shadow);transition:all 0.2s}
.date-nav button:active{background:var(--blue);color:#fff;border-color:var(--blue)}
.date-nav .date{font-size:1.05em;font-weight:600;color:var(--text);min-width:140px;text-align:center;letter-spacing:0.03em}
.save-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:0.95em;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;letter-spacing:0.03em;box-shadow:0 2px 8px rgba(107,127,153,0.2)}
.save-btn:active{opacity:0.8;transform:scale(0.99)}
.save-btn.saved{background:var(--green);box-shadow:0 2px 8px rgba(122,158,142,0.2)}
.note-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:0.88em;outline:none;resize:vertical;min-height:60px;font-family:inherit;transition:border-color 0.2s}
.note-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(107,127,153,0.1)}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:0.78em}
.cal-header{text-align:center;color:var(--text2);padding:6px 0;font-weight:500;font-size:0.75em;letter-spacing:0.05em}
.cal-day{background:var(--card);border-radius:8px;padding:4px;min-height:52px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;position:relative;box-shadow:var(--shadow)}
.cal-day:hover{border-color:var(--blue)}
.cal-day.today{border-color:var(--blue);background:rgba(107,127,153,0.06)}
.cal-day.selected{border-color:var(--orange)}
.cal-day.empty{background:transparent;cursor:default;border:none;box-shadow:none}
.cal-day .num{font-weight:500;margin-bottom:2px}
.cal-day .dots{display:flex;flex-wrap:wrap;gap:2px}
.cal-day .dot{width:5px;height:5px;border-radius:50%}
.cal-month{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month button{background:none;border:none;color:var(--blue);font-size:1.2em;cursor:pointer;padding:8px}
.cal-month .month-label{font-size:1em;font-weight:600;letter-spacing:0.03em}
/* Chart */
.chart-container{position:relative;height:280px;margin:8px 0}
/* History */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border)}
.hist-date{font-weight:600;color:var(--text);margin-bottom:6px}
.hist-drugs{font-size:0.85em;color:var(--green);margin-bottom:4px}
.hist-symptoms{font-size:0.85em;color:var(--orange);margin-bottom:4px}
.hist-note{font-size:0.82em;color:var(--text2);font-style:italic}
/* Export */
.action-btn{display:block;width:100%;padding:12px;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.88em;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:all 0.2s}
.action-btn:active{background:var(--blue);color:#fff}
.badge{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--blue)}
/* Photo */
.photo-section{display:flex;gap:12px;flex-wrap:wrap}
.photo-slot{flex:1;min-width:140px}
.photo-slot h4{font-size:0.82em;color:var(--text2);margin-bottom:8px;text-align:center;font-weight:400}
.photo-frame{position:relative;width:100%;aspect-ratio:3/4;background:var(--card2);border:2px dashed var(--border);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.photo-frame:hover{border-color:var(--blue)}
.photo-frame.has-photo{border-style:solid;border-color:var(--purple)}
.photo-frame img{width:100%;height:100%;object-fit:cover}
.photo-frame .placeholder{text-align:center;color:var(--text2);font-size:0.8em;padding:10px}
.photo-frame .placeholder svg{width:32px;height:32px;margin-bottom:4px;opacity:0.4}
.photo-frame .remove-photo{position:absolute;top:6px;right:6px;background:rgba(45,42,38,0.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.photo-input{display:none}
/* AI Analysis */
.ai-card{background:linear-gradient(135deg,#faf8f5,#f5f0ea);border:1px solid var(--purple);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.ai-card h3{color:var(--purple);font-size:0.92em;margin-bottom:12px}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:0.85em}
.metric-bar{width:100px;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.metric-fill{height:100%;border-radius:3px;transition:width 0.3s}
/* Photo Compare */
.compare-container{display:flex;gap:8px;overflow-x:auto;padding:8px 0}
.compare-card{min-width:120px;flex-shrink:0;text-align:center}
.compare-card img{width:120px;height:160px;object-fit:cover;border-radius:10px;border:2px solid var(--border)}
.compare-card .compare-date{font-size:0.75em;color:var(--text2);margin-top:4px}
.compare-card .compare-score{font-size:0.7em;color:var(--purple);margin-top:2px}
/* Calibration */
.calib-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.calib-section h4{font-size:0.8em;color:var(--text2);margin-bottom:8px;font-weight:400}
.calib-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.82em}
.calib-label{min-width:70px;color:var(--text2);font-size:0.85em}
.calib-btns{display:flex;gap:4px;flex-wrap:wrap}
.calib-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.8em;cursor:pointer;transition:all 0.2s}
.calib-btn.selected{background:var(--purple);color:#fff;border-color:var(--purple)}
.calib-btn:active{opacity:0.7}
.calib-saved{font-size:0.75em;color:var(--green);margin-left:6px}
.calib-badge{display:inline-block;background:var(--purple);color:#fff;font-size:0.6em;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
/* Sleep */
.sleep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sleep-field{display:flex;flex-direction:column;gap:4px}
.sleep-field label{font-size:0.78em;color:var(--text2);font-weight:400}
.sleep-field input,.sleep-field select{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:0.95em;outline:none;transition:border-color 0.2s}
.sleep-field input:focus,.sleep-field select:focus{border-color:var(--blue)}
.sleep-total{text-align:center;padding:10px;background:var(--card2);border-radius:12px;margin-bottom:10px}
.sleep-total .hours{font-size:1.8em;font-weight:600;color:var(--blue)}
.sleep-total .hours-label{font-size:0.75em;color:var(--text2);font-weight:300}
.sleep-quality-btns{display:flex;gap:6px;margin-bottom:8px}
.sleep-q-btn{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.8em;cursor:pointer;text-align:center;transition:all 0.2s}
.sleep-q-btn.active{border-color:transparent;color:#fff}
.sleep-q-btn.q1.active{background:#b85c5c}
.sleep-q-btn.q2.active{background:#c4956a}
.sleep-q-btn.q3.active{background:#6b7f99}
.sleep-q-btn.q4.active{background:#7a9e8e}
.sleep-q-btn.q5.active{background:#8b7fa8}
.sleep-import-btn{width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--blue);font-size:0.82em;cursor:pointer;margin-top:6px;transition:all 0.2s}
.sleep-import-btn:active{background:var(--blue);color:#fff}
.sleep-source{font-size:0.7em;color:var(--text2);text-align:right;margin-top:4px}
.sleep-bar{display:flex;height:18px;border-radius:9px;overflow:hidden;margin:6px 0}
.sleep-bar div{transition:width 0.3s}
.storage-warn{background:var(--card2);border:1px solid var(--orange);border-radius:10px;padding:10px;margin-bottom:14px;font-size:0.82em;color:var(--orange)}
/* Period tabs */
.period-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.period-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.82em;cursor:pointer;white-space:nowrap;position:relative;transition:all 0.2s;font-weight:400}
.period-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.period-tab .period-count{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.65em;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sym-time-label{font-size:0.75em;color:var(--text2);margin-left:4px}
/* Smart */
.briefing{background:linear-gradient(135deg,#faf8f5,#f0ece6);border:1px solid var(--blue);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.briefing h3{color:var(--text);font-size:0.92em;margin-bottom:10px;font-weight:600}
.briefing-item{padding:7px 0;font-size:0.85em;border-bottom:1px solid var(--border)}
.briefing-item:last-child{border-bottom:none}
.pk-curve{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.pattern-card{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;font-size:0.85em}
.pattern-conf{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72em;margin-left:4px;font-weight:500}
.blood-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.blood-field{display:flex;flex-direction:column;gap:3px}
.blood-field label{font-size:0.75em;color:var(--text2);font-weight:400}
.blood-field input{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-size:0.9em;outline:none}
.blood-field input:focus{border-color:var(--blue)}
.weight-row{display:flex;gap:10px;align-items:center}
.weight-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:1em;outline:none}
.dose-suggest{background:linear-gradient(135deg,#faf8f5,#f5f0ea);border:1px solid var(--purple);border-radius:var(--radius);padding:16px;margin-top:12px;box-shadow:var(--shadow)}
.dose-suggest h4{color:var(--purple);font-size:0.9em;margin-bottom:8px;font-weight:600}
.tab-badge{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--red)}
/* Timeline */
.timeline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:10px}
.timeline-cell{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.2s;background:var(--card2)}
.timeline-cell img{width:100%;height:100%;object-fit:cover}
.timeline-cell .tl-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(45,42,38,0.7));color:#fff;font-size:0.65em;padding:4px 5px;text-align:center}
.timeline-cell.selected{border-color:var(--purple);box-shadow:0 0 12px rgba(139,127,168,0.25)}
.timeline-cell .tl-check{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:var(--purple);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.timeline-cell.selected .tl-check{opacity:1}
/* Lightbox */
.lightbox-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(45,42,38,0.94);z-index:1000;display:flex;flex-direction:column;padding:10px}
.lightbox-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;color:#f7f4f0;flex-shrink:0}
.lightbox-header button{background:none;border:none;color:#f7f4f0;font-size:1.4em;cursor:pointer;padding:6px}
.lightbox-body{flex:1;display:flex;gap:8px;overflow-x:auto;align-items:center;justify-content:center;padding:8px}
.lightbox-body .lb-item{flex-shrink:0;max-height:80vh;display:flex;flex-direction:column;align-items:center}
.lightbox-body .lb-item img{max-height:70vh;max-width:90vw;object-fit:contain;border-radius:10px;border:2px solid rgba(255,255,255,0.1)}
.lightbox-body .lb-item .lb-info{color:#d5d0c8;font-size:0.8em;margin-top:6px;text-align:center}
/* Back */
.back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--blue);font-size:0.88em;cursor:pointer;padding:8px 0;margin-bottom:8px;font-weight:500}
.back-btn:active{opacity:0.7}
/* Injection sites */
.site-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.site-btn{padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.78em;cursor:pointer;transition:all 0.2s;position:relative;box-shadow:var(--shadow)}
.site-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.site-btn.recent{border-color:var(--orange)}
.site-btn .site-days{position:absolute;top:-6px;right:-6px;background:var(--orange);color:#fff;font-size:0.6em;padding:1px 4px;border-radius:8px}
/* Inventory */
.inv-bar{height:5px;background:var(--card2);border-radius:3px;overflow:hidden;margin-top:4px}
.inv-fill{height:100%;border-radius:3px;transition:width 0.3s}
/* Blood */
.marker-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.marker-row:last-child{border-bottom:none}
.marker-label{flex:1;font-size:0.82em}
.marker-value{width:70px}
.marker-value input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px;color:var(--text);font-size:0.85em;text-align:right;outline:none}
.marker-value input:focus{border-color:var(--blue)}
.marker-status{font-size:0.72em;padding:2px 6px;border-radius:8px;white-space:nowrap}
.marker-range{font-size:0.65em;color:var(--text2)}
/* Protocol */
.protocol-card{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--blue)}
.protocol-active{border-left-color:var(--green)}
/* Calc */
.calc-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.calc-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px;color:var(--text);font-size:0.9em;outline:none}
.calc-input:focus{border-color:var(--blue)}
.calc-result{background:var(--card2);border-radius:10px;padding:10px;text-align:center;font-size:1.1em;font-weight:600;color:var(--blue)}
/* Drug collapse */
.drug-cat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:8px}
.drug-cat-header h4{font-size:0.85em;margin:0;font-weight:500}
.drug-cat-toggle{color:var(--text2);font-size:0.78em}
/* Check-in */
.checkin-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.checkin-card.morning{border-left:3px solid var(--orange)}
.checkin-card.evening{border-left:3px solid var(--purple)}
.checkin-item{margin-bottom:16px}
.checkin-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.checkin-label .cl-name{font-size:0.88em;color:var(--text);font-weight:500}
.checkin-label .cl-value{font-size:0.82em;font-weight:600;min-width:50px;text-align:right}
.checkin-label .cl-hint{font-size:0.65em;color:var(--text2)}
.score-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.score-btn{padding:9px 4px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.74em;cursor:pointer;text-align:center;transition:all 0.2s;line-height:1.2;font-weight:400}
.score-btn.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(45,42,38,0.12)}
.checkin-indicator{display:none}
/* Ad-hoc */
.adhoc-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0}
.adhoc-header h3{font-size:0.9em;margin:0;font-weight:500}
.adhoc-count{background:var(--red);color:#fff;border-radius:10px;padding:0 7px;font-size:0.75em;margin-left:6px}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Selection */
::selection{background:rgba(107,127,153,0.2);color:var(--text)}
/* Mobile Responsive */
@media (max-width: 480px) {
  .page{padding:12px 8px}
  .card{padding:14px 12px}
  .drug-row{flex-wrap:wrap;gap:6px}
  .drug-label{min-width:80px;font-size:0.8em}
  .drug-input{padding:8px 10px;font-size:0.9em}
  .score-btns{grid-template-columns:repeat(2,1fr);gap:4px}
  .score-btn{padding:8px 3px;font-size:0.72em}
  .blood-grid{grid-template-columns:1fr}
  .marker-row{flex-wrap:wrap;gap:4px}
  .marker-label{min-width:100%;font-size:0.8em}
  .marker-value{width:100%}
  .marker-value input{width:100%}
  .sleep-grid{grid-template-columns:1fr}
  .tabs .tab{font-size:0.62em;padding:6px 2px}
  .tabs .tab svg{width:18px;height:18px}
  .header h1{font-size:0.95em}
  .cal-grid{gap:2px;font-size:0.72em}
  .cal-day{min-height:44px;padding:3px}
  .site-grid{gap:4px}
  .site-btn{padding:5px 8px;font-size:0.72em}
  .photo-section{flex-direction:column}
  .photo-slot{min-width:100%}
  .checkin-label .cl-name{font-size:0.82em}
  .sym-btn{padding:6px 10px;font-size:0.78em}
  .save-btn{padding:12px;font-size:0.9em}
  .action-btn{padding:10px;font-size:0.82em}
  .period-tabs{gap:4px}
  .period-tab{padding:5px 10px;font-size:0.78em}
  .chart-container{height:220px !important}
  .timeline-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
  .briefing{padding:14px}
  .calc-row{flex-wrap:wrap}
  .calc-input{min-width:60px}
}
@media (max-width: 360px) {
  .score-btns{grid-template-columns:repeat(2,1fr)}
  .tabs .tab{font-size:0.58em}
  .drug-label{min-width:70px;font-size:0.75em}
}
/* Toast notifications */
.toast-container{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{padding:10px 20px;border-radius:10px;font-size:0.88em;box-shadow:0 4px 12px rgba(45,42,38,0.15);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s;pointer-events:auto;max-width:90vw;text-align:center}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--blue);color:#fff}
.toast.warning{background:var(--orange);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>

// Get injection site rotation suggestion
const getNextInjectionSite = (data, selectedDate) => {
  const dates = Object.keys(data).sort().filter(d => d <= selectedDate);
  const recentSites = [];
  dates.slice(-20).forEach(d => {
    if (data[d]?.injectionSite) recentSites.push({ date: d, site: data[d].injectionSite });
  });
  if (!recentSites.length) return { suggestion: INJECTION_SITES[0].key, history: [] };
  const lastSite = recentSites[recentSites.length - 1].site;
  const lastIdx = INJECTION_SITES.findIndex(s => s.key === lastSite);
  const nextIdx = (lastIdx + 1) % INJECTION_SITES.length;
  return { suggestion: INJECTION_SITES[nextIdx].key, history: recentSites.slice(-6) };
};

// Calculate remaining in vial based on usage history
const calcVialRemaining = (drugKey, inventory, data) => {
  const vial = inventory[drugKey];
  if (!vial) return null;
  const totalUsed = Object.values(data).reduce((sum, entry) => sum + (entry.drugs?.[drugKey] || 0), 0);
  const usedSinceOpen = Object.keys(data).sort().filter(d => d >= (vial.openDate || '2000-01-01'))
    .reduce((sum, d) => sum + (data[d]?.drugs?.[drugKey] || 0), 0);
  const remaining = vial.totalAmount - usedSinceOpen;
  const drug = DRUGS.find(d => d.key === drugKey);
  const schedule = DRUG_SCHEDULES[drugKey];
  const avgDose = totalUsed / Math.max(Object.keys(data).filter(d => (data[d]?.drugs?.[drugKey] || 0) > 0).length, 1);
  const dosesLeft = avgDose > 0 ? Math.floor(remaining / avgDose) : null;
  const daysLeft = schedule && avgDose > 0 ? Math.round(dosesLeft * schedule.intervalDays) : null;
  return { remaining: Math.max(0, remaining), totalAmount: vial.totalAmount, usedSinceOpen, dosesLeft, daysLeft, isLow: remaining < vial.totalAmount * 0.2, isEmpty: remaining <= 0 };
};

const getMarkerStatus = (marker, value) => {
  if (value === undefined || value === null || value === '') return null;
  const v = parseFloat(value);
  if (isNaN(v)) return null;
  if (v <= marker.critical_low) return { status: 'critical_low', label: '⚠️ 嚴重偏低', color: '#b85c5c' };
  if (v >= marker.critical_high) return { status: 'critical_high', label: '⚠️ 嚴重偏高', color: '#b85c5c' };
  if (v < marker.low) return { status: 'low', label: '偏低', color: '#c4956a' };
  if (v > marker.high) return { status: 'high', label: '偏高', color: '#c4956a' };
  return { status: 'normal', label: '正常', color: '#7a9e8e' };
};

};

// Calculate missed injection info
const getMissedInjectionInfo = (data, drugKey, selectedDate) => {
  const schedule = DRUG_SCHEDULES[drugKey];
  if (!schedule) return null;
  const dates = Object.keys(data).sort();
  const lastInj = dates.filter(d => d <= selectedDate && (data[d]?.drugs?.[drugKey] || 0) > 0).pop();
  if (!lastInj) return null;
  const todayDate = parseDate(selectedDate);
  const lastInjDate = parseDate(lastInj);
  const daysSince = Math.round((todayDate - lastInjDate) / (1000*60*60*24));
  const daysOverdue = daysSince - schedule.intervalDays;
  if (daysOverdue <= 0) return null; // not overdue
  const lastTime = data[lastInj]?.drugTimes?.[drugKey] || null;
  // Suggest makeup time
  let suggestTime = '盡快補打';
  let urgency = 'normal';
  if (daysOverdue > schedule.intervalDays) {
    urgency = 'high';
    suggestTime = '已逾期較久，建議今天盡快補打（任何時間）';
  } else if (daysOverdue > 1) {
    urgency = 'medium';
    suggestTime = '建議今天補打';
    if (schedule.bestTime === 'morning') suggestTime += '（早上較佳）';
  } else {
    urgency = 'low';
    if (lastTime) {
      suggestTime = `比預定時間晚了，建議盡快補打`;
    } else {
      suggestTime = '今天記得打';
    }
  }
  return { daysSince, daysOverdue: daysOverdue.toFixed(1), intervalDays: schedule.intervalDays, label: schedule.label, note: schedule.note, suggestTime, urgency, lastInj, lastTime };
};

const cloudBackup = async (uid, data) => {
  if (!_firestore || !uid) throw new Error('未連線雲端');
  const docRef = _firestore.collection('users').doc(uid);
  
  // Split data into chunks if too large (Firestore 1MB limit)
  const jsonStr = JSON.stringify(data);
  const sizeMB = new Blob([jsonStr]).size / 1024 / 1024;
  
  if (sizeMB > 0.8) {
    // Split by date ranges
    const dates = Object.keys(data).sort();
    const chunkSize = Math.ceil(dates.length / Math.ceil(sizeMB / 0.5));
    const chunks = [];
    for (let i = 0; i < dates.length; i += chunkSize) {
      const chunkDates = dates.slice(i, i + chunkSize);
      const chunk = {};
      chunkDates.forEach(d => chunk[d] = data[d]);
      chunks.push(chunk);
    }
    // Save chunks
    const batch = _firestore.batch();
    batch.set(docRef, { 
      chunks: chunks.length, 
      totalDays: dates.length,
      lastBackup: new Date().toISOString(),
      version: 'v8.3'
    });
    chunks.forEach((chunk, i) => {
      batch.set(docRef.collection('chunks').doc(`chunk_${i}`), { data: JSON.stringify(chunk) });
    });
    await batch.commit();
  } else {
    await docRef.set({
      data: jsonStr,
      chunks: 0,
      totalDays: Object.keys(data).length,
      lastBackup: new Date().toISOString(),
      version: 'v8.3'
    });
  }
  
  // Also backup protocol & blood work & calibration
  const meta = {};
  ['daily_protocol', 'blood_work', 'drug_calibration'].forEach(k => {
    const v = localStorage.getItem(k);
    if (v) meta[k] = v;
  });
  if (Object.keys(meta).length) {
    await docRef.collection('meta').doc('settings').set(meta);
  }
  
  return { totalDays: Object.keys(data).length, sizeMB: sizeMB.toFixed(2) };
};

const cloudRestore = async (uid) => {
  if (!_firestore || !uid) throw new Error('未連線雲端');
  const docRef = _firestore.collection('users').doc(uid);
  const doc = await docRef.get();
  if (!doc.exists) throw new Error('雲端無此帳號的備份');
  
  const docData = doc.data();
  let restored = {};
  
  if (docData.chunks > 0) {
    // Restore from chunks
    for (let i = 0; i < docData.chunks; i++) {
      const chunkDoc = await docRef.collection('chunks').doc(`chunk_${i}`).get();
      if (chunkDoc.exists) {
        const chunk = JSON.parse(chunkDoc.data().data);
        Object.assign(restored, chunk);
      }
    }
  } else if (docData.data) {
    restored = JSON.parse(docData.data);
  }
  
  // Restore meta (protocol, blood work, calibration)
  try {
    const metaDoc = await docRef.collection('meta').doc('settings').get();
    if (metaDoc.exists) {
      const meta = metaDoc.data();
      Object.entries(meta).forEach(([k, v]) => localStorage.setItem(k, v));
    }
  } catch (e) { console.warn('Meta restore warning:', e); }
  
  return { data: restored, lastBackup: docData.lastBackup, totalDays: docData.totalDays };
};

// === IndexedDB Photo Storage (persistent, large capacity) ===
const DB_NAME = 'steroid_photos';
const DB_VERSION = 1;
const DB_STORE = 'photos';
let _db = null;

const openPhotoDB = () => {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE);
      }
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => { console.error('IndexedDB error', e); reject(e); };
  });
};

// Migrate photos from localStorage to IndexedDB (one-time)
const migratePhotosToIDB = async () => {
  try {
    const db = await openPhotoDB();
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('photo_')) keys.push(key);
    }
    if (!keys.length) return 0;
    const tx = db.transaction(DB_STORE, 'readwrite');
    const store = tx.objectStore(DB_STORE);
    let migrated = 0;
    for (const key of keys) {
      const val = localStorage.getItem(key);
      if (val) {
        store.put(val, key);
        migrated++;
      }
    }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    // Remove from localStorage after successful migration
    keys.forEach(k => localStorage.removeItem(k));
    console.log(`Migrated ${migrated} photos to IndexedDB`);
    return migrated;
  } catch (e) { console.error('Photo migration error:', e); return 0; }
};

// Compress image to target width, return base64 JPEG
const compressImage = (file, maxWidth = 480, quality = 0.6) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// === Calibration / Learning System ===
// Stores user subjective ratings and computes adaptive offsets
const CALIB_KEY = 'ai_calibration';
const CALIB_METRICS = ['pumpScore', 'definitionScore', 'waterScore'];
// User rates on 5-point scale: maps to score adjustments
// 1=很低 2=偏低 3=準確 4=偏高 5=很高
// If user says AI is "偏高" (4), we reduce future scores; "偏低" (2), we increase
const loadCalibration = () => {
  try { return JSON.parse(localStorage.getItem(CALIB_KEY) || '{"entries":[],"offsets":{"face":{},"body":{}}}'); }
  catch { return { entries: [], offsets: { face: {}, body: {} } }; }
};
const saveCalibration = (cal) => localStorage.setItem(CALIB_KEY, JSON.stringify(cal));

// Record a user rating and recalculate offsets
const recordCalibrationEntry = (date, photoType, metric, aiRaw, userRating) => {
  // userRating: 1-5 (1=AI太低, 2=偏低, 3=準確, 4=偏高, 5=AI太高)
  // Convert to adjustment direction: 3=no change, <3=AI underestimates, >3=AI overestimates
  const cal = loadCalibration();
  // Remove old entry for same date/type/metric
  cal.entries = cal.entries.filter(e => !(e.date === date && e.type === photoType && e.metric === metric));
  cal.entries.push({ date, type: photoType, metric, aiRaw, userRating, ts: Date.now() });
  // Keep last 100 entries max
  if (cal.entries.length > 100) cal.entries = cal.entries.slice(-100);
  // Recalculate offsets using exponentially weighted recent entries
  ['face', 'body'].forEach(t => {
    if (!cal.offsets[t]) cal.offsets[t] = {};
    CALIB_METRICS.forEach(m => {
      const relevant = cal.entries.filter(e => e.type === t && e.metric === m);
      if (!relevant.length) { cal.offsets[t][m] = 0; return; }
      // Weight recent entries more (exponential decay, half-life = 10 entries)
      let wSum = 0, wTotal = 0;
      relevant.forEach((e, i) => {
        const w = Math.pow(0.93, relevant.length - 1 - i); // newer = higher weight
        // userRating 3 = correct, <3 = AI underestimates (need positive offset), >3 = AI overestimates (need negative offset)
        const delta = (3 - e.userRating) * 12; // each step = ~12 points adjustment
        wSum += delta * w;
        wTotal += w;
      });
      cal.offsets[t][m] = Math.round(wSum / wTotal);
    });
  });
  saveCalibration(cal);
  return cal;
};

// Apply calibration offsets to raw scores
const applyCalibration = (rawScores, photoType) => {
  const cal = loadCalibration();
  const offsets = cal.offsets[photoType] || {};
  const calibrated = { ...rawScores };
  CALIB_METRICS.forEach(m => {
    if (offsets[m]) {
      calibrated[m] = Math.min(100, Math.max(0, (calibrated[m] || 0) + offsets[m]));
    }
  });
  // Recalculate labels based on calibrated scores
  calibrated.pumpLabel = calibrated.pumpScore > 65 ? '💪 Pump' : calibrated.pumpScore > 40 ? '正常' : '😐 Flat';
  calibrated.defLabel = calibrated.definitionScore > 60 ? '✨ 明顯' : calibrated.definitionScore > 35 ? '普通' : '不明顯';
  calibrated.waterLabel = calibrated.waterScore > 60 ? '💧 偏水' : calibrated.waterScore > 35 ? '輕微' : '✅ 乾爽';
  calibrated._calibrated = true;
  calibrated._offsets = offsets;
  return calibrated;
};

// Get calibration stats
const getCalibStats = () => {
  const cal = loadCalibration();
  return { count: cal.entries.length, offsets: cal.offsets };
};

// === AutoSleep CSV Parser ===
const parseAutoSleepCSV = (csvText) => {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return [];
  const entries = [];
  const hmsToMin = (s) => {
    if (!s || !s.includes(':')) return 0;
    const parts = s.trim().split(':').map(Number);
    return (parts[0]||0)*60 + (parts[1]||0) + (parts[2]||0)/60;
  };
  const parseCSVLine = (line) => {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  };
  for (let i = 1; i < lines.length; i++) {
    try {
      const cols = parseCSVLine(lines[i]);
      if (cols.length < 16) continue;
      const wakeStr = cols[4];
      if (!wakeStr || !wakeStr.includes('-')) continue;
      const datePart = wakeStr.split(' ')[0];
      const bedTime = cols[3] ? cols[3].split(' ')[1]?.slice(0,5) : '';
      const wakeTime = wakeStr.split(' ')[1]?.slice(0,5) || '';
      const totalSleepMin = hmsToMin(cols[9]);
      const efficiency = parseFloat(cols[11]) || 0;
      const deepMin = Math.round(hmsToMin(cols[15]));
      const sleepHR = parseFloat(cols[17]) || 0;
      const hrv = parseFloat(cols[23]) || 0;
      const sleepHRV = parseFloat(cols[25]) || 0;
      const spo2 = parseFloat(cols[27]) || 0;
      const nonDeep = Math.max(0, totalSleepMin - deepMin);
      const remMin = Math.round(nonDeep * 0.35);
      const lightMin = Math.round(nonDeep * 0.65);
      const bedDuration = hmsToMin(cols[5]);
      const awakeMin = Math.round(Math.max(0, bedDuration - totalSleepMin));
      const quality = efficiency >= 90 ? 5 : efficiency >= 80 ? 4 : efficiency >= 70 ? 3 : efficiency >= 60 ? 2 : 1;
      entries.push({
        date: datePart,
        sleep: {
          bedtime: bedTime, wakeTime, quality,
          deep: String(deepMin), rem: String(remMin), light: String(lightMin), awake: String(awakeMin),
          source: 'autosleep',
          efficiency: Math.round(efficiency*10)/10,
          sleepHR: Math.round(sleepHR*10)/10,
          hrv: Math.round(hrv), sleepHRV: Math.round(sleepHRV),
          spo2: Math.round(spo2*10)/10,
          totalMin: Math.round(totalSleepMin),
        }
      });
    } catch (e) { console.error('CSV parse error line', i, e); }
  }
  return entries;
};
const bulkImportSleep = (data, sleepEntries) => {

    const sleep = {
      bedtime: decoded.bedtime || decoded.sleepStart || '',
      wakeTime: decoded.wakeTime || decoded.wakeEnd || '',
      quality: parseInt(decoded.quality) || 0,
      deep: decoded.deep ? String(parseInt(decoded.deep)) : '',
      rem: decoded.rem ? String(parseInt(decoded.rem)) : '',
      light: decoded.light ? String(parseInt(decoded.light)) : '',
      awake: decoded.awake ? String(parseInt(decoded.awake)) : '',
      source: decoded.source || 'health',
    };
    if (decoded.totalMinutes && !decoded.deep) {

      sleep.rem = String(Math.round(t * 0.25));
      sleep.awake = String(Math.round(t * 0.05));
    }
    // Auto quality from deep sleep ratio if not provided
    if (!sleep.quality && sleep.deep && sleep.bedtime && sleep.wakeTime) {
      const [bh,bm] = sleep.bedtime.split(':').map(Number);
      const [wh,wm] = sleep.wakeTime.split(':').map(Number);
      let totalMin = (wh*60+wm)-(bh*60+bm); if(totalMin<=0) totalMin+=1440;
      const deepRatio = parseInt(sleep.deep) / totalMin;
      sleep.quality = deepRatio > 0.25 ? 5 : deepRatio > 0.2 ? 4 : deepRatio > 0.15 ? 3 : deepRatio > 0.1 ? 2 : 1;
    }
    const newData = { ...data, [dateKey]: { ...existing, sleep, updatedAt: new Date().toISOString() } };
    saveDataFn(newData);
    // Clear URL params
    window.history.replaceState({}, '', window.location.pathname);
    return { date: dateKey, sleep };
  } catch (e) { console.error('Auto sleep import error:', e); return null; }
};

// Also support auto-import weight from URL: ?weight=75.2
const autoImportWeightFromURL = (data, saveDataFn) => {

};

// === Pharmacokinetic Engine ===
// Calculate estimated blood levels for each day
const calcPKLevels = (data, numDays = 30) => {
  const today_ = new Date();
  const startDate = new Date(today_);
  startDate.setDate(startDate.getDate() - numDays);

  const levels = []; // array of { date, totalT, e2estimate, byDrug: {} }

  for (let dayOffset = 0; dayOffset <= numDays + 7; dayOffset++) {
    const checkDate = new Date(startDate);
    checkDate.setDate(checkDate.getDate() + dayOffset);
    const dateStr = fmt(checkDate);

    let totalT = 0;
    let e2Contribution = 0;
    const byDrug = {};

    // For each date in data, check if injection happened and calculate remaining level
    Object.entries(data).forEach(([injDate, entry]) => {
      if (!entry.drugs) return;
      const injDay = parseDate(injDate);
      const daysSince = (checkDate - injDay) / (1000 * 60 * 60 * 24);
      if (daysSince < 0 || daysSince > 40) return; // too far

      Object.entries(entry.drugs).forEach(([drugKey, dose]) => {
        if (!dose || dose <= 0) return;
        const drug = DRUGS.find(d => d.key === drugKey);
        if (!drug?.pk) return;

        let mgRemaining = 0;
        if (drug.pk.esters) {
          // Multi-ester (Sustanon)
          drug.pk.esters.forEach(ester => {
            const mgInjected = (dose * ester.mg / drug.pk.perUnit);
            mgRemaining += mgInjected * Math.pow(0.5, daysSince / ester.halfLife);
          });
        } else {
          const mgInjected = dose * drug.pk.perUnit;
          mgRemaining += mgInjected * Math.pow(0.5, daysSince / drug.pk.halfLife);
        }

        if (!byDrug[drugKey]) byDrug[drugKey] = 0;
        byDrug[drugKey] += mgRemaining;
        totalT += mgRemaining;
        e2Contribution += mgRemaining * (drug.pk.aromatize || 0);
      });

      // AI (Aromasin) effect: reduces E2 by ~85% for ~3 days
      if (entry.drugs.ai && entry.drugs.ai > 0) {
        const daysSinceAI = daysSince;
        if (daysSinceAI >= 0 && daysSinceAI < 3) {
          e2Contribution *= 0.15; // 85% reduction
        } else if (daysSinceAI >= 3 && daysSinceAI < 5) {
          e2Contribution *= 0.5; // partial recovery
        }
      }
    });

    levels.push({ date: dateStr, totalT: Math.round(totalT * 10) / 10, e2: Math.round(e2Contribution * 100) / 100, byDrug });
  }
  return levels;
};

// === Pattern Recognition Engine (v2: uses new check-in scores + legacy symptoms) ===
const detectPatterns = (data) => {
  const dates = Object.keys(data).sort();
  if (dates.length < 3) return [];
  const patterns = [];

  // Helper: get check-in score for a date (0-5 scale), returns null if no data
  const getScore = (date, checkinKey, itemKey) => data[date]?.[checkinKey]?.[itemKey] ?? null;

  // === Pattern 1: Drug dose → Check-in score correlation ===
  // For each drug+checkin combo, compare average scores on high-dose days vs low-dose days
  DRUGS.forEach(drug => {
    if (!drug.pk) return;
    const doseValues = dates.map(d => data[d]?.drugs?.[drug.key] || 0).filter(v => v > 0);
    if (doseValues.length < 3) return;
    const sorted = [...doseValues].sort((a,b)=>a-b);
    const medianDose = sorted[Math.floor(sorted.length/2)];

    // Check morning + evening indicators
    const allCheckins = [...MORNING_CHECKIN.map(c => ({...c, src: 'morningScores'})), ...EVENING_CHECKIN.map(c => ({...c, src: 'eveningScores'}))];
    allCheckins.forEach(item => {
      for (let lag = 0; lag <= 3; lag++) {
        const highScores = [], lowScores = [];
        dates.forEach((date, i) => {
          const dose = data[date]?.drugs?.[drug.key] || 0;
          if (dose === 0) return;
          const targetIdx = i + lag;
          if (targetIdx >= dates.length) return;
          const score = getScore(dates[targetIdx], item.src, item.key);
          if (score === null) return;
          if (dose >= medianDose) highScores.push(score);
          else lowScores.push(score);
        });
        if (highScores.length < 2 || lowScores.length < 2) continue;
        const highAvg = highScores.reduce((a,b)=>a+b,0)/highScores.length;
        const lowAvg = lowScores.reduce((a,b)=>a+b,0)/lowScores.length;
        const diff = highAvg - lowAvg;
        // For reversed indicators (high=bad), flip interpretation
        const isReversed = item.key === 'face_puffiness' || item.key === 'skin_oil' || item.key === 'body_temp';
        const effectiveDiff = isReversed ? diff : -diff; // negative = worse on high dose
        if (Math.abs(diff) > 0.6) {
          const direction = effectiveDiff > 0 ? '惡化' : '改善';
          patterns.push({
            type: 'drug_checkin',
            drug: drug.label, indicator: item.label, lag,
            highAvg: highAvg.toFixed(1), lowAvg: lowAvg.toFixed(1),
            confidence: Math.min(90, Math.round(Math.abs(diff) * 30 + (highScores.length + lowScores.length) * 2)),
            text: `${drug.label} 高劑量${lag > 0 ? ' '+lag+'天後' : ''}「${item.label}」${direction}（高劑量: ${highAvg.toFixed(1)} vs 低劑量: ${lowAvg.toFixed(1)}）`
          });
        }
      }
    });
  });

  // === Pattern 2: Drug dose → legacy symptom correlation (backward compat) ===
  DRUGS.forEach(drug => {
    if (!drug.pk) return;
    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      for (let lag = 0; lag <= 4; lag++) {
        let highDoseWithSym = 0, highDoseNoSym = 0, lowDoseWithSym = 0, lowDoseNoSym = 0;
        const doseValues = dates.map(d => data[d]?.drugs?.[drug.key] || 0).filter(v => v > 0);
        if (doseValues.length < 3) continue;
        const medianDose = [...doseValues].sort((a,b)=>a-b)[Math.floor(doseValues.length/2)];
        dates.forEach((date, i) => {
          const dose = data[date]?.drugs?.[drug.key] || 0;
          if (dose === 0) return;
          const targetIdx = i + lag;
          if (targetIdx >= dates.length) return;
          const hasSym = flattenSymptoms(data[dates[targetIdx]]?.symptoms).includes(sym.key);
          const highDose = dose >= medianDose;
          if (highDose && hasSym) highDoseWithSym++;
          else if (highDose && !hasSym) highDoseNoSym++;
          else if (!highDose && hasSym) lowDoseWithSym++;
          else lowDoseNoSym++;
        });
        const totalHigh = highDoseWithSym + highDoseNoSym;
        const totalLow = lowDoseWithSym + lowDoseNoSym;
        if (totalHigh < 2 || totalLow < 2) continue;
        const highRate = highDoseWithSym / totalHigh;
        const lowRate = lowDoseWithSym / totalLow;
        if (highRate > lowRate + 0.25 && highRate > 0.4) {
          patterns.push({
            type: 'drug_symptom', drug: drug.label, symptom: sym.label, lag,
            confidence: Math.min(95, Math.round((highRate - lowRate) * 100 + totalHigh * 2)),
            text: `${drug.label} 劑量偏高時，${lag > 0 ? lag + '天後' : '當天'}出現「${sym.label}」的機率 ${Math.round(highRate*100)}%（低劑量時 ${Math.round(lowRate*100)}%）`
          });
        }
      }
    });
  });

  // === Pattern 3: Sleep → next-day check-in scores ===
  const sleepDates = dates.filter(d => data[d]?.sleep?.bedtime && data[d]?.sleep?.wakeTime);
  if (sleepDates.length >= 4) {
    const sleepHours = {};
    sleepDates.forEach(d => {
      const s = data[d].sleep;
      const [bh,bm] = s.bedtime.split(':').map(Number);
      const [wh,wm] = s.wakeTime.split(':').map(Number);
      let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
      sleepHours[d] = mins / 60;
    });
    const avgSleep = Object.values(sleepHours).reduce((a,b)=>a+b,0) / Object.values(sleepHours).length;

    // Check-in scores after bad vs good sleep
    [...MORNING_CHECKIN, ...EVENING_CHECKIN].forEach(item => {
      const src = MORNING_CHECKIN.includes(item) ? 'morningScores' : 'eveningScores';
      const badSleepScores = [], goodSleepScores = [];
      sleepDates.forEach(d => {
        const nextIdx = dates.indexOf(d) + 1;
        if (nextIdx >= dates.length) return;
        const nextDate = dates[nextIdx];
        const score = getScore(nextDate, src, item.key);
        if (score === null) return;
        if (sleepHours[d] < avgSleep - 0.5) badSleepScores.push(score);
        else if (sleepHours[d] >= avgSleep + 0.3) goodSleepScores.push(score);
      });
      if (badSleepScores.length < 2 || goodSleepScores.length < 2) return;
      const badAvg = badSleepScores.reduce((a,b)=>a+b,0)/badSleepScores.length;
      const goodAvg = goodSleepScores.reduce((a,b)=>a+b,0)/goodSleepScores.length;
      const diff = goodAvg - badAvg;
      if (Math.abs(diff) > 0.5) {
        patterns.push({
          type: 'sleep_checkin',
          indicator: item.label,
          confidence: Math.min(85, Math.round(Math.abs(diff) * 25 + (badSleepScores.length + goodSleepScores.length) * 2)),
          text: `睡不好隔天「${item.label}」平均 ${badAvg.toFixed(1)}，睡好時 ${goodAvg.toFixed(1)}（差 ${diff > 0 ? '+' : ''}${diff.toFixed(1)}）`
        });
      }
    });
  }

  // === Pattern 4: Injection timing patterns ===
  DRUGS.forEach(drug => {
    const injDates = dates.filter(d => (data[d]?.drugs?.[drug.key] || 0) > 0);
    if (injDates.length < 3) return;
    const gaps = [];
    for (let i = 1; i < injDates.length; i++) {
      const d1 = parseDate(injDates[i-1]), d2 = parseDate(injDates[i]);
      gaps.push(Math.round((d2 - d1) / (1000*60*60*24)));
    }
    const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
    patterns.push({
      type: 'schedule', drug: drug.label, avgGap: avgGap.toFixed(1),
      text: `${drug.label} 平均每 ${avgGap.toFixed(1)} 天注射一次`,
      confidence: 100
    });
  });

  // === Pattern 5: Week-over-week check-in score trends ===
  if (dates.length >= 7) {
    const lastWeek = dates.slice(-7);
    const prevWeek = dates.slice(-14, -7);
    if (prevWeek.length >= 3) {
      [...MORNING_CHECKIN, ...EVENING_CHECKIN].forEach(item => {
        const src = MORNING_CHECKIN.includes(item) ? 'morningScores' : 'eveningScores';
        const recentVals = lastWeek.map(d => getScore(d, src, item.key)).filter(v => v !== null);
        const prevVals = prevWeek.map(d => getScore(d, src, item.key)).filter(v => v !== null);
        if (recentVals.length < 2 || prevVals.length < 2) return;
        const recentAvg = recentVals.reduce((a,b)=>a+b,0)/recentVals.length;
        const prevAvg = prevVals.reduce((a,b)=>a+b,0)/prevVals.length;
        const diff = recentAvg - prevAvg;
        const isReversed = item.key === 'face_puffiness' || item.key === 'skin_oil' || item.key === 'body_temp';
        if (Math.abs(diff) > 0.5) {
          const improving = isReversed ? diff < 0 : diff > 0;
          patterns.push({
            type: 'trend',
            indicator: item.label,
            direction: improving ? 'improving' : 'declining',
            confidence: Math.min(80, Math.round(Math.abs(diff) * 25 + recentVals.length * 3)),
            text: `「${item.label}」${improving ? '📈 改善中' : '📉 下降中'}（本週 ${recentAvg.toFixed(1)} vs 上週 ${prevAvg.toFixed(1)}）`
          });
        }
      });
    }
  }

  return patterns.sort((a,b) => b.confidence - a.confidence);
};

// === Smart Daily Briefing ===
const generateBriefing = (data, selectedDate) => {
  const items = [];
  const entry = data[selectedDate] || {};
  const dates = Object.keys(data).sort();
  const dateIdx = dates.indexOf(selectedDate);
  const todayDate = parseDate(selectedDate);

  // 1. PK level status
  const levels = calcPKLevels(data, 14);
  const todayLevel = levels.find(l => l.date === selectedDate);
  if (todayLevel && todayLevel.totalT > 0) {
    const maxT = Math.max(...levels.map(l => l.totalT));
    const minT = Math.min(...levels.filter(l => l.totalT > 0).map(l => l.totalT));
    const pctOfRange = maxT > minT ? ((todayLevel.totalT - minT) / (maxT - minT) * 100).toFixed(0) : 50;
    const phase = pctOfRange > 70 ? '📈 波峰附近' : pctOfRange > 30 ? '➡️ 穩定區間' : '📉 波谷';
    items.push({ icon: '💉', text: `預估體內活性 T: ${todayLevel.totalT}mg — ${phase}`, color: pctOfRange > 70 ? 'var(--green)' : pctOfRange > 30 ? 'var(--blue)' : 'var(--orange)' });
    if (todayLevel.e2 > 0) {
      items.push({ icon: '🔬', text: `E2 貢獻指數: ${todayLevel.e2.toFixed(1)} — ${todayLevel.e2 > 3 ? '⚠️ 偏高，留意水腫' : '正常範圍'}`, color: todayLevel.e2 > 3 ? 'var(--orange)' : 'var(--green)' });
    }
  }

  // 2. Days since last injection + missed injection warnings
  DRUGS.forEach(drug => {
    const lastInj = dates.filter(d => d <= selectedDate && (data[d]?.drugs?.[drug.key] || 0) > 0).pop();
    if (lastInj) {
      const daysSince = Math.round((todayDate - parseDate(lastInj)) / (1000*60*60*24));
      if (daysSince <= 14 && daysSince > 0) {
        const missed = getMissedInjectionInfo(data, drug.key, selectedDate);
        if (missed && missed.urgency !== 'low') {
          items.push({ icon: '⏰', text: `${drug.label} 已逾期 ${missed.daysOverdue} 天 — ${missed.suggestTime}`, color: missed.urgency === 'high' ? 'var(--red)' : 'var(--orange)' });
        } else {
          items.push({ icon: '📅', text: `距離上次 ${drug.label}: ${daysSince} 天`, color: 'var(--text2)' });
        }
      }
    }
  });

  // 3. Sleep last night
  const yesterday = fmt(new Date(todayDate.getTime() - 86400000));
  const sleepEntry = entry.sleep || data[yesterday]?.sleep;
  if (sleepEntry?.bedtime && sleepEntry?.wakeTime) {
    const [bh,bm] = sleepEntry.bedtime.split(':').map(Number);
    const [wh,wm] = sleepEntry.wakeTime.split(':').map(Number);
    let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
    const hrs = (mins/60).toFixed(1);
    const quality = sleepEntry.quality ? ['','😫','😕','😐','🙂','😴'][sleepEntry.quality] : '';
    let sleepExtra = '';
    if (sleepEntry.hrv) sleepExtra += ` | HRV ${sleepEntry.hrv}`;
    if (sleepEntry.sleepHR) sleepExtra += ` | HR ${sleepEntry.sleepHR}`;
    if (sleepEntry.spo2) sleepExtra += ` | SpO2 ${sleepEntry.spo2}%`;
    items.push({ icon: '😴', text: `昨晚睡 ${hrs} 小時 ${quality}${sleepExtra}${parseFloat(hrs) < 6 ? ' ⚠️ 睡眠不足' : ''}`, color: parseFloat(hrs) < 6 ? 'var(--orange)' : 'var(--green)' });
    if (sleepEntry.hrv && sleepEntry.hrv < 30) {
      items.push({ icon: '💓', text: `HRV 偏低 (${sleepEntry.hrv}) — 身體可能處於壓力/恢復不足狀態`, color: 'var(--orange)' });
    }
  }

  // 4. Weight trend
  const recentWeights = dates.filter(d => d <= selectedDate && data[d]?.weight).slice(-7);
  if (recentWeights.length >= 2) {
    const latest = data[recentWeights[recentWeights.length-1]].weight;
    const prev = data[recentWeights[0]].weight;
    const diff = (latest - prev).toFixed(1);
    items.push({ icon: '⚖️', text: `體重 ${latest}kg（${parseFloat(diff) >= 0 ? '+' : ''}${diff}kg 近${recentWeights.length}天）`, color: Math.abs(parseFloat(diff)) > 1 ? 'var(--orange)' : 'var(--text2)' });
  }

  // 5. Check-in score trends (new system)
  const recent3 = dates.filter(d => d <= selectedDate).slice(-3);
  // Morning score trends
  const morningTrends = {};
  MORNING_CHECKIN.forEach(item => {
    const vals = recent3.map(d => data[d]?.morningScores?.[item.key]).filter(v => v !== undefined);
    if (vals.length >= 2) {
      const avg = vals.reduce((s,v)=>s+v,0)/vals.length;
      morningTrends[item.key] = avg;
    }
  });
  if (morningTrends.morning_erection !== undefined && morningTrends.morning_erection < 2) {
    items.push({ icon: '⚠️', text: `晨勃近3天平均偏低 (${morningTrends.morning_erection.toFixed(1)}/5) — 檢查 E2 平衡`, color: 'var(--orange)' });

  if (morningTrends.face_puffiness !== undefined && morningTrends.face_puffiness > 3) {

  }
  if (morningTrends.joint_feel !== undefined && morningTrends.joint_feel < 2) {

  }
  // Evening score trends
  const eveningTrends = {};
  EVENING_CHECKIN.forEach(item => {
    const vals = recent3.map(d => data[d]?.eveningScores?.[item.key]).filter(v => v !== undefined);
    if (vals.length >= 2) eveningTrends[item.key] = vals.reduce((s,v)=>s+v,0)/vals.length;
  });
  if (eveningTrends.libido_level !== undefined && eveningTrends.libido_level < 2) {
    items.push({ icon: '🔥', text: `性慾近3天偏低 (${eveningTrends.libido_level.toFixed(1)}/5) — E2 失衡或 T 波谷`, color: 'var(--orange)' });
  }
  if (eveningTrends.mood_stability !== undefined && eveningTrends.mood_stability < 2) {
    items.push({ icon: '🧠', text: `情緒不穩定 — 考慮增加注射頻率以減少波動`, color: 'var(--orange)' });
  }

  // Ad-hoc symptom trends
  const adhocFreq = {};
  recent3.forEach(d => {
    (data[d]?.adhocSymptoms || []).forEach(s => { adhocFreq[s] = (adhocFreq[s]||0) + 1; });
  });
  const frequentAdhoc = Object.entries(adhocFreq).filter(([,c]) => c >= 2).map(([k]) => {
    const s = ADHOC_SYMPTOMS.find(x => x.key === k);
    return s ? s.label : k;
  });
  if (frequentAdhoc.length) {
    items.push({ icon: '⚠️', text: `近3天反覆出現：${frequentAdhoc.join('、')}`, color: 'var(--red)' });
  }

  // Legacy symptom support
  const recentNeg = {};
  recent3.forEach(d => {
    flattenSymptoms(data[d]?.symptoms).forEach(s => {
      const sym = SYMPTOMS.find(x => x.key === s);
      if (sym?.type === 'negative') recentNeg[s] = (recentNeg[s]||0) + 1;
    });
  });
  const frequent = Object.entries(recentNeg).filter(([,c]) => c >= 2).map(([k]) => SYMPTOMS.find(s=>s.key===k)?.label).filter(Boolean);
  if (frequent.length) {
    items.push({ icon: '📋', text: `舊版症狀紀錄：${frequent.join('、')}`, color: 'var(--text2)' });
  }

  return items;
};

  // Mood instability
  if (eAvg.mood_stability !== undefined && eAvg.mood_stability < 2) {
    suggestions.push({ type: 'info', text: '🧠 情緒不穩定 — 考慮增加注射頻率（減少荷爾蒙波動）、確認睡眠和 E2' });
  }

  // Energy consistently low
  if (eAvg.overall_energy !== undefined && eAvg.overall_energy < 2 && mAvg.energy_wakeup !== undefined && mAvg.energy_wakeup < 2) {
    suggestions.push({ type: 'warning', text: '⚡ 精力持續低落 — 檢查：睡眠品質、T 水平是否在波谷、甲狀腺功能' });
  }

  // Skin oil = DHT high
  if (mAvg.skin_oil !== undefined && mAvg.skin_oil > 3.5) {
    suggestions.push({ type: 'info', text: '💆 出油偏多 — DHT 活性偏高，Masteron/Proviron 會加重。可考慮降劑量' });
  }

  // Ad-hoc critical symptoms
  const criticalCount = {};
  recent.forEach(d => {
    (data[d]?.adhocSymptoms || []).forEach(s => { criticalCount[s] = (criticalCount[s]||0) + 1; });
  });
  if (criticalCount.nipple_sens >= 2) {
    suggestions.push({ type: 'warning', text: '⚠️ 乳頭敏感反覆出現 — 立即考慮 Nolvadex 20mg/天 + 查 E2 血檢' });
  }
  if (criticalCount.bp_high_feel >= 2 || criticalCount.headache >= 3) {
    suggestions.push({ type: 'warning', text: '❤️‍🔥 血壓/頭痛反覆 — 立即量血壓、查 HCT。HCT>52% 需要捐血' });
  }
  if (criticalCount.shortness_breath >= 1) {
    suggestions.push({ type: 'warning', text: '🚨 出現呼吸困難 — HCT 可能過高，建議立即抽血檢查' });
  }
  if (criticalCount.night_sweats >= 3) {
    suggestions.push({ type: 'info', text: '💦 夜間盜汗頻繁 — 如果在用 Tren，這是常見副作用。也要排除 E2 偏高' });
  }

  // PK fluctuation
  const levels = calcPKLevels(data, 14);
  const activeLevels = levels.filter(l => l.totalT > 0);
  if (activeLevels.length >= 7) {
    const max = Math.max(...activeLevels.map(l => l.totalT));
    const min = Math.min(...activeLevels.map(l => l.totalT));
    const fluctuation = max > 0 ? ((max - min) / max * 100).toFixed(0) : 0;
    if (fluctuation > 60) {
      suggestions.push({ type: 'info', text: `📊 血濃度波動 ${fluctuation}% — 考慮增加注射頻率來減少波動和副作用` });
    }
  }

  // All good
  if (!suggestions.length && recent.length >= 7) {
    const goodMorning = Object.values(mAvg).filter(v => v >= 3).length;
    const goodEvening = Object.values(eAvg).filter(v => v >= 3).length;
    if (goodMorning + goodEvening >= 4) {
      suggestions.push({ type: 'good', text: '✅ 各項指標穩定！check-in 分數整體良好，建議維持目前方案' });
    }
  }

  return suggestions;
};

// AI Analysis: compute face/body metrics from image
const analyzePhoto = (dataUrl, type) => {
  // type: 'face' or 'body'
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 300; // higher res for better analysis
      let w = img.width, h = img.height;
      if (w > h) { h = (size / w) * h; w = size; } else { w = (size / h) * w; h = size; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);
      const pixels = imageData.data;
      const n = pixels.length / 4;

      // --- Global stats ---
      let totalR = 0, totalG = 0, totalB = 0, totalBright = 0;
      let skinPixels = 0, rednessSum = 0;
      // Per-pixel brightness array for edge/contrast analysis
      const brightMap = new Float32Array(n);

      for (let i = 0; i < pixels.length; i += 4) {
        const idx = i / 4;
        const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
        const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
        brightMap[idx] = brightness;
        totalR += r; totalG += g; totalB += b;
        totalBright += brightness;
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r - g) > 10 && brightness > 50 && brightness < 230) {
          skinPixels++;
          rednessSum += (r - g) / 255;
        }
      }

      const avgBright = totalBright / n;
      const avgR = totalR / n, avgG = totalG / n, avgB = totalB / n;
      const skinRatio = skinPixels / n;
      const avgRedness = skinPixels > 0 ? rednessSum / skinPixels : 0;

      // --- Edge detection (Sobel-like) for muscle definition ---
      // More edges in skin area = more visible muscle lines/definition
      let edgeSum = 0, edgeCount = 0;
      let skinEdgeSum = 0, skinEdgeCount = 0;
      const edgeMap = new Float32Array(n);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = y * w + x;
          // Sobel gradient magnitude
          const gx = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[y*w+(x-1)] - brightMap[(y+1)*w+(x-1)]
                     + brightMap[(y-1)*w+(x+1)] + 2*brightMap[y*w+(x+1)] + brightMap[(y+1)*w+(x+1)];
          const gy = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[(y-1)*w+x] - brightMap[(y-1)*w+(x+1)]
                     + brightMap[(y+1)*w+(x-1)] + 2*brightMap[(y+1)*w+x] + brightMap[(y+1)*w+(x+1)];
          const mag = Math.sqrt(gx * gx + gy * gy);
          edgeMap[idx] = mag;
          edgeSum += mag;
          edgeCount++;
          // Check if this pixel is skin-colored
          const pi = idx * 4;
          const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
          if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && brightMap[idx] > 50 && brightMap[idx] < 230) {
            skinEdgeSum += mag;
            skinEdgeCount++;
          }
        }
      }
      const avgEdge = edgeCount > 0 ? edgeSum / edgeCount : 0;
      const avgSkinEdge = skinEdgeCount > 0 ? skinEdgeSum / skinEdgeCount : 0;

      // --- Region analysis for body photos ---
      // Split into top/middle/bottom thirds
      const thirdH = Math.floor(h / 3);
      const regionStats = (startY, endY) => {
        let rSum = 0, bSum = 0, brSum = 0, cnt = 0, eSum = 0, skCnt = 0;
        for (let y = startY; y < endY; y++) {
          for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            const pi = idx * 4;
            const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
            const br = brightMap[idx];
            rSum += r; bSum += b; brSum += br; cnt++;
            eSum += edgeMap[idx] || 0;
            if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && br > 50 && br < 230) skCnt++;
          }
        }
        return { avgBright: brSum/cnt, avgEdge: eSum/cnt, skinRatio: skCnt/cnt, avgR: rSum/cnt, avgB: bSum/cnt };
      };
      const topRegion = regionStats(0, thirdH);
      const midRegion = regionStats(thirdH, thirdH * 2);
      const botRegion = regionStats(thirdH * 2, h);

      // --- Local contrast (for pump detection) ---
      // High local contrast in skin = vascularity/pump; low = flat
      let contrastSum = 0, contrastCount = 0;
      const blockSize = 8;
      for (let by = 0; by < h - blockSize; by += blockSize) {
        for (let bx = 0; bx < w - blockSize; bx += blockSize) {
          let bMin = 255, bMax = 0, hasSkin = false;
          for (let dy = 0; dy < blockSize; dy++) {
            for (let dx = 0; dx < blockSize; dx++) {
              const idx = (by+dy) * w + (bx+dx);
              const br = brightMap[idx];
              if (br < bMin) bMin = br;
              if (br > bMax) bMax = br;
              const pi = idx * 4;
              const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
              if (r > 80 && g > 40 && b > 20 && r > g && r > b) hasSkin = true;
            }
          }
          if (hasSkin) {
            contrastSum += (bMax - bMin);
            contrastCount++;
          }
        }
      }
      const localContrast = contrastCount > 0 ? contrastSum / contrastCount : 0;

      // --- Brightness variance in skin (smooth=水腫, textured=definition) ---
      let brightVarSum = 0, brightVarCnt = 0;
      for (let i = 0; i < n; i++) {
        const pi = i * 4;
        const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && brightMap[i] > 50 && brightMap[i] < 230) {
          brightVarSum += Math.pow(brightMap[i] - avgBright, 2);
          brightVarCnt++;
        }
      }
      const skinBrightVar = brightVarCnt > 0 ? Math.sqrt(brightVarSum / brightVarCnt) : 0;

      // === Compute scores ===
      const brightnessScore = Math.min(100, (avgBright / 180) * 100);
      const rednessScore = Math.min(100, avgRedness * 300);
      const puffScore = Math.min(100, skinRatio * 200);
      const swellingIndex = Math.round(brightnessScore * 0.3 + rednessScore * 0.4 + puffScore * 0.3);
      const warmth = Math.round(((avgR - avgB) / 255) * 100 + 50);

      // Muscle definition: edge density in skin areas (0-100)
      // avgSkinEdge typically 5-50 range
      const definitionScore = Math.min(100, Math.round((avgSkinEdge / 35) * 100));

      // Pump score: local contrast + edge density (higher = more pumped/vascular)
      // localContrast typically 20-100
      const pumpRaw = (localContrast / 80) * 50 + (avgSkinEdge / 30) * 30 + (skinBrightVar / 40) * 20;
      const pumpScore = Math.min(100, Math.max(0, Math.round(pumpRaw)));

      // Water retention (belly area for body) — smooth bright skin in mid region
      // For face: overall puffiness. For body: mid-region smoothness + brightness
      let waterScore;
      if (type === 'body') {
        // Belly: high brightness + low edge (smooth) + high skin ratio in mid region = water
        const midSmooth = Math.max(0, 1 - midRegion.avgEdge / 25);
        const midBright = midRegion.avgBright / 200;
        const midSkin = midRegion.skinRatio;
        waterScore = Math.min(100, Math.round((midSmooth * 40 + midBright * 30 + midSkin * 30) * 100));
      } else {
        // Face: puffiness = brightness + redness + skin smoothness
        const faceSmooth = Math.max(0, 1 - avgSkinEdge / 30);
        waterScore = Math.min(100, Math.round((faceSmooth * 30 + (avgBright/200) * 35 + skinRatio * 35) * 100));
      }

      // Flat vs pump label
      const pumpLabel = pumpScore > 65 ? '💪 Pump' : pumpScore > 40 ? '正常' : '😐 Flat';
      const defLabel = definitionScore > 60 ? '✨ 明顯' : definitionScore > 35 ? '普通' : '不明顯';
      const waterLabel = waterScore > 60 ? '💧 偏水' : waterScore > 35 ? '輕微' : '✅ 乾爽';

      const rawScores = {
        brightness: Math.round(brightnessScore),
        redness: Math.round(rednessScore),
        swellingIndex: Math.min(100, swellingIndex),
        warmth: Math.min(100, Math.max(0, warmth)),
        skinRatio: Math.round(skinRatio * 100),
        definitionScore: Math.min(100, definitionScore),
        pumpScore,
        waterScore: Math.min(100, waterScore),
        pumpLabel,
        defLabel,
        waterLabel,
        type: type || 'face',
      };
      // Apply learned calibration offsets
      const calibrated = applyCalibration(rawScores, type || 'face');
      calibrated._raw = { pumpScore, definitionScore, waterScore: Math.min(100, waterScore) };
      resolve(calibrated);
    };
    img.src = dataUrl;
  });
};

function App() {
  const [tab, setTab] = useState('record');
  const [data, setData] = useState(loadData);
  const [selectedDate, setSelectedDate] = useState(today());
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return [d.getFullYear(), d.getMonth()]; });
  const [saveStatus, setSaveStatus] = useState('');
  const [syncStatus, setSyncStatus] = useState('');

  const [autoImportMsg, setAutoImportMsg] = useState('');

  const updateData = useCallback((newData) => {
    setData(newData);
    saveData(newData);
    setSyncStatus('syncing');
    (async () => {
      try {
        const uid = getFirebaseUID();
        if (_firestore && uid) {
          await cloudBackup(uid, newData);
          setSyncStatus('synced');
          console.log('[AutoSync] ⬆️ backed up to cloud');
          setTimeout(() => setSyncStatus(''), 2000);
        } else {
          setSyncStatus('');
        }
      } catch (e) {
        console.warn('[AutoSync] backup failed:', e.message);
        setSyncStatus('error');
        setTimeout(() => setSyncStatus(''), 3000);
      }
    })();
  }, []);

  // Init: migrate photos from localStorage to IndexedDB + auto-import from URL
  useEffect(() => {
    migratePhotosToIDB().then(n => { if (n > 0) setAutoImportMsg(`✓ 已將 ${n} 張照片遷移到更安全的儲存空間`); });
    const currentData = loadData();
    const sleepResult = autoImportSleepFromURL(currentData, d => { setData(d); saveData(d); });
    if (sleepResult) {
      setAutoImportMsg(`✓ 已自動匯入 ${sleepResult.date} 睡眠資料`);
      setTimeout(() => setAutoImportMsg(''), 4000);
    }
    const weightResult = autoImportWeightFromURL(currentData, d => { setData(d); saveData(d); });
    if (weightResult) {
      setAutoImportMsg(`✓ 已自動匯入體重 ${weightResult}kg`);
      setTimeout(() => setAutoImportMsg(''), 4000);
    }
    // Auto-download from Firebase on app open
    (async () => {
      try {
        const cfg = getFirebaseConfig();
        if (cfg?.apiKey && cfg?.projectId) {
          if (!_firestore) initFirebase(cfg);
          const uid = getFirebaseUID();
          if (_firestore && uid) {
            const result = await cloudRestore(uid);
            if (result?.data && Object.keys(result.data).length > 0) {
              const local = loadData();
              const merged = { ...local };
              let syncCount = 0;
              Object.entries(result.data).forEach(([date, cloudEntry]) => {
                const localEntry = local[date];
                if (!localEntry) {
                  merged[date] = cloudEntry;
                  syncCount++;
                } else {
                  // Compare updatedAt timestamps - pick newer
                  const cloudTime = cloudEntry.updatedAt ? new Date(cloudEntry.updatedAt).getTime() : 0;
                  const localTime = localEntry.updatedAt ? new Date(localEntry.updatedAt).getTime() : 0;
                  if (cloudTime > localTime) {
                    merged[date] = cloudEntry;
                    syncCount++;
                  }
                }
              });
              if (syncCount > 0 || Object.keys(merged).length > Object.keys(local).length) {
                setData(merged);
                saveData(merged);
                setAutoImportMsg(`☁️ 已從雲端同步 ${syncCount} 天更新紀錄`);
                setTimeout(() => setAutoImportMsg(''), 3000);
              }
            }
            console.log('[AutoSync] ⬇️ cloud restore checked');
          }
        }
      } catch (e) { console.warn('[AutoSync] restore on open failed:', e.message); }
    })();
  }, []);

  const RecordIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
  const CalIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
  const ChartIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
  const MoreIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>;

  return (
    <>
      <div className="header">
        <h1>用藥追蹤</h1>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {syncStatus === 'syncing' && <span style={{fontSize:'0.7em',color:'var(--blue)'}}>☁️ 同步中...</span>}
          {syncStatus === 'synced' && <span style={{fontSize:'0.7em',color:'var(--green)'}}>☁️ ✓</span>}
          {syncStatus === 'error' && <span style={{fontSize:'0.7em',color:'var(--red)'}}>☁️ ✗</span>}
          <span style={{color:'var(--text2)',fontSize:'0.85em'}}>{selectedDate}</span>
        </div>
      </div>

      {autoImportMsg && (
        <div className="toast-container">
          <div className={`toast ${autoImportMsg.startsWith('✗') || autoImportMsg.startsWith('❌') ? 'error' : autoImportMsg.startsWith('⚠') ? 'warning' : 'success'}`}>
            {autoImportMsg}
          </div>
        </div>
      )}

      {tab === 'record' && <RecordPage data={data} updateData={updateData} selectedDate={selectedDate} setSelectedDate={setSelectedDate} saveStatus={saveStatus} setSaveStatus={setSaveStatus} />}
      {tab === 'calendar' && <CalendarPage data={data} calMonth={calMonth} setCalMonth={setCalMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setTab={setTab} />}
      {tab === 'smart' && <SmartPage data={data} updateData={updateData} selectedDate={selectedDate} />}
      {tab === 'chart' && <ChartPage data={data} setTab={setTab} />}
      {tab === 'face_timeline' && <PhotoTimelinePage data={data} type="face" setTab={setTab} />}
      {tab === 'body_timeline' && <PhotoTimelinePage data={data} type="body" setTab={setTab} />}
      {tab === 'more' && <MorePage data={data} updateData={updateData} />}

      <div className="tabs">
        <button className={`tab ${tab==='record'?'active':''}`} onClick={()=>setTab('record')}><RecordIcon />紀錄</button>
        <button className={`tab ${tab==='calendar'?'active':''}`} onClick={()=>setTab('calendar')}><CalIcon />日曆</button>
        <button className={`tab ${tab==='smart'?'active':''}`} onClick={()=>setTab('smart')} style={{position:'relative'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>智慧</button>
        <button className={`tab ${tab==='chart'?'active':''}`} onClick={()=>setTab('chart')}><ChartIcon />分析</button>
        <button className={`tab ${tab==='more'?'active':''}`} onClick={()=>setTab('more')}><MoreIcon />更多</button>

  );
}

  const [weight, setWeight] = useState(entry.weight || '');
