<title>用藥與症狀追蹤</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
:root{--bg:#0f1117;--card:#1a1d28;--card2:#22263a;--border:#2a2d38;--blue:#60a5fa;--pink:#f472b6;--green:#34d399;--purple:#a78bfa;--orange:#fb923c;--red:#ef4444;--text:#e0e0e0;--text2:#999;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:var(--card);padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.15em;color:var(--blue)}
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;color:var(--text2);font-size:0.7em;cursor:pointer;border:none;background:none;transition:color 0.2s}
.tab.active{color:var(--blue)}
.tab svg{width:22px;height:22px;margin-bottom:3px}
.page{padding:16px;max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.card h3{color:var(--blue);font-size:0.95em;margin-bottom:12px}
.drug-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.drug-label{min-width:100px;font-size:0.88em;color:var(--text2)}
.drug-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:1em;outline:none;width:100%}
.drug-input:focus{border-color:var(--blue)}
.drug-unit{font-size:0.8em;color:var(--text2);min-width:30px}
.sym-grid{display:flex;flex-wrap:wrap;gap:8px}
.sym-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.85em;cursor:pointer;transition:all 0.2s;user-select:none}
.sym-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sym-btn.positive.active{background:var(--green);border-color:var(--green)}
.sym-btn.negative.active{background:var(--red);border-color:var(--red)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.date-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.9em}
.date-nav button:active{background:var(--blue);color:#fff}
.date-nav .date{font-size:1.1em;font-weight:600;color:var(--blue);min-width:140px;text-align:center}
.save-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:1em;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.save-btn:active{opacity:0.7}
.save-btn.saved{background:var(--green)}
.note-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:0.9em;outline:none;resize:vertical;min-height:60px;font-family:inherit}
.note-input:focus{border-color:var(--blue)}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:0.78em}
.cal-header{text-align:center;color:var(--text2);padding:6px 0;font-weight:600}
.cal-day{background:var(--card2);border-radius:6px;padding:4px;min-height:52px;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;position:relative}
.cal-day:hover{border-color:var(--blue)}
.cal-day.today{border-color:var(--blue)}
.cal-day.selected{border-color:var(--orange)}
.cal-day.empty{background:transparent;cursor:default;border:none}
.cal-day .num{font-weight:600;margin-bottom:2px}
.cal-day .dots{display:flex;flex-wrap:wrap;gap:2px}
.cal-day .dot{width:6px;height:6px;border-radius:50%}
.cal-month{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month button{background:none;border:none;color:var(--blue);font-size:1.2em;cursor:pointer;padding:8px}
.cal-month .month-label{font-size:1em;font-weight:600}
/* Chart */
.chart-container{position:relative;height:280px;margin:8px 0}
/* History */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border)}
.hist-date{font-weight:600;color:var(--blue);margin-bottom:6px}
.hist-drugs{font-size:0.85em;color:var(--green);margin-bottom:4px}
.hist-symptoms{font-size:0.85em;color:var(--orange);margin-bottom:4px}
.hist-note{font-size:0.82em;color:var(--text2);font-style:italic}
/* Export */
.action-btn{display:block;width:100%;padding:12px;margin-bottom:10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.9em;cursor:pointer;text-align:center}
.action-btn:active{background:var(--blue);color:#fff}
.badge{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--blue)}
/* Photo */
.photo-section{display:flex;gap:12px;flex-wrap:wrap}
.photo-slot{flex:1;min-width:140px}
.photo-slot h4{font-size:0.85em;color:var(--text2);margin-bottom:8px;text-align:center}
.photo-frame{position:relative;width:100%;aspect-ratio:3/4;background:var(--card2);border:2px dashed var(--border);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-frame.has-photo{border-style:solid;border-color:var(--purple)}
.photo-frame img{width:100%;height:100%;object-fit:cover}
.photo-frame .placeholder{text-align:center;color:var(--text2);font-size:0.8em;padding:10px}
.photo-frame .placeholder svg{width:32px;height:32px;margin-bottom:4px;opacity:0.5}
.photo-frame .remove-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-input{display:none}
/* AI Analysis */
.ai-card{background:linear-gradient(135deg,#1a1d28,#22263a);border:1px solid var(--purple);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.ai-card h3{color:var(--purple);font-size:0.95em;margin-bottom:12px}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:0.85em}
.metric-bar{width:100px;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.metric-fill{height:100%;border-radius:4px;transition:width 0.3s}
/* Photo Compare */
.compare-container{display:flex;gap:8px;overflow-x:auto;padding:8px 0}
.compare-card{min-width:120px;flex-shrink:0;text-align:center}
.compare-card img{width:120px;height:160px;object-fit:cover;border-radius:8px;border:2px solid var(--border)}
.compare-card .compare-date{font-size:0.75em;color:var(--text2);margin-top:4px}
.compare-card .compare-score{font-size:0.7em;color:var(--purple);margin-top:2px}
/* Calibration feedback */
.calib-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.calib-section h4{font-size:0.8em;color:var(--text2);margin-bottom:8px}
.calib-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.82em}
.calib-label{min-width:70px;color:var(--text2);font-size:0.85em}
.calib-btns{display:flex;gap:4px;flex-wrap:wrap}
.calib-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.8em;cursor:pointer;transition:all 0.2s}
.calib-btn.selected{background:var(--purple);color:#fff;border-color:var(--purple)}
.calib-btn:active{opacity:0.7}
.calib-saved{font-size:0.75em;color:var(--green);margin-left:6px}
.calib-badge{display:inline-block;background:var(--purple);color:#fff;font-size:0.6em;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
/* Sleep section */
.sleep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sleep-field{display:flex;flex-direction:column;gap:4px}
.sleep-field label{font-size:0.78em;color:var(--text2)}
.sleep-field input,.sleep-field select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:0.95em;outline:none}
.sleep-field input:focus,.sleep-field select:focus{border-color:var(--blue)}
.sleep-total{text-align:center;padding:8px;background:var(--card2);border-radius:10px;margin-bottom:10px}
.sleep-total .hours{font-size:1.8em;font-weight:700;color:var(--blue)}
.sleep-total .hours-label{font-size:0.75em;color:var(--text2)}
.sleep-quality-btns{display:flex;gap:6px;margin-bottom:8px}
.sleep-q-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.8em;cursor:pointer;text-align:center;transition:all 0.2s}
.sleep-q-btn.active{border-color:var(--blue);color:#fff}
.sleep-q-btn.q1.active{background:#ef4444}
.sleep-q-btn.q2.active{background:#fb923c}
.sleep-q-btn.q3.active{background:#60a5fa}
.sleep-q-btn.q4.active{background:#34d399}
.sleep-q-btn.q5.active{background:#a78bfa}
.sleep-import-btn{width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--blue);font-size:0.82em;cursor:pointer;margin-top:6px;transition:all 0.2s}
.sleep-import-btn:active{background:var(--blue);color:#fff}
.sleep-source{font-size:0.7em;color:var(--text2);text-align:right;margin-top:4px}
.sleep-bar{display:flex;height:20px;border-radius:6px;overflow:hidden;margin:6px 0}
.sleep-bar div{transition:width 0.3s}
.storage-warn{background:var(--card2);border:1px solid var(--orange);border-radius:8px;padding:10px;margin-bottom:14px;font-size:0.82em;color:var(--orange)}
/* Time period tabs */
.period-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.period-tab{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:0.82em;cursor:pointer;white-space:nowrap;position:relative;transition:all 0.2s}
.period-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.period-tab .period-count{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.65em;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sym-time-label{font-size:0.75em;color:var(--text2);margin-left:4px}
/* Smart features */
.briefing{background:linear-gradient(135deg,#1a1d28,#1e2235);border:1px solid var(--blue);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.briefing h3{color:var(--blue);font-size:0.95em;margin-bottom:10px}
.briefing-item{padding:6px 0;font-size:0.85em;border-bottom:1px solid var(--border)}
.briefing-item:last-child{border-bottom:none}
.pk-curve{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.pattern-card{background:var(--card2);border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.85em}
.pattern-conf{display:inline-block;padding:1px 6px;border-radius:8px;font-size:0.75em;margin-left:4px}
.blood-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.blood-field{display:flex;flex-direction:column;gap:3px}
.blood-field label{font-size:0.75em;color:var(--text2)}
.blood-field input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:0.9em;outline:none}
.blood-field input:focus{border-color:var(--blue)}
.weight-row{display:flex;gap:10px;align-items:center}
.weight-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:1em;outline:none}
.dose-suggest{background:linear-gradient(135deg,#1a2235,#1e1a35);border:1px solid var(--purple);border-radius:var(--radius);padding:14px;margin-top:12px}
.dose-suggest h4{color:var(--purple);font-size:0.9em;margin-bottom:8px}
.tab-badge{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--red)}
/* Photo Timeline Grid */
.timeline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:10px}
.timeline-cell{position:relative;aspect-ratio:3/4;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.2s;background:var(--card2)}
.timeline-cell img{width:100%;height:100%;object-fit:cover}
.timeline-cell .tl-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));color:#fff;font-size:0.65em;padding:3px 5px;text-align:center}
.timeline-cell.selected{border-color:var(--purple);box-shadow:0 0 8px rgba(167,139,250,0.4)}
.timeline-cell .tl-check{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:var(--purple);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.timeline-cell.selected .tl-check{opacity:1}
/* Lightbox */
.lightbox-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:1000;display:flex;flex-direction:column;padding:10px}
.lightbox-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;color:#fff;flex-shrink:0}
.lightbox-header button{background:none;border:none;color:#fff;font-size:1.4em;cursor:pointer;padding:6px}
.lightbox-body{flex:1;display:flex;gap:8px;overflow-x:auto;align-items:center;justify-content:center;padding:8px}
.lightbox-body .lb-item{flex-shrink:0;max-height:80vh;display:flex;flex-direction:column;align-items:center}
.lightbox-body .lb-item img{max-height:70vh;max-width:90vw;object-fit:contain;border-radius:8px;border:2px solid var(--border)}
.lightbox-body .lb-item .lb-info{color:#ccc;font-size:0.8em;margin-top:6px;text-align:center}
/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--blue);font-size:0.9em;cursor:pointer;padding:8px 0;margin-bottom:8px}
.back-btn:active{opacity:0.7}
</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const DRUGS = [
  { key: 'sus', label: 'Sustanon', unit: 'ml', color: '#60a5fa',
    // Sustanon: 4 esters blend per 1ml=250mg: propionate 30mg(0.8d), phenylprop 60mg(1.5d), isocaproate 60mg(4d), decanoate 100mg(7.5d)

  { key: 'mood_good', label: '心情好', type: 'positive', cat: 'mood_energy' },
  { key: 'mood_bad', label: '心情差', type: 'negative', cat: 'mood_energy' },

  { key: 'energy_high', label: '精力充沛', type: 'positive', cat: 'mood_energy' },

  { key: 'irritable', label: '易怒', type: 'negative', cat: 'mood_energy' },
  { key: 'focus_good', label: '專注力好', type: 'positive', cat: 'mood_energy' },

  { key: 'joint_stiff', label: '關節卡', type: 'negative', cat: 'body' },
  { key: 'joint_smooth', label: '關節滑順', type: 'positive', cat: 'body' },

  { key: 'headache', label: '頭痛', type: 'negative', cat: 'body' },
  { key: 'bp_high', label: '血壓偏高', type: 'negative', cat: 'body' },

// Calculate missed injection info
const getMissedInjectionInfo = (data, drugKey, selectedDate) => {
  const schedule = DRUG_SCHEDULES[drugKey];
  if (!schedule) return null;
  const dates = Object.keys(data).sort();
  const lastInj = dates.filter(d => d <= selectedDate && (data[d]?.drugs?.[drugKey] || 0) > 0).pop();
  if (!lastInj) return null;
  const todayDate = parseDate(selectedDate);
  const lastInjDate = parseDate(lastInj);
  const daysSince = Math.round((todayDate - lastInjDate) / (1000*60*60*24));
  const daysOverdue = daysSince - schedule.intervalDays;
  if (daysOverdue <= 0) return null; // not overdue
  const lastTime = data[lastInj]?.drugTimes?.[drugKey] || null;
  // Suggest makeup time
  let suggestTime = '盡快補打';
  let urgency = 'normal';
  if (daysOverdue > schedule.intervalDays) {
    urgency = 'high';
    suggestTime = '已逾期較久，建議今天盡快補打（任何時間）';
  } else if (daysOverdue > 1) {
    urgency = 'medium';
    suggestTime = '建議今天補打';
    if (schedule.bestTime === 'morning') suggestTime += '（早上較佳）';
  } else {
    urgency = 'low';
    if (lastTime) {
      suggestTime = `比預定時間晚了，建議盡快補打`;
    } else {
      suggestTime = '今天記得打';
    }
  }
  return { daysSince, daysOverdue: daysOverdue.toFixed(1), intervalDays: schedule.intervalDays, label: schedule.label, note: schedule.note, suggestTime, urgency, lastInj, lastTime };
};

// === IndexedDB Photo Storage (persistent, large capacity) ===
const DB_NAME = 'steroid_photos';
const DB_VERSION = 1;
const DB_STORE = 'photos';
let _db = null;

const openPhotoDB = () => {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE);
      }
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => { console.error('IndexedDB error', e); reject(e); };
  });
};

// Migrate photos from localStorage to IndexedDB (one-time)
const migratePhotosToIDB = async () => {
  try {
    const db = await openPhotoDB();
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('photo_')) keys.push(key);
    }
    if (!keys.length) return 0;
    const tx = db.transaction(DB_STORE, 'readwrite');
    const store = tx.objectStore(DB_STORE);
    let migrated = 0;
    for (const key of keys) {
      const val = localStorage.getItem(key);
      if (val) {
        store.put(val, key);
        migrated++;
      }
    }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    // Remove from localStorage after successful migration
    keys.forEach(k => localStorage.removeItem(k));
    console.log(`Migrated ${migrated} photos to IndexedDB`);
    return migrated;
  } catch (e) { console.error('Photo migration error:', e); return 0; }
};

// Compress image to target width, return base64 JPEG
const compressImage = (file, maxWidth = 480, quality = 0.6) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// === Calibration / Learning System ===
// Stores user subjective ratings and computes adaptive offsets
const CALIB_KEY = 'ai_calibration';
const CALIB_METRICS = ['pumpScore', 'definitionScore', 'waterScore'];
// User rates on 5-point scale: maps to score adjustments
// 1=很低 2=偏低 3=準確 4=偏高 5=很高
// If user says AI is "偏高" (4), we reduce future scores; "偏低" (2), we increase
const loadCalibration = () => {
  try { return JSON.parse(localStorage.getItem(CALIB_KEY) || '{"entries":[],"offsets":{"face":{},"body":{}}}'); }
  catch { return { entries: [], offsets: { face: {}, body: {} } }; }
};
const saveCalibration = (cal) => localStorage.setItem(CALIB_KEY, JSON.stringify(cal));

// Record a user rating and recalculate offsets
const recordCalibrationEntry = (date, photoType, metric, aiRaw, userRating) => {
  // userRating: 1-5 (1=AI太低, 2=偏低, 3=準確, 4=偏高, 5=AI太高)
  // Convert to adjustment direction: 3=no change, <3=AI underestimates, >3=AI overestimates
  const cal = loadCalibration();
  // Remove old entry for same date/type/metric
  cal.entries = cal.entries.filter(e => !(e.date === date && e.type === photoType && e.metric === metric));
  cal.entries.push({ date, type: photoType, metric, aiRaw, userRating, ts: Date.now() });
  // Keep last 100 entries max
  if (cal.entries.length > 100) cal.entries = cal.entries.slice(-100);
  // Recalculate offsets using exponentially weighted recent entries
  ['face', 'body'].forEach(t => {
    if (!cal.offsets[t]) cal.offsets[t] = {};
    CALIB_METRICS.forEach(m => {
      const relevant = cal.entries.filter(e => e.type === t && e.metric === m);
      if (!relevant.length) { cal.offsets[t][m] = 0; return; }
      // Weight recent entries more (exponential decay, half-life = 10 entries)
      let wSum = 0, wTotal = 0;
      relevant.forEach((e, i) => {
        const w = Math.pow(0.93, relevant.length - 1 - i); // newer = higher weight
        // userRating 3 = correct, <3 = AI underestimates (need positive offset), >3 = AI overestimates (need negative offset)
        const delta = (3 - e.userRating) * 12; // each step = ~12 points adjustment
        wSum += delta * w;
        wTotal += w;
      });
      cal.offsets[t][m] = Math.round(wSum / wTotal);
    });
  });
  saveCalibration(cal);
  return cal;
};

// Apply calibration offsets to raw scores
const applyCalibration = (rawScores, photoType) => {
  const cal = loadCalibration();
  const offsets = cal.offsets[photoType] || {};
  const calibrated = { ...rawScores };
  CALIB_METRICS.forEach(m => {
    if (offsets[m]) {
      calibrated[m] = Math.min(100, Math.max(0, (calibrated[m] || 0) + offsets[m]));
    }
  });
  // Recalculate labels based on calibrated scores
  calibrated.pumpLabel = calibrated.pumpScore > 65 ? '💪 Pump' : calibrated.pumpScore > 40 ? '正常' : '😐 Flat';
  calibrated.defLabel = calibrated.definitionScore > 60 ? '✨ 明顯' : calibrated.definitionScore > 35 ? '普通' : '不明顯';
  calibrated.waterLabel = calibrated.waterScore > 60 ? '💧 偏水' : calibrated.waterScore > 35 ? '輕微' : '✅ 乾爽';
  calibrated._calibrated = true;
  calibrated._offsets = offsets;
  return calibrated;
};

// Get calibration stats

};

// === AutoSleep CSV Parser ===
const parseAutoSleepCSV = (csvText) => {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return [];
  const entries = [];
  const hmsToMin = (s) => {
    if (!s || !s.includes(':')) return 0;
    const parts = s.trim().split(':').map(Number);
    return (parts[0]||0)*60 + (parts[1]||0) + (parts[2]||0)/60;
  };
  const parseCSVLine = (line) => {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  };
  for (let i = 1; i < lines.length; i++) {
    try {
      const cols = parseCSVLine(lines[i]);
      if (cols.length < 16) continue;
      const wakeStr = cols[4];
      if (!wakeStr || !wakeStr.includes('-')) continue;
      const datePart = wakeStr.split(' ')[0];
      const bedTime = cols[3] ? cols[3].split(' ')[1]?.slice(0,5) : '';
      const wakeTime = wakeStr.split(' ')[1]?.slice(0,5) || '';
      const totalSleepMin = hmsToMin(cols[9]);
      const efficiency = parseFloat(cols[11]) || 0;
      const deepMin = Math.round(hmsToMin(cols[15]));
      const sleepHR = parseFloat(cols[17]) || 0;
      const hrv = parseFloat(cols[23]) || 0;
      const sleepHRV = parseFloat(cols[25]) || 0;
      const spo2 = parseFloat(cols[27]) || 0;
      const nonDeep = Math.max(0, totalSleepMin - deepMin);
      const remMin = Math.round(nonDeep * 0.35);
      const lightMin = Math.round(nonDeep * 0.65);
      const bedDuration = hmsToMin(cols[5]);
      const awakeMin = Math.round(Math.max(0, bedDuration - totalSleepMin));
      const quality = efficiency >= 90 ? 5 : efficiency >= 80 ? 4 : efficiency >= 70 ? 3 : efficiency >= 60 ? 2 : 1;
      entries.push({
        date: datePart,
        sleep: {
          bedtime: bedTime, wakeTime, quality,
          deep: String(deepMin), rem: String(remMin), light: String(lightMin), awake: String(awakeMin),
          source: 'autosleep',
          efficiency: Math.round(efficiency*10)/10,
          sleepHR: Math.round(sleepHR*10)/10,
          hrv: Math.round(hrv), sleepHRV: Math.round(sleepHRV),
          spo2: Math.round(spo2*10)/10,
          totalMin: Math.round(totalSleepMin),
        }
      });
    } catch (e) { console.error('CSV parse error line', i, e); }
  }
  return entries;
};

// === Pharmacokinetic Engine ===
// Calculate estimated blood levels for each day
const calcPKLevels = (data, numDays = 30) => {
  const today_ = new Date();
  const startDate = new Date(today_);
  startDate.setDate(startDate.getDate() - numDays);

  const levels = []; // array of { date, totalT, e2estimate, byDrug: {} }

  for (let dayOffset = 0; dayOffset <= numDays + 7; dayOffset++) {
    const checkDate = new Date(startDate);
    checkDate.setDate(checkDate.getDate() + dayOffset);
    const dateStr = fmt(checkDate);

    let totalT = 0;
    let e2Contribution = 0;
    const byDrug = {};

    // For each date in data, check if injection happened and calculate remaining level
    Object.entries(data).forEach(([injDate, entry]) => {
      if (!entry.drugs) return;
      const injDay = parseDate(injDate);
      const daysSince = (checkDate - injDay) / (1000 * 60 * 60 * 24);
      if (daysSince < 0 || daysSince > 40) return; // too far

      Object.entries(entry.drugs).forEach(([drugKey, dose]) => {
        if (!dose || dose <= 0) return;
        const drug = DRUGS.find(d => d.key === drugKey);
        if (!drug?.pk) return;

        let mgRemaining = 0;
        if (drug.pk.esters) {
          // Multi-ester (Sustanon)
          drug.pk.esters.forEach(ester => {
            const mgInjected = (dose * ester.mg / drug.pk.perUnit);
            mgRemaining += mgInjected * Math.pow(0.5, daysSince / ester.halfLife);
          });
        } else {
          const mgInjected = dose * drug.pk.perUnit;
          mgRemaining += mgInjected * Math.pow(0.5, daysSince / drug.pk.halfLife);
        }

        if (!byDrug[drugKey]) byDrug[drugKey] = 0;
        byDrug[drugKey] += mgRemaining;
        totalT += mgRemaining;
        e2Contribution += mgRemaining * (drug.pk.aromatize || 0);
      });

      // AI (Aromasin) effect: reduces E2 by ~85% for ~3 days
      if (entry.drugs.ai && entry.drugs.ai > 0) {
        const daysSinceAI = daysSince;
        if (daysSinceAI >= 0 && daysSinceAI < 3) {
          e2Contribution *= 0.15; // 85% reduction
        } else if (daysSinceAI >= 3 && daysSinceAI < 5) {
          e2Contribution *= 0.5; // partial recovery
        }
      }
    });

    levels.push({ date: dateStr, totalT: Math.round(totalT * 10) / 10, e2: Math.round(e2Contribution * 100) / 100, byDrug });
  }
  return levels;
};

// === Pattern Recognition Engine ===
const detectPatterns = (data) => {
  const dates = Object.keys(data).sort();
  if (dates.length < 5) return [];
  const patterns = [];

  // Pattern 1: Drug dose → symptom correlation with time lag
  DRUGS.forEach(drug => {
    if (!drug.pk) return;
    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      // Check 0-4 day lag
      for (let lag = 0; lag <= 4; lag++) {
        let highDoseWithSym = 0, highDoseNoSym = 0, lowDoseWithSym = 0, lowDoseNoSym = 0;
        const doseValues = dates.map(d => data[d]?.drugs?.[drug.key] || 0).filter(v => v > 0);
        if (doseValues.length < 3) continue;
        const medianDose = doseValues.sort((a,b)=>a-b)[Math.floor(doseValues.length/2)];

        dates.forEach((date, i) => {
          const dose = data[date]?.drugs?.[drug.key] || 0;
          if (dose === 0) return;
          const targetIdx = i + lag;
          if (targetIdx >= dates.length) return;
          const targetDate = dates[targetIdx];
          const hasSym = flattenSymptoms(data[targetDate]?.symptoms).includes(sym.key);
          const highDose = dose >= medianDose;
          if (highDose && hasSym) highDoseWithSym++;
          else if (highDose && !hasSym) highDoseNoSym++;
          else if (!highDose && hasSym) lowDoseWithSym++;
          else lowDoseNoSym++;
        });

        const totalHigh = highDoseWithSym + highDoseNoSym;
        const totalLow = lowDoseWithSym + lowDoseNoSym;
        if (totalHigh < 2 || totalLow < 2) continue;

        const highRate = highDoseWithSym / totalHigh;
        const lowRate = lowDoseWithSym / totalLow;
        if (highRate > lowRate + 0.25 && highRate > 0.4) {
          patterns.push({
            type: 'drug_symptom',
            drug: drug.label,
            symptom: sym.label,
            lag,
            highRate: Math.round(highRate * 100),
            lowRate: Math.round(lowRate * 100),
            confidence: Math.min(95, Math.round((highRate - lowRate) * 100 + totalHigh * 2)),
            text: `${drug.label} 劑量偏高時，${lag > 0 ? lag + '天後' : '當天'}出現「${sym.label}」的機率 ${Math.round(highRate*100)}%（低劑量時 ${Math.round(lowRate*100)}%）`
          });
        }
      }
    });
  });

  // Pattern 2: Sleep → symptom next day
  const sleepDates = dates.filter(d => data[d]?.sleep?.bedtime && data[d]?.sleep?.wakeTime);
  if (sleepDates.length >= 5) {
    const sleepHours = {};
    sleepDates.forEach(d => {
      const s = data[d].sleep;
      const [bh,bm] = s.bedtime.split(':').map(Number);
      const [wh,wm] = s.wakeTime.split(':').map(Number);
      let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
      sleepHours[d] = mins / 60;
    });
    const avgSleep = Object.values(sleepHours).reduce((a,b)=>a+b,0) / Object.values(sleepHours).length;

    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      let badSleepWithSym = 0, badSleepNoSym = 0, goodSleepWithSym = 0, goodSleepNoSym = 0;
      sleepDates.forEach(d => {
        const nextIdx = dates.indexOf(d) + 1;
        if (nextIdx >= dates.length) return;
        const nextDate = dates[nextIdx];
        const hasSym = flattenSymptoms(data[nextDate]?.symptoms).includes(sym.key);
        const badSleep = sleepHours[d] < avgSleep - 0.5;
        if (badSleep && hasSym) badSleepWithSym++;
        else if (badSleep && !hasSym) badSleepNoSym++;
        else if (!badSleep && hasSym) goodSleepWithSym++;
        else goodSleepNoSym++;
      });
      const totalBad = badSleepWithSym + badSleepNoSym;
      const totalGood = goodSleepWithSym + goodSleepNoSym;
      if (totalBad < 2 || totalGood < 2) return;
      const badRate = badSleepWithSym / totalBad;
      const goodRate = goodSleepWithSym / totalGood;
      if (badRate > goodRate + 0.2 && badRate > 0.35) {
        patterns.push({
          type: 'sleep_symptom',
          symptom: sym.label,
          badRate: Math.round(badRate * 100),
          goodRate: Math.round(goodRate * 100),
          confidence: Math.min(90, Math.round((badRate - goodRate) * 100 + totalBad * 2)),
          text: `睡不好的隔天出現「${sym.label}」機率 ${Math.round(badRate*100)}%（睡好時 ${Math.round(goodRate*100)}%）`
        });
      }
    });
  }

  // Pattern 3: Injection timing patterns
  DRUGS.forEach(drug => {
    const injDates = dates.filter(d => (data[d]?.drugs?.[drug.key] || 0) > 0);
    if (injDates.length < 3) return;
    const gaps = [];
    for (let i = 1; i < injDates.length; i++) {
      const d1 = parseDate(injDates[i-1]), d2 = parseDate(injDates[i]);
      gaps.push(Math.round((d2 - d1) / (1000*60*60*24)));
    }
    const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
    patterns.push({
      type: 'schedule',
      drug: drug.label,
      avgGap: avgGap.toFixed(1),
      text: `${drug.label} 平均每 ${avgGap.toFixed(1)} 天注射一次`,
      confidence: 100
    });
  });

  return patterns.sort((a,b) => b.confidence - a.confidence);
};

// === Smart Daily Briefing ===
const generateBriefing = (data, selectedDate) => {
  const items = [];
  const entry = data[selectedDate] || {};
  const dates = Object.keys(data).sort();
  const dateIdx = dates.indexOf(selectedDate);
  const todayDate = parseDate(selectedDate);

  // 1. PK level status
  const levels = calcPKLevels(data, 14);
  const todayLevel = levels.find(l => l.date === selectedDate);
  if (todayLevel && todayLevel.totalT > 0) {
    const maxT = Math.max(...levels.map(l => l.totalT));
    const minT = Math.min(...levels.filter(l => l.totalT > 0).map(l => l.totalT));
    const pctOfRange = maxT > minT ? ((todayLevel.totalT - minT) / (maxT - minT) * 100).toFixed(0) : 50;
    const phase = pctOfRange > 70 ? '📈 波峰附近' : pctOfRange > 30 ? '➡️ 穩定區間' : '📉 波谷';
    items.push({ icon: '💉', text: `預估體內活性 T: ${todayLevel.totalT}mg — ${phase}`, color: pctOfRange > 70 ? 'var(--green)' : pctOfRange > 30 ? 'var(--blue)' : 'var(--orange)' });
    if (todayLevel.e2 > 0) {
      items.push({ icon: '🔬', text: `E2 貢獻指數: ${todayLevel.e2.toFixed(1)} — ${todayLevel.e2 > 3 ? '⚠️ 偏高，留意水腫' : '正常範圍'}`, color: todayLevel.e2 > 3 ? 'var(--orange)' : 'var(--green)' });
    }
  }

  // 2. Days since last injection + missed injection warnings
  DRUGS.forEach(drug => {
    const lastInj = dates.filter(d => d <= selectedDate && (data[d]?.drugs?.[drug.key] || 0) > 0).pop();
    if (lastInj) {
      const daysSince = Math.round((todayDate - parseDate(lastInj)) / (1000*60*60*24));
      if (daysSince <= 14 && daysSince > 0) {
        const missed = getMissedInjectionInfo(data, drug.key, selectedDate);
        if (missed && missed.urgency !== 'low') {
          items.push({ icon: '⏰', text: `${drug.label} 已逾期 ${missed.daysOverdue} 天 — ${missed.suggestTime}`, color: missed.urgency === 'high' ? 'var(--red)' : 'var(--orange)' });
        } else {
          items.push({ icon: '📅', text: `距離上次 ${drug.label}: ${daysSince} 天`, color: 'var(--text2)' });
        }
      }
    }
  });

  // 3. Sleep last night
  const yesterday = fmt(new Date(todayDate.getTime() - 86400000));
  const sleepEntry = entry.sleep || data[yesterday]?.sleep;
  if (sleepEntry?.bedtime && sleepEntry?.wakeTime) {
    const [bh,bm] = sleepEntry.bedtime.split(':').map(Number);
    const [wh,wm] = sleepEntry.wakeTime.split(':').map(Number);
    let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
    const hrs = (mins/60).toFixed(1);
    const quality = sleepEntry.quality ? ['','😫','😕','😐','🙂','😴'][sleepEntry.quality] : '';
    let sleepExtra = '';
    if (sleepEntry.hrv) sleepExtra += ` | HRV ${sleepEntry.hrv}`;
    if (sleepEntry.sleepHR) sleepExtra += ` | HR ${sleepEntry.sleepHR}`;
    if (sleepEntry.spo2) sleepExtra += ` | SpO2 ${sleepEntry.spo2}%`;
    items.push({ icon: '😴', text: `昨晚睡 ${hrs} 小時 ${quality}${sleepExtra}${parseFloat(hrs) < 6 ? ' ⚠️ 睡眠不足' : ''}`, color: parseFloat(hrs) < 6 ? 'var(--orange)' : 'var(--green)' });
    if (sleepEntry.hrv && sleepEntry.hrv < 30) {
      items.push({ icon: '💓', text: `HRV 偏低 (${sleepEntry.hrv}) — 身體可能處於壓力/恢復不足狀態`, color: 'var(--orange)' });
    }
  }

  // 4. Weight trend
  const recentWeights = dates.filter(d => d <= selectedDate && data[d]?.weight).slice(-7);
  if (recentWeights.length >= 2) {
    const latest = data[recentWeights[recentWeights.length-1]].weight;
    const prev = data[recentWeights[0]].weight;
    const diff = (latest - prev).toFixed(1);
    items.push({ icon: '⚖️', text: `體重 ${latest}kg（${parseFloat(diff) >= 0 ? '+' : ''}${diff}kg 近${recentWeights.length}天）`, color: Math.abs(parseFloat(diff)) > 1 ? 'var(--orange)' : 'var(--text2)' });
  }

  // 5. Recent symptom trend
  const recent3 = dates.filter(d => d <= selectedDate).slice(-3);
  const recentNeg = {};
  recent3.forEach(d => {
    flattenSymptoms(data[d]?.symptoms).forEach(s => {
      const sym = SYMPTOMS.find(x => x.key === s);
      if (sym?.type === 'negative') recentNeg[s] = (recentNeg[s]||0) + 1;
    });
  });
  const frequent = Object.entries(recentNeg).filter(([,c]) => c >= 2).map(([k]) => SYMPTOMS.find(s=>s.key===k)?.label).filter(Boolean);
  if (frequent.length) {
    items.push({ icon: '⚠️', text: `近3天反覆出現：${frequent.join('、')}`, color: 'var(--red)' });
  }

  return items;
};

// === AI Dosage Suggestion ===
const generateDoseSuggestion = (data) => {
  const dates = Object.keys(data).sort();
  if (dates.length < 7) return null;
  const recent = dates.slice(-14);
  const suggestions = [];

  // Count category symptoms
  const catCounts = {};
  SYMPTOM_CATEGORIES.forEach(c => { catCounts[c.key] = { pos: 0, neg: 0 }; });
  recent.forEach(d => {
    flattenSymptoms(data[d]?.symptoms).forEach(s => {
      const sym = SYMPTOMS.find(x => x.key === s);
      if (sym) { catCounts[sym.cat][sym.type === 'positive' ? 'pos' : 'neg']++; }
    });
  });

  // E2 analysis
  if (catCounts.estrogen.neg >= 4) {
    suggestions.push({ type: 'warning', text: '🔴 E2 相關症狀頻繁 — 考慮：降低睾酮劑量、增加注射頻率（減少峰值）、或酌量使用 AI' });
  }

  // Joint dryness = E2 too low (maybe too much AI)
  const jointDry = recent.filter(d => flattenSymptoms(data[d]?.symptoms).includes('joint_stiff')).length;
  if (jointDry >= 3 && recent.some(d => (data[d]?.drugs?.ai || 0) > 0)) {
    suggestions.push({ type: 'warning', text: '🦴 關節卡 + 有使用 AI — 可能 E2 壓太低，考慮減少 AI 用量' });
  }

  // Sexual function down
  if (catCounts.sexual.neg >= 3) {
    suggestions.push({ type: 'warning', text: '🔥 性功能下降 — 可能 E2 失衡（過高或過低都會影響），建議抽血確認' });
  }

  // Mood issues
  if (catCounts.mood_energy.neg >= 5) {
    suggestions.push({ type: 'info', text: '🧠 精神狀態不穩定 — 考慮：檢查睡眠品質、穩定注射頻率、確認 E2 水平' });
  }

  // Skin/DHT
  if (catCounts.skin_hair.neg >= 3) {
    suggestions.push({ type: 'info', text: '💆 皮膚/掉髮問題 — 可能 DHT 偏高，Masteron 會加重此問題' });
  }

  // Injection frequency suggestion based on PK
  const levels = calcPKLevels(data, 14);
  const activeLevels = levels.filter(l => l.totalT > 0);
  if (activeLevels.length >= 7) {
    const max = Math.max(...activeLevels.map(l => l.totalT));
    const min = Math.min(...activeLevels.map(l => l.totalT));
    const fluctuation = max > 0 ? ((max - min) / max * 100).toFixed(0) : 0;
    if (fluctuation > 60) {
      suggestions.push({ type: 'info', text: `📊 血濃度波動 ${fluctuation}% — 波動偏大，考慮增加注射頻率（如每3天改為隔天）來減少副作用` });
    }
  }

  // Good status
  if (!suggestions.length && recent.length >= 7) {
    const posTotal = Object.values(catCounts).reduce((s, c) => s + c.pos, 0);
    const negTotal = Object.values(catCounts).reduce((s, c) => s + c.neg, 0);
    if (posTotal > negTotal) {
      suggestions.push({ type: 'good', text: '✅ 目前狀態看起來不錯！正面反應多於負面，建議維持目前方案' });
    }
  }

  return suggestions;
};

// AI Analysis: compute face/body metrics from image
const analyzePhoto = (dataUrl, type) => {
  // type: 'face' or 'body'
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 300; // higher res for better analysis
      let w = img.width, h = img.height;
      if (w > h) { h = (size / w) * h; w = size; } else { w = (size / h) * w; h = size; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);
      const pixels = imageData.data;
      const n = pixels.length / 4;

      // --- Global stats ---
      let totalR = 0, totalG = 0, totalB = 0, totalBright = 0;
      let skinPixels = 0, rednessSum = 0;
      // Per-pixel brightness array for edge/contrast analysis
      const brightMap = new Float32Array(n);

      for (let i = 0; i < pixels.length; i += 4) {
        const idx = i / 4;
        const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
        const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
        brightMap[idx] = brightness;
        totalR += r; totalG += g; totalB += b;
        totalBright += brightness;
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r - g) > 10 && brightness > 50 && brightness < 230) {
          skinPixels++;
          rednessSum += (r - g) / 255;
        }
      }

      const avgBright = totalBright / n;
      const avgR = totalR / n, avgG = totalG / n, avgB = totalB / n;
      const skinRatio = skinPixels / n;
      const avgRedness = skinPixels > 0 ? rednessSum / skinPixels : 0;

      // --- Edge detection (Sobel-like) for muscle definition ---
      // More edges in skin area = more visible muscle lines/definition
      let edgeSum = 0, edgeCount = 0;
      let skinEdgeSum = 0, skinEdgeCount = 0;
      const edgeMap = new Float32Array(n);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = y * w + x;
          // Sobel gradient magnitude
          const gx = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[y*w+(x-1)] - brightMap[(y+1)*w+(x-1)]
                     + brightMap[(y-1)*w+(x+1)] + 2*brightMap[y*w+(x+1)] + brightMap[(y+1)*w+(x+1)];
          const gy = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[(y-1)*w+x] - brightMap[(y-1)*w+(x+1)]
                     + brightMap[(y+1)*w+(x-1)] + 2*brightMap[(y+1)*w+x] + brightMap[(y+1)*w+(x+1)];
          const mag = Math.sqrt(gx * gx + gy * gy);
          edgeMap[idx] = mag;
          edgeSum += mag;
          edgeCount++;
          // Check if this pixel is skin-colored
          const pi = idx * 4;
          const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
          if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && brightMap[idx] > 50 && brightMap[idx] < 230) {
            skinEdgeSum += mag;
            skinEdgeCount++;
          }
        }
      }
      const avgEdge = edgeCount > 0 ? edgeSum / edgeCount : 0;
      const avgSkinEdge = skinEdgeCount > 0 ? skinEdgeSum / skinEdgeCount : 0;

      // --- Region analysis for body photos ---
      // Split into top/middle/bottom thirds
      const thirdH = Math.floor(h / 3);
      const regionStats = (startY, endY) => {
        let rSum = 0, bSum = 0, brSum = 0, cnt = 0, eSum = 0, skCnt = 0;
        for (let y = startY; y < endY; y++) {
          for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            const pi = idx * 4;
            const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
            const br = brightMap[idx];
            rSum += r; bSum += b; brSum += br; cnt++;
            eSum += edgeMap[idx] || 0;
            if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && br > 50 && br < 230) skCnt++;
          }
        }
        return { avgBright: brSum/cnt, avgEdge: eSum/cnt, skinRatio: skCnt/cnt, avgR: rSum/cnt, avgB: bSum/cnt };
      };
      const topRegion = regionStats(0, thirdH);
      const midRegion = regionStats(thirdH, thirdH * 2);
      const botRegion = regionStats(thirdH * 2, h);

      // --- Local contrast (for pump detection) ---
      // High local contrast in skin = vascularity/pump; low = flat
      let contrastSum = 0, contrastCount = 0;
      const blockSize = 8;
      for (let by = 0; by < h - blockSize; by += blockSize) {
        for (let bx = 0; bx < w - blockSize; bx += blockSize) {
          let bMin = 255, bMax = 0, hasSkin = false;
          for (let dy = 0; dy < blockSize; dy++) {
            for (let dx = 0; dx < blockSize; dx++) {
              const idx = (by+dy) * w + (bx+dx);
              const br = brightMap[idx];
              if (br < bMin) bMin = br;
              if (br > bMax) bMax = br;
              const pi = idx * 4;
              const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
              if (r > 80 && g > 40 && b > 20 && r > g && r > b) hasSkin = true;
            }
          }
          if (hasSkin) {
            contrastSum += (bMax - bMin);
            contrastCount++;
          }
        }
      }
      const localContrast = contrastCount > 0 ? contrastSum / contrastCount : 0;

      // --- Brightness variance in skin (smooth=水腫, textured=definition) ---
      let brightVarSum = 0, brightVarCnt = 0;
      for (let i = 0; i < n; i++) {
        const pi = i * 4;
        const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && brightMap[i] > 50 && brightMap[i] < 230) {
          brightVarSum += Math.pow(brightMap[i] - avgBright, 2);
          brightVarCnt++;
        }
      }
      const skinBrightVar = brightVarCnt > 0 ? Math.sqrt(brightVarSum / brightVarCnt) : 0;

      // === Compute scores ===
      const brightnessScore = Math.min(100, (avgBright / 180) * 100);
      const rednessScore = Math.min(100, avgRedness * 300);
      const puffScore = Math.min(100, skinRatio * 200);
      const swellingIndex = Math.round(brightnessScore * 0.3 + rednessScore * 0.4 + puffScore * 0.3);
      const warmth = Math.round(((avgR - avgB) / 255) * 100 + 50);

      // Muscle definition: edge density in skin areas (0-100)
      // avgSkinEdge typically 5-50 range
      const definitionScore = Math.min(100, Math.round((avgSkinEdge / 35) * 100));

      // Pump score: local contrast + edge density (higher = more pumped/vascular)
      // localContrast typically 20-100
      const pumpRaw = (localContrast / 80) * 50 + (avgSkinEdge / 30) * 30 + (skinBrightVar / 40) * 20;
      const pumpScore = Math.min(100, Math.max(0, Math.round(pumpRaw)));

      // Water retention (belly area for body) — smooth bright skin in mid region
      // For face: overall puffiness. For body: mid-region smoothness + brightness
      let waterScore;
      if (type === 'body') {
        // Belly: high brightness + low edge (smooth) + high skin ratio in mid region = water
        const midSmooth = Math.max(0, 1 - midRegion.avgEdge / 25);
        const midBright = midRegion.avgBright / 200;
        const midSkin = midRegion.skinRatio;
        waterScore = Math.min(100, Math.round((midSmooth * 40 + midBright * 30 + midSkin * 30) * 100));
      } else {
        // Face: puffiness = brightness + redness + skin smoothness
        const faceSmooth = Math.max(0, 1 - avgSkinEdge / 30);
        waterScore = Math.min(100, Math.round((faceSmooth * 30 + (avgBright/200) * 35 + skinRatio * 35) * 100));
      }

      // Flat vs pump label
      const pumpLabel = pumpScore > 65 ? '💪 Pump' : pumpScore > 40 ? '正常' : '😐 Flat';
      const defLabel = definitionScore > 60 ? '✨ 明顯' : definitionScore > 35 ? '普通' : '不明顯';
      const waterLabel = waterScore > 60 ? '💧 偏水' : waterScore > 35 ? '輕微' : '✅ 乾爽';

      const rawScores = {
        brightness: Math.round(brightnessScore),
        redness: Math.round(rednessScore),
        swellingIndex: Math.min(100, swellingIndex),
        warmth: Math.min(100, Math.max(0, warmth)),
        skinRatio: Math.round(skinRatio * 100),
        definitionScore: Math.min(100, definitionScore),
        pumpScore,
        waterScore: Math.min(100, waterScore),
        pumpLabel,
        defLabel,
        waterLabel,
        type: type || 'face',
      };
      // Apply learned calibration offsets
      const calibrated = applyCalibration(rawScores, type || 'face');
      calibrated._raw = { pumpScore, definitionScore, waterScore: Math.min(100, waterScore) };
      resolve(calibrated);
    };
    img.src = dataUrl;
  });
};

  const CalIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
  const ChartIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
  const MoreIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>;

  return (
    <>
      <div className="header">
        <h1>💉 用藥追蹤</h1>
        <span style={{color:'var(--text2)',fontSize:'0.85em'}}>{selectedDate}</span>
      </div>

      {autoImportMsg && (
        <div style={{position:'fixed',top:60,left:'50%',transform:'translateX(-50%)',background:'var(--green)',color:'#fff',padding:'10px 20px',borderRadius:10,zIndex:999,fontSize:'0.9em',boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>{autoImportMsg}</div>
      )}

      {tab === 'record' && <RecordPage data={data} updateData={updateData} selectedDate={selectedDate} setSelectedDate={setSelectedDate} saveStatus={saveStatus} setSaveStatus={setSaveStatus} />}
      {tab === 'calendar' && <CalendarPage data={data} calMonth={calMonth} setCalMonth={setCalMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setTab={setTab} />}
      {tab === 'smart' && <SmartPage data={data} updateData={updateData} selectedDate={selectedDate} />}
      {tab === 'chart' && <ChartPage data={data} setTab={setTab} />}
      {tab === 'face_timeline' && <PhotoTimelinePage data={data} type="face" setTab={setTab} />}
      {tab === 'body_timeline' && <PhotoTimelinePage data={data} type="body" setTab={setTab} />}
      {tab === 'more' && <MorePage data={data} updateData={updateData} />}

      <div className="tabs">
        <button className={`tab ${tab==='record'?'active':''}`} onClick={()=>setTab('record')}><RecordIcon />紀錄</button>
        <button className={`tab ${tab==='calendar'?'active':''}`} onClick={()=>setTab('calendar')}><CalIcon />日曆</button>
        <button className={`tab ${tab==='smart'?'active':''}`} onClick={()=>setTab('smart')} style={{position:'relative'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>智慧</button>
        <button className={`tab ${tab==='chart'?'active':''}`} onClick={()=>setTab('chart')}><ChartIcon />分析</button>
        <button className={`tab ${tab==='more'?'active':''}`} onClick={()=>setTab('more')}><MoreIcon />更多</button>
      </div>
    </>
  );
}

function RecordPage({ data, updateData, selectedDate, setSelectedDate, saveStatus, setSaveStatus }) {
  const entry = data[selectedDate] || { drugs: {}, symptoms: {}, note: '' };
  const [drugs, setDrugs] = useState(entry.drugs);
  const [drugTimes, setDrugTimes] = useState(entry.drugTimes || {});
  const [symptoms, setSymptoms] = useState(() => normalizeSymptoms(entry.symptoms));
  const [activePeriod, setActivePeriod] = useState('allday');
  const [note, setNote] = useState(entry.note || '');
  const [facePhoto, setFacePhoto] = useState(null);
  const [bodyPhoto, setBodyPhoto] = useState(null);
  const [faceAnalysis, setFaceAnalysis] = useState(null);
  const [bodyAnalysis, setBodyAnalysis] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  // Weight tracking
  const [weight, setWeight] = useState(entry.weight || '');
  // Sleep tracking
  const defaultSleep = { bedtime: '', wakeTime: '', quality: 0, deep: '', rem: '', light: '', awake: '', note: '', source: 'manual' };
  const [sleep, setSleep] = useState(() => ({ ...defaultSleep, ...(entry.sleep || {}) }));
  const [sleepImportMsg, setSleepImportMsg] = useState('');
  const faceInputRef = useRef(null);
  const bodyInputRef = useRef(null);

  useEffect(() => {
    const e = data[selectedDate] || { drugs: {}, symptoms: {}, note: '' };
    setDrugs(e.drugs || {});
    setDrugTimes(e.drugTimes || {});
    setSymptoms(normalizeSymptoms(e.symptoms));
    setActivePeriod('allday');
    setNote(e.note || '');
    setWeight(e.weight || '');
    setSleep({ ...defaultSleep, ...(e.sleep || {}) });
    setSleepImportMsg('');
    setSaveStatus('');
    // Load photos for this date (async IndexedDB)
    setFacePhoto(null); setBodyPhoto(null);
    setFaceAnalysis(null); setBodyAnalysis(null);
    (async () => {
      const fp = await loadPhoto(selectedDate, 'face');
      const bp = await loadPhoto(selectedDate, 'body');
      setFacePhoto(fp);
      setBodyPhoto(bp);
      if (fp) analyzePhoto(fp, 'face').then(setFaceAnalysis);
      if (bp) analyzePhoto(bp, 'body').then(setBodyAnalysis);
    })();
  }, [selectedDate, data]);

  const changeDate = delta => {
    const d = parseDate(selectedDate);
    d.setDate(d.getDate() + delta);
    setSelectedDate(fmt(d));
  };

  const setDrug = (key, val) => setDrugs(prev => ({ ...prev, [key]: val }));
  const setDrugTime = (key, val) => setDrugTimes(prev => ({ ...prev, [key]: val }));
  const toggleSymptom = key => setSymptoms(prev => {
    const current = prev[activePeriod] || [];
    const updated = current.includes(key) ? current.filter(s => s !== key) : [...current, key];
    return { ...prev, [activePeriod]: updated };
  });

  const handlePhoto = async (e, type) => {
    const file = e.target.files[0];
    if (!file) return;
    setAnalyzing(true);
    try {
      const compressed = await compressImage(file, 480, 0.6);
      if (type === 'face') {
        setFacePhoto(compressed);
        await savePhoto(selectedDate, 'face', compressed);
        const analysis = await analyzePhoto(compressed, 'face');
        setFaceAnalysis(analysis);
        // Save analysis in data
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].faceAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      } else {
        setBodyPhoto(compressed);
        await savePhoto(selectedDate, 'body', compressed);
        const analysis = await analyzePhoto(compressed, 'body');
        setBodyAnalysis(analysis);
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].bodyAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      }
    } catch (err) { console.error('Photo error:', err); }
    setAnalyzing(false);
  };

  const removePhoto = async (type) => {
    if (type === 'face') { setFacePhoto(null); setFaceAnalysis(null); await savePhoto(selectedDate, 'face', null); }
    else { setBodyPhoto(null); setBodyAnalysis(null); await savePhoto(selectedDate, 'body', null); }
    const newData = { ...data };
    if (newData[selectedDate]) {
      if (type === 'face') delete newData[selectedDate].faceAnalysis;
      else delete newData[selectedDate].bodyAnalysis;
      const hasFace = type === 'face' ? false : !!(await loadPhoto(selectedDate, 'face'));
      const hasBody = type === 'body' ? false : !!(await loadPhoto(selectedDate, 'body'));
      newData[selectedDate].hasPhotos = hasFace || hasBody;
      updateData(newData);
    }
  };

  // Re-analyze photos after calibration
  const handleRecalibrate = async () => {
    const fp = await loadPhoto(selectedDate, 'face');
    const bp = await loadPhoto(selectedDate, 'body');
    if (fp) { const a = await analyzePhoto(fp, 'face'); setFaceAnalysis(a); }
    if (bp) { const a = await analyzePhoto(bp, 'body'); setBodyAnalysis(a); }
  };

  const handleSave = () => {
    const cleanDrugs = {};
    Object.entries(drugs).forEach(([k, v]) => { if (v && parseFloat(v) > 0) cleanDrugs[k] = parseFloat(v); });
    const existing = data[selectedDate] || {};
    const hasAnySymptoms = Object.values(symptoms).some(arr => arr.length > 0);
    const cleanTimes = {};
    Object.entries(drugTimes).forEach(([k, v]) => { if (v && cleanDrugs[k]) cleanTimes[k] = v; });
    const hasSleep = sleep.bedtime || sleep.wakeTime || sleep.quality;
    const cleanSleep = hasSleep ? sleep : undefined;
    const cleanWeight = weight ? parseFloat(weight) : undefined;
    const newData = { ...data, [selectedDate]: { ...existing, drugs: cleanDrugs, drugTimes: cleanTimes, symptoms, note, sleep: cleanSleep, weight: cleanWeight, updatedAt: new Date().toISOString() } };
    if (!hasAnySymptoms && !Object.keys(cleanDrugs).length && !note && !existing.hasPhotos && !hasSleep && !cleanWeight) delete newData[selectedDate];
    updateData(newData);
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus(''), 1500);
  };

  const isToday = selectedDate === today();
  const dayOfWeek = ['日','一','二','三','四','五','六'][parseDate(selectedDate).getDay()];

  // Storage usage
  const storageBytes = useMemo(() => getStorageUsage(), [facePhoto, bodyPhoto, data]);
  const storageMB = (storageBytes / 1024 / 1024).toFixed(1);
  const storageWarn = storageBytes > 4 * 1024 * 1024;

  const MetricBar = ({ label, value, color }) => (
    <div className="metric-row">
      <span style={{color:'var(--text2)'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div className="metric-bar">
          <div className="metric-fill" style={{width:`${value}%`, background: color}} />
        </div>
        <span style={{minWidth:30,textAlign:'right',color}}>{value}</span>
      </div>
    </div>
  );

  const AnalysisCard = ({ title, analysis, photoType, date, onRecalibrate }) => {
    if (!analysis) return null;
    const [showCalib, setShowCalib] = useState(false);
    const [calibRatings, setCalibRatings] = useState({});
    const [calibSaved, setCalibSaved] = useState(false);
    const calibStats = getCalibStats();
    const hasCalib = calibStats.count > 0;

    const level = analysis.swellingIndex < 30 ? '正常' : analysis.swellingIndex < 55 ? '輕微' : analysis.swellingIndex < 75 ? '偏高' : '明顯';
    const levelColor = analysis.swellingIndex < 30 ? 'var(--green)' : analysis.swellingIndex < 55 ? 'var(--blue)' : analysis.swellingIndex < 75 ? 'var(--orange)' : 'var(--red)';
    const pumpColor = (analysis.pumpScore||0) > 65 ? 'var(--green)' : (analysis.pumpScore||0) > 40 ? 'var(--blue)' : 'var(--orange)';
    const defColor = (analysis.definitionScore||0) > 60 ? 'var(--green)' : (analysis.definitionScore||0) > 35 ? 'var(--blue)' : 'var(--text2)';
    const waterColor = (analysis.waterScore||0) > 60 ? 'var(--red)' : (analysis.waterScore||0) > 35 ? 'var(--orange)' : 'var(--green)';
    const isBody = analysis.type === 'body' || title.includes('身');

    const ratingOptions = [
      { value: 1, label: 'AI太低' },
      { value: 2, label: '偏低' },
      { value: 3, label: '準確 ✓' },
      { value: 4, label: '偏高' },
      { value: 5, label: 'AI太高' },
    ];
    const metricLabels = { pumpScore: '充血度', definitionScore: '肌肉線條', waterScore: '水腫程度' };

    const handleCalibSave = () => {
      Object.entries(calibRatings).forEach(([metric, rating]) => {
        const rawVal = analysis._raw ? analysis._raw[metric] : (analysis[metric] || 0);
        recordCalibrationEntry(date, photoType, metric, rawVal, rating);
      });
      setCalibSaved(true);
      setTimeout(() => setCalibSaved(false), 2000);
      // Trigger re-analysis
      if (onRecalibrate) onRecalibrate();
    };

    return (
      <div className="ai-card">
        <h3>🤖 {title} AI 分析 {hasCalib && <span className="calib-badge">已學習 {calibStats.count} 筆</span>}</h3>
        {/* Main status badges */}
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:pumpColor}}>{analysis.pumpLabel || (analysis.pumpScore > 65 ? '💪 Pump' : analysis.pumpScore > 40 ? '正常' : '😐 Flat')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>充血狀態</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:waterColor}}>{analysis.waterLabel || (analysis.waterScore > 60 ? '💧 偏水' : analysis.waterScore > 35 ? '輕微' : '✅ 乾爽')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>{isBody ? '腹部水腫' : '臉部水腫'}</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:defColor}}>{analysis.defLabel || (analysis.definitionScore > 60 ? '✨ 明顯' : analysis.definitionScore > 35 ? '普通' : '不明顯')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>肌肉線條</div>
          </div>
        </div>
        {/* Detailed metrics */}
        <MetricBar label="💪 充血度 (Pump)" value={analysis.pumpScore||0} color={pumpColor} />
        <MetricBar label="📐 肌肉線條" value={analysis.definitionScore||0} color={defColor} />
        <MetricBar label="💧 水腫程度" value={analysis.waterScore||0} color={waterColor} />
        <MetricBar label="🔴 腫脹指數" value={analysis.swellingIndex} color={levelColor} />
        <MetricBar label="泛紅" value={analysis.redness} color="var(--red)" />
        <MetricBar label="亮度" value={analysis.brightness} color="var(--blue)" />
        <MetricBar label="色溫" value={analysis.warmth} color="var(--pink)" />

        {/* Calibration feedback section */}
        <div className="calib-section">
          <button className="calib-btn" style={{width:'100%',padding:'8px',marginBottom:8,fontSize:'0.85em',background: showCalib ? 'var(--purple)' : 'var(--card2)', color: showCalib ? '#fff' : 'var(--text2)'}} onClick={() => setShowCalib(!showCalib)}>
            🎯 {showCalib ? '收起校準' : '覺得不準？點我教 AI'}
          </button>
          {showCalib && (
            <div>
              <p style={{fontSize:'0.75em',color:'var(--text2)',marginBottom:8}}>告訴 AI 每項判斷跟你的感覺差多少，AI 會學習你的標準：</p>
              {CALIB_METRICS.map(metric => (
                <div className="calib-row" key={metric}>
                  <span className="calib-label">{metricLabels[metric]}</span>
                  <div className="calib-btns">
                    {ratingOptions.map(opt => (
                      <button key={opt.value} className={`calib-btn ${calibRatings[metric] === opt.value ? 'selected' : ''}`}
                        onClick={() => setCalibRatings(prev => ({...prev, [metric]: opt.value}))}>
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
              <button className="save-btn" style={{marginTop:8,fontSize:'0.9em',padding:'10px'}}
                onClick={handleCalibSave}
                disabled={!Object.keys(calibRatings).length}>
                {calibSaved ? '✓ 已記錄，AI 正在學習！' : '送出校準'}
              </button>
              {analysis._offsets && Object.keys(analysis._offsets).some(k => analysis._offsets[k] !== 0) && (
                <p style={{fontSize:'0.7em',color:'var(--purple)',marginTop:6,textAlign:'center'}}>
                  目前校準偏移：{Object.entries(analysis._offsets).filter(([,v])=>v!==0).map(([k,v]) => `${metricLabels[k]} ${v>0?'+':''}${v}`).join('、')}
                </p>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="page">
      <div className="date-nav">
        <button onClick={() => changeDate(-1)}>◀ 前一天</button>
        <div className="date">{selectedDate.slice(5)} ({dayOfWeek}){isToday && ' 📍'}</div>
        <button onClick={() => changeDate(1)}>後一天 ▶</button>
      </div>

      {/* Smart Daily Briefing */}
      {(() => {
        const briefingItems = generateBriefing(data, selectedDate);
        if (!briefingItems.length) return null;
        return (
          <div className="briefing">
            <h3>🧠 今日智慧摘要</h3>
            {briefingItems.map((item, i) => (
              <div className="briefing-item" key={i} style={{color: item.color}}>
                {item.icon} {item.text}
              </div>
            ))}
          </div>
        );
      })()}

      {storageWarn && (
        <div className="storage-warn">⚠️ 儲存空間已用 {storageMB}MB，接近上限。建議匯出備份後清理舊照片。</div>
      )}

      <div className="card">
        <h3>📸 臉部 & 身材照</h3>
        <div className="photo-section">
          <div className="photo-slot">
            <h4>臉部</h4>
            <div className={`photo-frame ${facePhoto?'has-photo':''}`} onClick={() => !facePhoto && faceInputRef.current?.click()}>
              {facePhoto ? (
                <>
                  <img src={facePhoto} alt="臉部" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('face'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝臉部照</div>
                </div>
              )}
            </div>
            <input ref={faceInputRef} className="photo-input" type="file" accept="image/*" capture="user"
              onChange={e => handlePhoto(e, 'face')} />
          </div>
          <div className="photo-slot">
            <h4>身材</h4>
            <div className={`photo-frame ${bodyPhoto?'has-photo':''}`} onClick={() => !bodyPhoto && bodyInputRef.current?.click()}>
              {bodyPhoto ? (
                <>
                  <img src={bodyPhoto} alt="身材" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('body'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝身材照</div>
                </div>
              )}
            </div>
            <input ref={bodyInputRef} className="photo-input" type="file" accept="image/*" capture="environment"
              onChange={e => handlePhoto(e, 'body')} />
          </div>
        </div>
        {analyzing && <p style={{textAlign:'center',color:'var(--purple)',marginTop:8,fontSize:'0.85em'}}>🔄 分析中...</p>}
        <p style={{fontSize:'0.72em',color:'var(--text2)',marginTop:8,textAlign:'center'}}>
          儲存空間：{storageMB} MB / ~5 MB
        </p>
      </div>

      {(faceAnalysis || bodyAnalysis) && (
        <>
          {faceAnalysis && <AnalysisCard title="臉部" analysis={faceAnalysis} photoType="face" date={selectedDate} onRecalibrate={handleRecalibrate} />}
          {bodyAnalysis && <AnalysisCard title="身材" analysis={bodyAnalysis} photoType="body" date={selectedDate} onRecalibrate={handleRecalibrate} />}
        </>
      )}

      <div className="card">
        <h3>💊 藥物劑量</h3>
        {DRUGS.map(d => {
          const missed = getMissedInjectionInfo(data, d.key, selectedDate);
          return (
            <div key={d.key} style={{marginBottom:12}}>
              {missed && (
                <div style={{background: missed.urgency === 'high' ? 'rgba(239,68,68,0.15)' : missed.urgency === 'medium' ? 'rgba(251,146,60,0.15)' : 'rgba(96,165,250,0.15)',
                  border: `1px solid ${missed.urgency === 'high' ? 'var(--red)' : missed.urgency === 'medium' ? 'var(--orange)' : 'var(--blue)'}`,
                  borderRadius:8,padding:'8px 10px',marginBottom:6,fontSize:'0.78em'}}>
                  <div style={{fontWeight:600,color: missed.urgency === 'high' ? 'var(--red)' : missed.urgency === 'medium' ? 'var(--orange)' : 'var(--blue)'}}>
                    ⏰ {d.label}：距上次 {missed.daysSince} 天（建議{missed.label}）
                  </div>
                  <div style={{color:'var(--text2)',marginTop:3}}>{missed.suggestTime}</div>
                </div>
              )}
              <div className="drug-row" style={{flexWrap:'wrap'}}>
                <div className="drug-label" style={{color: d.color}}>{d.label}</div>
                <input className="drug-input" type="number" step="any" placeholder="0"
                  value={drugs[d.key] || ''} onChange={e => setDrug(d.key, e.target.value)}
                  inputMode="decimal" style={{flex:'1 1 60px',minWidth:60}} />
                <div className="drug-unit">{d.unit}</div>
                <input type="time" value={drugTimes[d.key] || ''}
                  onChange={e => setDrugTime(d.key, e.target.value)}
                  style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',color:'var(--text)',fontSize:'0.82em',outline:'none',width:90,flexShrink:0}}
                  placeholder="時間" />
              </div>
              {/* Quick time presets */}
              {(drugs[d.key] && parseFloat(drugs[d.key]) > 0) && (
                <div style={{display:'flex',gap:4,marginTop:4,marginLeft:100,flexWrap:'wrap'}}>
                  {INJECT_PRESETS.map(p => (
                    <button key={p.key} onClick={() => setDrugTime(d.key, p.getTime())}
                      style={{background: drugTimes[d.key] === p.getTime() ? 'var(--blue)' : 'var(--card2)',
                        border:'1px solid var(--border)',borderRadius:14,padding:'4px 10px',
                        color: drugTimes[d.key] === p.getTime() ? '#fff' : 'var(--text2)',fontSize:'0.72em',cursor:'pointer',whiteSpace:'nowrap'}}>
                      {p.icon} {p.label}
                    </button>
                  ))}
                  {DRUG_SCHEDULES[d.key] && (
                    <span style={{fontSize:'0.68em',color:'var(--text2)',alignSelf:'center',marginLeft:4}}>
                      💡 {DRUG_SCHEDULES[d.key].note}
                    </span>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="card">
        <h3>📋 症狀紀錄</h3>
        <div className="period-tabs">
          {TIME_PERIODS.map(p => {
            const count = (symptoms[p.key] || []).length;
            return (
              <button key={p.key} className={`period-tab ${activePeriod===p.key?'active':''}`}
                onClick={() => setActivePeriod(p.key)}>
                {p.label}
                {count > 0 && <span className="period-count">{count}</span>}
              </button>
            );
          })}
        </div>
        {SYMPTOM_CATEGORIES.map(cat => {
          const catSyms = SYMPTOMS.filter(s => s.cat === cat.key);
          const activeCount = catSyms.filter(s => (symptoms[activePeriod] || []).includes(s.key)).length;
          return (
            <div key={cat.key} style={{marginBottom:10}}>
              <div style={{fontSize:'0.8em',color:cat.color,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
                {cat.label}
                {activeCount > 0 && <span style={{background:cat.color,color:'#fff',borderRadius:10,padding:'0 6px',fontSize:'0.85em'}}>{activeCount}</span>}
              </div>
              <div className="sym-grid">
                {catSyms.map(s => {
                  const isActive = (symptoms[activePeriod] || []).includes(s.key);
                  const inOtherPeriods = TIME_PERIODS.filter(p => p.key !== activePeriod && (symptoms[p.key] || []).includes(s.key)).map(p => p.label);
                  return (
                    <button key={s.key} className={`sym-btn ${s.type} ${isActive?'active':''}`}
                      onClick={() => toggleSymptom(s.key)}>
                      {s.label}
                      {inOtherPeriods.length > 0 && <span className="sym-time-label">({inOtherPeriods.join('/')})</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <h3>⚖️ 體重</h3>
        <div className="weight-row">
          <input type="number" step="0.1" inputMode="decimal" placeholder="今日體重"
            value={weight} onChange={e => setWeight(e.target.value)} />
          <span style={{color:'var(--text2)',fontSize:'0.9em'}}>kg</span>
        </div>
        {(() => {
          const dates = Object.keys(data).sort().filter(d => d < selectedDate && data[d]?.weight);
          if (!dates.length || !weight) return null;
          const prev = data[dates[dates.length-1]].weight;
          const diff = (parseFloat(weight) - prev).toFixed(1);
          return <div style={{fontSize:'0.8em',color: Math.abs(diff) > 0.5 ? 'var(--orange)' : 'var(--text2)',marginTop:6}}>
            較上次 ({dates[dates.length-1].slice(5)}) {diff > 0 ? '+' : ''}{diff}kg
          </div>;
        })()}
      </div>

      <div className="card">
        <h3>😴 睡眠紀錄</h3>
        <div className="sleep-grid">
          <div className="sleep-field">
            <label>入睡時間</label>
            <input type="time" value={sleep.bedtime} onChange={e => setSleep(s => ({...s, bedtime: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>起床時間</label>
            <input type="time" value={sleep.wakeTime} onChange={e => setSleep(s => ({...s, wakeTime: e.target.value}))} />
          </div>
        </div>
        {sleep.bedtime && sleep.wakeTime && (() => {
          const [bh,bm] = sleep.bedtime.split(':').map(Number);
          const [wh,wm] = sleep.wakeTime.split(':').map(Number);
          let mins = (wh*60+wm) - (bh*60+bm);
          if (mins <= 0) mins += 1440;
          const hrs = Math.floor(mins/60);
          const rm = mins % 60;
          return (
            <div className="sleep-total">
              <div className="hours">{hrs}h {rm > 0 ? `${rm}m` : ''}</div>
              <div className="hours-label">總睡眠時間</div>
            </div>
          );
        })()}
        <label style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:4,display:'block'}}>睡眠品質</label>
        <div className="sleep-quality-btns">
          {[{v:1,l:'😫 很差'},{v:2,l:'😕 不好'},{v:3,l:'😐 普通'},{v:4,l:'🙂 不錯'},{v:5,l:'😴 很好'}].map(q => (
            <button key={q.v} className={`sleep-q-btn q${q.v} ${sleep.quality===q.v?'active':''}`}
              onClick={() => setSleep(s => ({...s, quality: q.v}))}>{q.l}</button>
          ))}
        </div>
        <div className="sleep-grid">
          <div className="sleep-field">
            <label>深睡 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.deep||''} onChange={e => setSleep(s => ({...s, deep: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>REM (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.rem||''} onChange={e => setSleep(s => ({...s, rem: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>淺睡 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.light||''} onChange={e => setSleep(s => ({...s, light: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>清醒 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.awake||''} onChange={e => setSleep(s => ({...s, awake: e.target.value}))} />
          </div>
        </div>
        {(sleep.deep || sleep.rem || sleep.light) && (() => {
          const d = parseInt(sleep.deep)||0, r = parseInt(sleep.rem)||0, l = parseInt(sleep.light)||0, a = parseInt(sleep.awake)||0;
          const total = d + r + l + a || 1;
          return (
            <div className="sleep-bar">
              <div style={{width:`${d/total*100}%`,background:'#6366f1'}} title={`深睡 ${d}m`} />
              <div style={{width:`${r/total*100}%`,background:'#a78bfa'}} title={`REM ${r}m`} />
              <div style={{width:`${l/total*100}%`,background:'#60a5fa'}} title={`淺睡 ${l}m`} />
              <div style={{width:`${a/total*100}%`,background:'#374151'}} title={`清醒 ${a}m`} />
            </div>
          );
        })()}
        {(sleep.deep || sleep.rem || sleep.light) && (
          <div style={{display:'flex',justifyContent:'center',gap:10,fontSize:'0.7em',color:'var(--text2)',marginBottom:6}}>
            <span>🟦 深睡</span><span>🟪 REM</span><span>💠 淺睡</span><span>⬛ 清醒</span>
          </div>
        )}
        {/* Extra AutoSleep health metrics */}
        {(sleep.sleepHR || sleep.hrv || sleep.spo2) && (
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap',padding:'8px 0',fontSize:'0.82em'}}>
            {sleep.sleepHR > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--red)'}}>{sleep.sleepHR}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>睡眠心率</div>
            </div>}
            {sleep.hrv > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--green)'}}>{sleep.hrv}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>HRV</div>
            </div>}
            {sleep.sleepHRV > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--blue)'}}>{sleep.sleepHRV}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>睡眠HRV</div>
            </div>}
            {sleep.spo2 > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color: sleep.spo2 < 95 ? 'var(--orange)' : 'var(--blue)'}}>{sleep.spo2}%</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>血氧</div>
            </div>}
            {sleep.efficiency > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color: sleep.efficiency >= 85 ? 'var(--green)' : 'var(--orange)'}}>{sleep.efficiency}%</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>效率</div>
            </div>}
          </div>
        )}
        <button className="sleep-import-btn" onClick={async () => {
          try {
            const text = await navigator.clipboard.readText();
            // Try JSON parse (from iOS Shortcut)
            let parsed;
            try { parsed = JSON.parse(text); } catch {}
            if (parsed && (parsed.bedtime || parsed.sleepStart || parsed.deep || parsed.totalMinutes)) {
              const s = { ...defaultSleep };
              s.bedtime = parsed.bedtime || parsed.sleepStart || '';
              s.wakeTime = parsed.wakeTime || parsed.wakeEnd || '';
              if (parsed.quality) s.quality = parseInt(parsed.quality) || 0;
              if (parsed.deep) s.deep = String(parseInt(parsed.deep));
              if (parsed.rem) s.rem = String(parseInt(parsed.rem));
              if (parsed.light) s.light = String(parseInt(parsed.light));
              if (parsed.awake) s.awake = String(parseInt(parsed.awake));
              s.source = parsed.source || 'health';
              // If totalMinutes provided but no breakdown, estimate
              if (parsed.totalMinutes && !parsed.deep) {
                const t = parseInt(parsed.totalMinutes);
                s.deep = String(Math.round(t * 0.2));
                s.light = String(Math.round(t * 0.5));
                s.rem = String(Math.round(t * 0.25));
                s.awake = String(Math.round(t * 0.05));
              }
              setSleep(s);
              setSleepImportMsg('✓ 已匯入睡眠資料！');
              setTimeout(() => setSleepImportMsg(''), 2000);
            } else {
              // Try simple format: "23:30,07:15" or "bedtime wakeTime"
              const parts = text.trim().replace(/[\s,;|]+/g, ',').split(',');
              if (parts.length >= 2 && parts[0].includes(':') && parts[1].includes(':')) {
                setSleep(s => ({ ...s, bedtime: parts[0].trim(), wakeTime: parts[1].trim(), source: 'paste' }));
                setSleepImportMsg('✓ 已匯入時間！');
                setTimeout(() => setSleepImportMsg(''), 2000);
              } else {
                setSleepImportMsg('⚠️ 格式無法辨識');
                setTimeout(() => setSleepImportMsg(''), 2000);
              }
            }
          } catch (err) {
            setSleepImportMsg('⚠️ 無法讀取剪貼簿，請先複製資料');
            setTimeout(() => setSleepImportMsg(''), 2500);
          }
        }}>📋 從剪貼簿匯入 (AutoSleep / Apple Health)</button>
