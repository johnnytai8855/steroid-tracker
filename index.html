    setAnalyzing(true);
    try {
      const compressed = await compressImage(file, 480, 0.6);
      if (type === 'face') {
        setFacePhoto(compressed);
        await savePhoto(selectedDate, 'face', compressed);
        const analysis = await analyzePhoto(compressed, 'face');
        setFaceAnalysis(analysis);
        // Save analysis in data
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].faceAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      } else {
        setBodyPhoto(compressed);
        await savePhoto(selectedDate, 'body', compressed);
        const analysis = await analyzePhoto(compressed, 'body');
        setBodyAnalysis(analysis);
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].bodyAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      }
    } catch (err) { console.error('Photo error:', err); }
    setAnalyzing(false);
  };

  const removePhoto = async (type) => {
    if (type === 'face') { setFacePhoto(null); setFaceAnalysis(null); await savePhoto(selectedDate, 'face', null); }
    else { setBodyPhoto(null); setBodyAnalysis(null); await savePhoto(selectedDate, 'body', null); }
    const newData = { ...data };
    if (newData[selectedDate]) {
      if (type === 'face') delete newData[selectedDate].faceAnalysis;
      else delete newData[selectedDate].bodyAnalysis;
      const hasFace = type === 'face' ? false : !!(await loadPhoto(selectedDate, 'face'));
      const hasBody = type === 'body' ? false : !!(await loadPhoto(selectedDate, 'body'));
      newData[selectedDate].hasPhotos = hasFace || hasBody;
      updateData(newData);
    }
  };

  // Re-analyze photos after calibration
  const handleRecalibrate = async () => {
    const fp = await loadPhoto(selectedDate, 'face');
    const bp = await loadPhoto(selectedDate, 'body');
    if (fp) { const a = await analyzePhoto(fp, 'face'); setFaceAnalysis(a); }
    if (bp) { const a = await analyzePhoto(bp, 'body'); setBodyAnalysis(a); }
  };

  const handleSave = () => {
    const cleanDrugs = {};
    Object.entries(drugs).forEach(([k, v]) => { if (v && parseFloat(v) > 0) cleanDrugs[k] = parseFloat(v); });
    const existing = data[selectedDate] || {};
    const hasAnySymptoms = Object.values(symptoms).some(arr => arr.length > 0);
    const cleanTimes = {};
    Object.entries(drugTimes).forEach(([k, v]) => { if (v && cleanDrugs[k]) cleanTimes[k] = v; });
    const hasSleep = sleep.bedtime || sleep.wakeTime || sleep.quality;
    const cleanSleep = hasSleep ? sleep : undefined;
    const cleanWeight = weight ? parseFloat(weight) : undefined;
    const cleanSite = injectionSite || undefined;
    const hasMorning = Object.keys(morningScores).length > 0;
    const hasEvening = Object.keys(eveningScores).length > 0;
    const hasAdhoc = adhocSymptoms.length > 0;
    const cleanMorning = hasMorning ? morningScores : undefined;
    const cleanEvening = hasEvening ? eveningScores : undefined;
    const cleanAdhoc = hasAdhoc ? adhocSymptoms : undefined;
    const cleanSymNote = symptomNote.trim() || undefined;
    const newData = { ...data, [selectedDate]: { ...existing, drugs: cleanDrugs, drugTimes: cleanTimes, symptoms, note, sleep: cleanSleep, weight: cleanWeight, injectionSite: cleanSite, morningScores: cleanMorning, eveningScores: cleanEvening, adhocSymptoms: cleanAdhoc, symptomNote: cleanSymNote, noInjection: noInjection || undefined, noPeptide: noPeptide || undefined, updatedAt: new Date().toISOString() } };
    if (!hasAnySymptoms && !Object.keys(cleanDrugs).length && !note && !existing.hasPhotos && !hasSleep && !cleanWeight && !cleanSite && !hasMorning && !hasEvening && !hasAdhoc && !cleanSymNote && !noInjection && !noPeptide) delete newData[selectedDate];
    updateData(newData);
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus(''), 1500);
  };

  const isToday = selectedDate === today();
  const dayOfWeek = ['日','一','二','三','四','五','六'][parseDate(selectedDate).getDay()];

  // Storage usage
  const storageBytes = useMemo(() => getStorageUsage(), [facePhoto, bodyPhoto, data]);
  const storageMB = (storageBytes / 1024 / 1024).toFixed(1);
  const storageWarn = storageBytes > 4 * 1024 * 1024;

  const MetricBar = ({ label, value, color }) => (
    <div className="metric-row">
      <span style={{color:'var(--text2)'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div className="metric-bar">
          <div className="metric-fill" style={{width:`${value}%`, background: color}} />
        </div>
        <span style={{minWidth:30,textAlign:'right',color}}>{value}</span>
      </div>
    </div>
  );

  const AnalysisCard = ({ title, analysis, photoType, date, onRecalibrate }) => {
    if (!analysis) return null;
    const [showCalib, setShowCalib] = useState(false);
    const [calibRatings, setCalibRatings] = useState({});
    const [calibSaved, setCalibSaved] = useState(false);
    const calibStats = getCalibStats();
    const hasCalib = calibStats.count > 0;

    const level = analysis.swellingIndex < 30 ? '正常' : analysis.swellingIndex < 55 ? '輕微' : analysis.swellingIndex < 75 ? '偏高' : '明顯';
    const levelColor = analysis.swellingIndex < 30 ? 'var(--green)' : analysis.swellingIndex < 55 ? 'var(--blue)' : analysis.swellingIndex < 75 ? 'var(--orange)' : 'var(--red)';
    const pumpColor = (analysis.pumpScore||0) > 65 ? 'var(--green)' : (analysis.pumpScore||0) > 40 ? 'var(--blue)' : 'var(--orange)';
    const defColor = (analysis.definitionScore||0) > 60 ? 'var(--green)' : (analysis.definitionScore||0) > 35 ? 'var(--blue)' : 'var(--text2)';
    const waterColor = (analysis.waterScore||0) > 60 ? 'var(--red)' : (analysis.waterScore||0) > 35 ? 'var(--orange)' : 'var(--green)';
    const isBody = analysis.type === 'body' || title.includes('身');

    const ratingOptions = [
      { value: 1, label: 'AI太低' },
      { value: 2, label: '偏低' },
      { value: 3, label: '準確 ✓' },
      { value: 4, label: '偏高' },
      { value: 5, label: 'AI太高' },
    ];
    const metricLabels = { pumpScore: '充血度', definitionScore: '肌肉線條', waterScore: '水腫程度' };

    const handleCalibSave = () => {
      Object.entries(calibRatings).forEach(([metric, rating]) => {
        const rawVal = analysis._raw ? analysis._raw[metric] : (analysis[metric] || 0);
        recordCalibrationEntry(date, photoType, metric, rawVal, rating);
      });
      setCalibSaved(true);
      setTimeout(() => setCalibSaved(false), 2000);
      // Trigger re-analysis
      if (onRecalibrate) onRecalibrate();
    };

    return (
      <div className="ai-card">
        <h3>🤖 {title} AI 分析 {hasCalib && <span className="calib-badge">已學習 {calibStats.count} 筆</span>}</h3>
        {/* Main status badges */}
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:pumpColor}}>{analysis.pumpLabel || (analysis.pumpScore > 65 ? '💪 Pump' : analysis.pumpScore > 40 ? '正常' : '😐 Flat')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>充血狀態</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:waterColor}}>{analysis.waterLabel || (analysis.waterScore > 60 ? '💧 偏水' : analysis.waterScore > 35 ? '輕微' : '✅ 乾爽')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>{isBody ? '腹部水腫' : '臉部水腫'}</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:defColor}}>{analysis.defLabel || (analysis.definitionScore > 60 ? '✨ 明顯' : analysis.definitionScore > 35 ? '普通' : '不明顯')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>肌肉線條</div>
          </div>
        </div>
        {/* Detailed metrics */}
        <MetricBar label="💪 充血度 (Pump)" value={analysis.pumpScore||0} color={pumpColor} />
        <MetricBar label="📐 肌肉線條" value={analysis.definitionScore||0} color={defColor} />
        <MetricBar label="💧 水腫程度" value={analysis.waterScore||0} color={waterColor} />
        <MetricBar label="🔴 腫脹指數" value={analysis.swellingIndex} color={levelColor} />
        <MetricBar label="泛紅" value={analysis.redness} color="var(--red)" />
        <MetricBar label="亮度" value={analysis.brightness} color="var(--blue)" />
        <MetricBar label="色溫" value={analysis.warmth} color="var(--pink)" />

        {/* Calibration feedback section */}
        <div className="calib-section">
          <button className="calib-btn" style={{width:'100%',padding:'8px',marginBottom:8,fontSize:'0.85em',background: showCalib ? 'var(--purple)' : 'var(--card2)', color: showCalib ? '#fff' : 'var(--text2)'}} onClick={() => setShowCalib(!showCalib)}>
            🎯 {showCalib ? '收起校準' : '覺得不準？點我教 AI'}
          </button>
          {showCalib && (
            <div>
              <p style={{fontSize:'0.75em',color:'var(--text2)',marginBottom:8}}>告訴 AI 每項判斷跟你的感覺差多少，AI 會學習你的標準：</p>
              {CALIB_METRICS.map(metric => (
                <div className="calib-row" key={metric}>
                  <span className="calib-label">{metricLabels[metric]}</span>
                  <div className="calib-btns">
                    {ratingOptions.map(opt => (
                      <button key={opt.value} className={`calib-btn ${calibRatings[metric] === opt.value ? 'selected' : ''}`}
                        onClick={() => setCalibRatings(prev => ({...prev, [metric]: opt.value}))}>
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
              <button className="save-btn" style={{marginTop:8,fontSize:'0.9em',padding:'10px'}}
                onClick={handleCalibSave}
                disabled={!Object.keys(calibRatings).length}>
                {calibSaved ? '✓ 已記錄，AI 正在學習！' : '送出校準'}
              </button>
              {analysis._offsets && Object.keys(analysis._offsets).some(k => analysis._offsets[k] !== 0) && (
                <p style={{fontSize:'0.7em',color:'var(--purple)',marginTop:6,textAlign:'center'}}>
                  目前校準偏移：{Object.entries(analysis._offsets).filter(([,v])=>v!==0).map(([k,v]) => `${metricLabels[k]} ${v>0?'+':''}${v}`).join('、')}
                </p>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="page">
      <div className="date-nav">
        <button onClick={() => changeDate(-1)}>◀ 前一天</button>
        <div className="date">{selectedDate.slice(5)} ({dayOfWeek}){isToday && ' 📍'}</div>
        <button onClick={() => changeDate(1)}>後一天 ▶</button>
      </div>

      {/* Smart Daily Briefing */}
      {(() => {
        const briefingItems = generateBriefing(data, selectedDate);
        if (!briefingItems.length) return null;
        return (
          <div className="briefing">
            <h3>🧠 今日智慧摘要</h3>
            {briefingItems.map((item, i) => (
              <div className="briefing-item" key={i} style={{color: item.color}}>
                {item.icon} {item.text}
              </div>
            ))}
          </div>
        );
      })()}

      {storageWarn && (
        <div className="storage-warn">⚠️ 儲存空間已用 {storageMB}MB，接近上限。建議匯出備份後清理舊照片。</div>
      )}

      <div className="card">
        <h3>📸 臉部 & 身材照</h3>
        <div className="photo-section">
          <div className="photo-slot">
            <h4>臉部</h4>
            <div className={`photo-frame ${facePhoto?'has-photo':''}`} onClick={() => !facePhoto && faceInputRef.current?.click()}>
              {facePhoto ? (
                <>
                  <img src={facePhoto} alt="臉部" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('face'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝臉部照</div>
                </div>
              )}
            </div>
            <input ref={faceInputRef} className="photo-input" type="file" accept="image/*" capture="user"
              onChange={e => handlePhoto(e, 'face')} />
          </div>
          <div className="photo-slot">
            <h4>身材</h4>
            <div className={`photo-frame ${bodyPhoto?'has-photo':''}`} onClick={() => !bodyPhoto && bodyInputRef.current?.click()}>
              {bodyPhoto ? (
                <>
                  <img src={bodyPhoto} alt="身材" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('body'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝身材照</div>
                </div>
              )}
            </div>
            <input ref={bodyInputRef} className="photo-input" type="file" accept="image/*" capture="environment"
              onChange={e => handlePhoto(e, 'body')} />
          </div>
        </div>
        {analyzing && <p style={{textAlign:'center',color:'var(--purple)',marginTop:8,fontSize:'0.85em'}}>🔄 分析中...</p>}
        <p style={{fontSize:'0.72em',color:'var(--text2)',marginTop:8,textAlign:'center'}}>
          儲存空間：{storageMB} MB / ~5 MB
        </p>
      </div>

      {(faceAnalysis || bodyAnalysis) && (
        <>
          {faceAnalysis && <AnalysisCard title="臉部" analysis={faceAnalysis} photoType="face" date={selectedDate} onRecalibrate={handleRecalibrate} />}
          {bodyAnalysis && <AnalysisCard title="身材" analysis={bodyAnalysis} photoType="body" date={selectedDate} onRecalibrate={handleRecalibrate} />}
        </>
      )}

      <div className="card">
        <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          💊 藥物劑量
          <button onClick={() => setShowProtocolSetup(!showProtocolSetup)}
            style={{background:showProtocolSetup?'var(--blue)':'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 10px',
              color:showProtocolSetup?'#fff':'var(--text2)',fontSize:'0.72em',cursor:'pointer'}}>
            ⚙️ 固定菜單
          </button>
        </h3>

        {/* Protocol Setup UI */}
        {showProtocolSetup && (
          <div style={{background:'var(--card2)',borderRadius:10,padding:12,marginBottom:12,border:'1px solid var(--purple)'}}>
            <div style={{fontSize:'0.82em',color:'var(--purple)',marginBottom:8,fontWeight:600}}>📋 設定每日固定菜單</div>
            <p style={{fontSize:'0.72em',color:'var(--text2)',marginBottom:10}}>設定後，每天紀錄會自動帶入這些藥物和劑量，只需選擇時間即可</p>
            {DRUG_CATEGORIES.map(cat => {
              const catDrugs = DRUGS.filter(d => d.cat === cat.key);
              return (
                <div key={cat.key} style={{marginBottom:6}}>
                  <div style={{fontSize:'0.75em',color:'var(--text2)',marginBottom:4}}>{cat.label}</div>
                  {catDrugs.map(d => {
                    const hasProto = protocolState.drugs[d.key] && parseFloat(protocolState.drugs[d.key]) > 0;
                    return (
                      <div key={d.key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,paddingLeft:4}}>
                        <div style={{color:d.color,fontSize:'0.78em',minWidth:85}}>{d.label}</div>
                        <input className="drug-input" type="number" step="any" placeholder="0"
                          value={protocolState.drugs[d.key] || ''}
                          inputMode="decimal"
                          style={{flex:'1 1 40px',minWidth:40,padding:'6px 8px',fontSize:'0.85em'}}
                          onChange={e => {
                            const val = parseFloat(e.target.value) || 0;
                            setProtocolState(prev => {
                              const next = {...prev, drugs: {...prev.drugs}};
                              if (val > 0) next.drugs[d.key] = val;
                              else delete next.drugs[d.key];
                              return next;
                            });
                          }} />
                        <span style={{fontSize:'0.7em',color:'var(--text2)',minWidth:24}}>{d.unit}</span>
                        <select value={protocolState.drugTimes?.[d.key] || ''}
                          style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 6px',color:'var(--text)',fontSize:'0.72em'}}
                          onChange={e => {
                            setProtocolState(prev => {
                              const next = {...prev, drugTimes: {...(prev.drugTimes || {})}};
                              next.drugTimes[d.key] = e.target.value;
                              return next;
                            });
                          }}>
                          <option value="">時間</option>
                          <option value="morning">🌅 起床</option>
                          <option value="evening">🌙 睡前</option>
                          <option value="both">🔄 早晚各一次</option>
                        </select>
                        {hasProto && <span style={{color:'var(--green)',fontSize:'0.7em'}}>✓</span>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            <button onClick={() => {
              saveDailyProtocol(protocolState);
              setDrugs(prev => {
                const hasExisting = Object.values(prev).some(v => v > 0);
                return hasExisting ? prev : { ...protocolState.drugs };
              });
              setShowProtocolSetup(false);
            }} style={{width:'100%',padding:'8px',background:'var(--purple)',color:'#fff',border:'none',borderRadius:8,fontSize:'0.85em',cursor:'pointer',marginTop:6}}>
              ✅ 儲存菜單
            </button>
          </div>
        )}

        {/* === Injection Action Buttons === */}
        {(() => {
          const protocolKeys = Object.keys(protocolState.drugs || {}).filter(k => protocolState.drugs[k] > 0);
          const PEPTIDE_CATS = ['peptide'];
          const injectionProtocolKeys = protocolKeys.filter(k => { const d = DRUGS.find(x=>x.key===k); return d && !PEPTIDE_CATS.includes(d.cat); });
          const peptideProtocolKeys = protocolKeys.filter(k => { const d = DRUGS.find(x=>x.key===k); return d && PEPTIDE_CATS.includes(d.cat); });
          const hasInjectionDrugs = Object.entries(drugs).some(([k,v]) => { const d = DRUGS.find(x=>x.key===k); return d && !PEPTIDE_CATS.includes(d.cat) && parseFloat(v) > 0; });
          const nonProtocolUsed = Object.keys(drugs).filter(k => parseFloat(drugs[k]) > 0 && !protocolKeys.includes(k));

          return (<>
          {/* Two main action buttons */}
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            {injectionProtocolKeys.length > 0 && !hasInjectionDrugs && !noInjection && (
              <button onClick={() => {
                const injDrugs = {}; const injTimes = {};
                injectionProtocolKeys.forEach(k => { injDrugs[k] = protocolState.drugs[k]; if(protocolState.drugTimes?.[k]) injTimes[k] = protocolState.drugTimes[k]; });
                setDrugs(prev => ({...prev, ...injDrugs})); setDrugTimes(prev => ({...prev, ...injTimes})); setNoInjection(false);
              }}
                style={{flex:1,padding:'12px 10px',background:'linear-gradient(135deg,rgba(139,127,168,0.15),rgba(107,127,153,0.1))',
                  border:'2px dashed var(--purple)',borderRadius:12,color:'var(--purple)',fontSize:'0.85em',fontWeight:600,cursor:'pointer',transition:'all 0.2s',lineHeight:1.3}}>
                💉 填入今日菜單
              </button>
            )}
            <button onClick={() => {
              if (!noInjection) {
                // Only clear non-peptide drugs
                const kept = {}; const keptTimes = {};
                Object.entries(drugs).forEach(([k,v]) => { const d = DRUGS.find(x=>x.key===k); if(d && PEPTIDE_CATS.includes(d.cat)) { kept[k]=v; if(drugTimes[k]) keptTimes[k]=drugTimes[k]; } });
                setDrugs(kept); setDrugTimes(keptTimes);
              }
              setNoInjection(!noInjection);
            }}
              style={{flex: (injectionProtocolKeys.length > 0 && !hasInjectionDrugs && !noInjection) ? 1 : undefined,
                width: (injectionProtocolKeys.length > 0 && !hasInjectionDrugs && !noInjection) ? undefined : '100%',
                padding:'12px 10px',borderRadius:12,
                border: noInjection ? '2px solid var(--green)' : '1px solid var(--border)',
                background: noInjection ? 'rgba(122,158,142,0.12)' : 'var(--card2)',
                color: noInjection ? 'var(--green)' : 'var(--text2)',
                fontSize:'0.85em',fontWeight: noInjection ? 600 : 400,cursor:'pointer',transition:'all 0.2s',lineHeight:1.3}}>
              {noInjection ? '✅ 今日休息（沒打針）' : '🚫 今日沒打針'}
            </button>
          </div>

          {/* Show injection drugs when entered and not rest day */}
          {!noInjection && hasInjectionDrugs && (
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{fontSize:'0.75em',color:'var(--purple)',fontWeight:500}}>💉 今日注射</div>
                <button onClick={() => {
                  const kept = {}; const keptTimes = {};
                  Object.entries(drugs).forEach(([k,v]) => { const d = DRUGS.find(x=>x.key===k); if(d && PEPTIDE_CATS.includes(d.cat)) { kept[k]=v; if(drugTimes[k]) keptTimes[k]=drugTimes[k]; } });
                  setDrugs(kept); setDrugTimes(keptTimes);
                }} style={{background:'none',border:'none',color:'var(--text2)',fontSize:'0.7em',cursor:'pointer',textDecoration:'underline'}}>清除注射</button>
              </div>
                  {injectionProtocolKeys.map(dk => {
                    const d = DRUGS.find(x => x.key === dk);
                    if (!d) return null;
                    const missed = getMissedInjectionInfo(data, d.key, selectedDate);
                    return (
                      <div key={dk} style={{marginBottom:10,paddingLeft:4}}>
                        {missed && (
                          <div style={{background: missed.urgency === 'high' ? 'rgba(184,92,92,0.12)' : missed.urgency === 'medium' ? 'rgba(196,149,106,0.12)' : 'rgba(107,127,153,0.12)',
                            border: `1px solid ${missed.urgency === 'high' ? 'var(--red)' : missed.urgency === 'medium' ? 'var(--orange)' : 'var(--blue)'}`,
                            borderRadius:8,padding:'6px 8px',marginBottom:4,fontSize:'0.75em'}}>
                            ⏰ {d.label}：距上次 {missed.daysSince} 天 — {missed.suggestTime}
                          </div>
                        )}
                        <div className="drug-row" style={{flexWrap:'wrap'}}>

          {[{v:1,l:'😫 很差'},{v:2,l:'😕 不好'},{v:3,l:'😐 普通'},{v:4,l:'🙂 不錯'},{v:5,l:'😴 很好'}].map(q => (
            <button key={q.v} className={`sleep-q-btn q${q.v} ${sleep.quality===q.v?'active':''}`}
              onClick={() => setSleep(s => ({...s, quality: q.v}))}>{q.l}</button>
          ))}
        </div>
        <div className="sleep-grid">
          <div className="sleep-field">
            <label>深睡 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.deep||''} onChange={e => setSleep(s => ({...s, deep: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>REM (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.rem||''} onChange={e => setSleep(s => ({...s, rem: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>淺睡 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.light||''} onChange={e => setSleep(s => ({...s, light: e.target.value}))} />
          </div>
          <div className="sleep-field">
            <label>清醒 (分鐘)</label>
            <input type="number" inputMode="numeric" placeholder="--" value={sleep.awake||''} onChange={e => setSleep(s => ({...s, awake: e.target.value}))} />
          </div>
        </div>
        {(sleep.deep || sleep.rem || sleep.light) && (() => {
          const d = parseInt(sleep.deep)||0, r = parseInt(sleep.rem)||0, l = parseInt(sleep.light)||0, a = parseInt(sleep.awake)||0;
          const total = d + r + l + a || 1;
          return (
            <div className="sleep-bar">
              <div style={{width:`${d/total*100}%`,background:'#6b6fa0'}} title={`深睡 ${d}m`} />
              <div style={{width:`${r/total*100}%`,background:'#8b7fa8'}} title={`REM ${r}m`} />
              <div style={{width:`${l/total*100}%`,background:'#7a94b0'}} title={`淺睡 ${l}m`} />
              <div style={{width:`${a/total*100}%`,background:'#374151'}} title={`清醒 ${a}m`} />
            </div>
          );
        })()}
        {(sleep.deep || sleep.rem || sleep.light) && (
          <div style={{display:'flex',justifyContent:'center',gap:10,fontSize:'0.7em',color:'var(--text2)',marginBottom:6}}>
            <span>🟦 深睡</span><span>🟪 REM</span><span>💠 淺睡</span><span>⬛ 清醒</span>
          </div>
        )}
        {/* Extra AutoSleep health metrics */}
        {(sleep.sleepHR || sleep.hrv || sleep.spo2) && (
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap',padding:'8px 0',fontSize:'0.82em'}}>
            {sleep.sleepHR > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--red)'}}>{sleep.sleepHR}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>睡眠心率</div>
            </div>}
            {sleep.hrv > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--green)'}}>{sleep.hrv}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>HRV</div>
            </div>}
            {sleep.sleepHRV > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color:'var(--blue)'}}>{sleep.sleepHRV}</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>睡眠HRV</div>
            </div>}
            {sleep.spo2 > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color: sleep.spo2 < 95 ? 'var(--orange)' : 'var(--blue)'}}>{sleep.spo2}%</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>血氧</div>
            </div>}
            {sleep.efficiency > 0 && <div style={{textAlign:'center'}}>
              <div style={{fontSize:'1.2em',fontWeight:700,color: sleep.efficiency >= 85 ? 'var(--green)' : 'var(--orange)'}}>{sleep.efficiency}%</div>
              <div style={{fontSize:'0.7em',color:'var(--text2)'}}>效率</div>
            </div>}
          </div>
        )}
        <button className="sleep-import-btn" onClick={async () => {
          try {
            const text = await navigator.clipboard.readText();
            // Try JSON parse (from iOS Shortcut)
            let parsed;
            try { parsed = JSON.parse(text); } catch {}
            if (parsed && (parsed.bedtime || parsed.sleepStart || parsed.deep || parsed.totalMinutes)) {
              const s = { ...defaultSleep };
              s.bedtime = parsed.bedtime || parsed.sleepStart || '';
              s.wakeTime = parsed.wakeTime || parsed.wakeEnd || '';
              if (parsed.quality) s.quality = parseInt(parsed.quality) || 0;
              if (parsed.deep) s.deep = String(parseInt(parsed.deep));
              if (parsed.rem) s.rem = String(parseInt(parsed.rem));
              if (parsed.light) s.light = String(parseInt(parsed.light));
              if (parsed.awake) s.awake = String(parseInt(parsed.awake));
              s.source = parsed.source || 'health';
              // If totalMinutes provided but no breakdown, estimate
              if (parsed.totalMinutes && !parsed.deep) {
                const t = parseInt(parsed.totalMinutes);
                s.deep = String(Math.round(t * 0.2));
                s.light = String(Math.round(t * 0.5));
                s.rem = String(Math.round(t * 0.25));
                s.awake = String(Math.round(t * 0.05));
              }
              setSleep(s);
              setSleepImportMsg('✓ 已匯入睡眠資料！');
              setTimeout(() => setSleepImportMsg(''), 2000);
            } else {
              // Try simple format: "23:30,07:15" or "bedtime wakeTime"
              const parts = text.trim().replace(/[\s,;|]+/g, ',').split(',');
              if (parts.length >= 2 && parts[0].includes(':') && parts[1].includes(':')) {
                setSleep(s => ({ ...s, bedtime: parts[0].trim(), wakeTime: parts[1].trim(), source: 'paste' }));
                setSleepImportMsg('✓ 已匯入時間！');
                setTimeout(() => setSleepImportMsg(''), 2000);
              } else {
                setSleepImportMsg('⚠️ 格式無法辨識');
                setTimeout(() => setSleepImportMsg(''), 2000);
              }
            }
          } catch (err) {
            setSleepImportMsg('⚠️ 無法讀取剪貼簿，請先複製資料');
            setTimeout(() => setSleepImportMsg(''), 2500);
          }
        }}>📋 從剪貼簿匯入 (AutoSleep / Apple Health)</button>
        {sleepImportMsg && <div style={{fontSize:'0.8em',color: sleepImportMsg.includes('✓') ? 'var(--green)' : 'var(--orange)',textAlign:'center',marginTop:4}}>{sleepImportMsg}</div>}
        {sleep.source && sleep.source !== 'manual' && <div className="sleep-source">來源：{sleep.source === 'health' ? 'Apple Health' : sleep.source === 'autosleep' ? 'AutoSleep' : sleep.source}</div>}
      </div>

      <div className="card">
        <h3>📝 備註</h3>
        <textarea className="note-input" placeholder="其他觀察、感受..."
          value={note} onChange={e => setNote(e.target.value)} />
      </div>

      <button className={`save-btn ${saveStatus}`} onClick={handleSave}>
        {saveStatus === 'saved' ? '✓ 已儲存' : '儲存紀錄'}
      </button>
    </div>
  );
}

function CalendarPage({ data, calMonth, setCalMonth, selectedDate, setSelectedDate, setTab }) {
  const [year, month] = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = today();

  const prevMonth = () => setCalMonth(month === 0 ? [year-1, 11] : [year, month-1]);
  const nextMonth = () => setCalMonth(month === 11 ? [year+1, 0] : [year, month+1]);

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) days.push(d);

  const clickDay = d => {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    setSelectedDate(dateStr);
    setTab('record');
  };

  return (
    <div className="page">
      <div className="cal-month">
        <button onClick={prevMonth}>◀</button>
        <div className="month-label">{year}年 {month+1}月</div>
        <button onClick={nextMonth}>▶</button>
      </div>
      <div className="cal-grid">
        {['日','一','二','三','四','五','六'].map(d => <div className="cal-header" key={d}>{d}</div>)}
        {days.map((d, i) => {
          if (!d) return <div className="cal-day empty" key={`e${i}`} />;
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const entry = data[dateStr];
          const hasDrugs = entry && Object.keys(entry.drugs || {}).length > 0;
          const allSyms = entry ? flattenSymptoms(entry.symptoms) : [];
          const hasSymptoms = allSyms.length > 0;
          const isToday = dateStr === todayStr;
          const isSel = dateStr === selectedDate;
          const negSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'negative');
          const posSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'positive');
          return (
            <div className={`cal-day ${isToday?'today':''} ${isSel?'selected':''}`} key={d} onClick={() => clickDay(d)}>
              <div className="num">{d}</div>
              <div className="dots">
                {hasDrugs && <div className="dot" style={{background:'var(--blue)'}} />}
                {negSymptoms.length > 0 && <div className="dot" style={{background:'var(--red)'}} />}
                {posSymptoms.length > 0 && <div className="dot" style={{background:'var(--green)'}} />}
                {entry?.hasPhotos && <div className="dot" style={{background:'var(--purple)'}} />}
                {entry?.sleep?.bedtime && <div className="dot" style={{background:'var(--pink)'}} />}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,display:'flex',gap:16,justifyContent:'center',fontSize:'0.78em',color:'var(--text2)'}}>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--blue)',marginRight:4,verticalAlign:'middle'}} />有用藥</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--red)',marginRight:4,verticalAlign:'middle'}} />有負面症狀</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--green)',marginRight:4,verticalAlign:'middle'}} />有正面反應</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--purple)',marginRight:4,verticalAlign:'middle'}} />有照片</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--pink)',marginRight:4,verticalAlign:'middle'}} />有睡眠</span>
      </div>

      {/* Recent entries */}
      <div className="card" style={{marginTop:16}}>
        <h3>最近紀錄</h3>
        {Object.keys(data).sort().reverse().slice(0, 10).map(date => {
          const e = data[date];
          const drugStr = Object.entries(e.drugs||{}).map(([k,v]) => `${DRUGS.find(d=>d.key===k)?.label||k} ${v}${DRUGS.find(d=>d.key===k)?.unit||''}`).join(', ');
          const norm = normalizeSymptoms(e.symptoms);
          const allSyms = flattenSymptoms(e.symptoms);
          const symParts = [];
          TIME_PERIODS.forEach(p => {
            const syms = (norm[p.key] || []).map(s => SYMPTOMS.find(x=>x.key===s)?.label||s);
            if (syms.length) symParts.push(`${p.label}: ${syms.join(', ')}`);
          });
          const symStr = symParts.length > 1 ? symParts.join(' | ') : allSyms.map(s => SYMPTOMS.find(x=>x.key===s)?.label||s).join(', ');
          if (!drugStr && !symStr) return null;
          return (
            <div className="hist-item" key={date} onClick={() => { setSelectedDate(date); setTab('record'); }} style={{cursor:'pointer'}}>
              <div className="hist-date">{date} ({['日','一','二','三','四','五','六'][parseDate(date).getDay()]})</div>
              {drugStr && <div className="hist-drugs">💊 {drugStr}</div>}
              {symStr && <div className="hist-symptoms">📋 {symStr}</div>}
              {e.sleep?.bedtime && (() => {
                const s = e.sleep;
                let sleepStr = `😴 ${s.bedtime}→${s.wakeTime||'?'}`;
                if (s.bedtime && s.wakeTime) {
                  const [bh,bm] = s.bedtime.split(':').map(Number);
                  const [wh,wm] = s.wakeTime.split(':').map(Number);
                  let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
                  sleepStr += ` (${Math.floor(mins/60)}h${mins%60>0?mins%60+'m':''})`;
                }
                if (s.quality) sleepStr += ` ${'⭐'.repeat(Math.min(s.quality,5))}`;
                return <div style={{fontSize:'0.82em',color:'var(--pink)',marginTop:2}}>{sleepStr}</div>;
              })()}
              {e.note && <div className="hist-note">📝 {e.note}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ChartPage({ data, setTab }) {
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chartRef3 = useRef(null);
  const checkinChartRef = useRef(null);
  const chart1 = useRef(null);
  const chart2 = useRef(null);
  const chart3 = useRef(null);
  const checkinChart = useRef(null);

  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);

  useEffect(() => {
    if (!sortedDates.length) return;

    // Weekly aggregation
    const weekly = {};
    sortedDates.forEach(date => {
      const d = parseDate(date);
      const weekStart = new Date(d);
      weekStart.setDate(d.getDate() - d.getDay());
      const wk = fmt(weekStart);
      if (!weekly[wk]) weekly[wk] = { drugs: {}, symptoms: {} };
      const entry = data[date];
      Object.entries(entry.drugs || {}).forEach(([k, v]) => {
        weekly[wk].drugs[k] = (weekly[wk].drugs[k] || 0) + v;
      });
      flattenSymptoms(entry.symptoms).forEach(s => {
        weekly[wk].symptoms[s] = (weekly[wk].symptoms[s] || 0) + 1;
      });
    });

    const weeks = Object.keys(weekly).sort();
    if (!weeks.length) return;

    // Drug chart
    if (chart1.current) chart1.current.destroy();
    chart1.current = new Chart(chartRef1.current, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: DRUGS.filter(d => weeks.some(w => weekly[w].drugs[d.key])).map(d => ({
          label: d.label,
          data: weeks.map(w => weekly[w].drugs[d.key] || 0),
          borderColor: d.color,
          backgroundColor: d.color + '15',
          fill: true, tension: 0.3, pointRadius: 2
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#5c5850', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#8a847b', maxTicksLimit: 8 }, grid: { color: '#e8e3dc' } },
          y: { ticks: { color: '#8a847b' }, grid: { color: '#e8e3dc' } }
        }
      }
    });

    // Symptom chart
    const negSymptoms = SYMPTOMS.filter(s => s.type === 'negative' && weeks.some(w => weekly[w].symptoms[s.key]));
    const colors = ['#b85c5c','#c4856a','#c4a05a','#7a9e8e','#6b9aaa','#6b6fa0','#8b7fa8','#a87ab0','#89b0a3','#c4956a'];
    if (chart2.current) chart2.current.destroy();
    chart2.current = new Chart(chartRef2.current, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: negSymptoms.map((s, i) => ({
          label: s.label,
          data: weeks.map(w => weekly[w].symptoms[s.key] || 0),
          backgroundColor: (colors[i % colors.length]) + '88',
          borderColor: colors[i % colors.length],
          borderWidth: 1
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#5c5850', font: { size: 10 } } } },
        scales: {
          x: { stacked: true, ticks: { color: '#8a847b', maxTicksLimit: 8 }, grid: { color: '#e8e3dc' } },
          y: { stacked: true, ticks: { color: '#8a847b' }, grid: { color: '#e8e3dc' } }
        }
      }
    });

    // Sleep chart - daily sleep hours + quality
    const sleepDates = sortedDates.filter(d => data[d]?.sleep?.bedtime);
    if (sleepDates.length >= 2 && chartRef3.current) {
      if (chart3.current) chart3.current.destroy();
      chart3.current = new Chart(chartRef3.current, {
        type: 'bar',
        data: {
          labels: sleepDates.map(d => d.slice(5)),
          datasets: [{
            label: '深睡',
            data: sleepDates.map(d => parseInt(data[d].sleep.deep)||0),
            backgroundColor: '#6b6fa088', borderColor: '#6b6fa0', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: 'REM',
            data: sleepDates.map(d => parseInt(data[d].sleep.rem)||0),
            backgroundColor: '#8b7fa888', borderColor: '#8b7fa8', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: '淺睡',
            data: sleepDates.map(d => parseInt(data[d].sleep.light)||0),
            backgroundColor: '#7a94b088', borderColor: '#7a94b0', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: '總時數 (hr)',
            data: sleepDates.map(d => {
              const s = data[d].sleep;
              if (!s.bedtime || !s.wakeTime) return 0;
              const [bh,bm] = s.bedtime.split(':').map(Number);
              const [wh,wm] = s.wakeTime.split(':').map(Number);
              let mins = (wh*60+wm) - (bh*60+bm);
              if (mins <= 0) mins += 1440;
              return +(mins/60).toFixed(1);
            }),
            type: 'line',
            borderColor: '#c4a05a',
            backgroundColor: '#c4a05a22',
            pointBackgroundColor: '#c4a05a',
            pointRadius: 4,
            tension: 0.3,
            yAxisID: 'y1'
          }, {
            label: 'HRV',
            data: sleepDates.map(d => data[d].sleep.hrv || data[d].sleep.sleepHRV || 0),
            type: 'line',
            borderColor: '#7a9e8e',
            backgroundColor: '#7a9e8e22',
            pointBackgroundColor: '#7a9e8e',
            pointRadius: 3,
            tension: 0.3,
            borderDash: [4,4],
            yAxisID: 'y2'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#5c5850', font: { size: 10 } } } },
          scales: {
            x: { stacked: true, ticks: { color: '#8a847b', maxTicksLimit: 10 }, grid: { color: '#e8e3dc' } },
            y: { stacked: true, title: { display: true, text: '分鐘', color: '#8a847b' }, ticks: { color: '#8a847b' }, grid: { color: '#e8e3dc' } },
            y1: { position: 'right', title: { display: true, text: '小時', color: '#c4a05a' }, ticks: { color: '#c4a05a' }, grid: { display: false } },
            y2: { display: false, min: 0, max: 6 }
          }
        }
      });
    }

    // Check-in scores chart (morningScores + eveningScores trend)
    const checkinDates = sortedDates.filter(d => data[d]?.morningScores && Object.keys(data[d].morningScores).length > 0 || data[d]?.eveningScores && Object.keys(data[d].eveningScores).length > 0);
    if (checkinDates.length >= 2 && checkinChartRef.current) {
      if (checkinChart.current) checkinChart.current.destroy();
      const checkinDatasets = [];
      // Morning items
      const mColors = ['#c4856a','#c4a05a','#7a94b0','#8b7fa8','#c4956a'];
      MORNING_CHECKIN.forEach((item, idx) => {
        const hasData = checkinDates.some(d => data[d]?.morningScores?.[item.key] !== undefined);
        if (!hasData) return;
        checkinDatasets.push({
          label: '🌅' + item.label,
          data: checkinDates.map(d => data[d]?.morningScores?.[item.key] ?? null),
          borderColor: mColors[idx % mColors.length],
          backgroundColor: mColors[idx % mColors.length] + '22',
          tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true
        });
      });
      // Evening items
      const eColors = ['#7a9e8e','#7882a8','#b48dba','#6b9aaa','#b85c5c'];
      EVENING_CHECKIN.forEach((item, idx) => {
        const hasData = checkinDates.some(d => data[d]?.eveningScores?.[item.key] !== undefined);
        if (!hasData) return;
        checkinDatasets.push({
          label: '🌙' + item.label,
          data: checkinDates.map(d => data[d]?.eveningScores?.[item.key] ?? null),
          borderColor: eColors[idx % eColors.length],
          backgroundColor: eColors[idx % eColors.length] + '22',
          borderDash: [4,4],
          tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true
        });
      });
      if (checkinDatasets.length > 0) {
        checkinChart.current = new Chart(checkinChartRef.current, {
          type: 'line',
          data: { labels: checkinDates.map(d => d.slice(5)), datasets: checkinDatasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#5c5850', font: { size: 9 } } } },
            scales: {
              x: { ticks: { color: '#8a847b', maxTicksLimit: 10 }, grid: { color: '#e8e3dc' } },
              y: { min: 0, max: 5, ticks: { color: '#8a847b', stepSize: 1 }, grid: { color: '#e8e3dc' } }
            },
            interaction: { mode: 'index', intersect: false }
          }
        });
      }
    }

    return () => {
      if (chart1.current) chart1.current.destroy();
      if (chart2.current) chart2.current.destroy();
      if (chart3.current) chart3.current.destroy();
      if (checkinChart.current) checkinChart.current.destroy();
    };
  }, [data, sortedDates]);

  // Correlation analysis v2: drug dose → check-in scores + legacy symptoms
  const correlations = useMemo(() => {
    if (sortedDates.length < 5) return null;
    const results = {};

    // === New: Drug dose → Check-in score correlation ===
    const allCheckins = [...MORNING_CHECKIN.map(c => ({...c, src: 'morningScores'})), ...EVENING_CHECKIN.map(c => ({...c, src: 'eveningScores'}))];
    allCheckins.forEach(item => {
      const drugCorr = [];
      DRUGS.forEach(drug => {
        // Get dates where drug was used
        const doseMap = {};
        sortedDates.forEach(d => { doseMap[d] = data[d]?.drugs?.[drug.key] || 0; });
        const doseDays = sortedDates.filter(d => doseMap[d] > 0);
        const noDoseDays = sortedDates.filter(d => doseMap[d] === 0);
        if (doseDays.length < 2 || noDoseDays.length < 2) return;

        // Compare score on dose days (or day after) vs no-dose days
        const getScoreForDays = (days) => days.map(d => data[d]?.[item.src]?.[item.key]).filter(v => v !== undefined);
        const doseScores = getScoreForDays(doseDays);
        const noDoseScores = getScoreForDays(noDoseDays);
        if (doseScores.length < 2 || noDoseScores.length < 2) return;

        const doseAvg = doseScores.reduce((a,b)=>a+b,0)/doseScores.length;
        const noDoseAvg = noDoseScores.reduce((a,b)=>a+b,0)/noDoseScores.length;
        const diff = doseAvg - noDoseAvg;
        if (Math.abs(diff) > 0.4) {
          drugCorr.push({ drug: drug.label, diff: diff.toFixed(1), doseAvg: doseAvg.toFixed(1), noDoseAvg: noDoseAvg.toFixed(1), n: doseScores.length });
        }
      });
      if (drugCorr.length > 0) {
        results['checkin_' + item.key] = { label: item.icon + ' ' + item.label + '（Check-in）', drugs: drugCorr, isCheckin: true };
      }
    });

    // === Legacy: Drug dose → old symptom correlation ===
    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      const withDoses = {}, withoutDoses = {};
      DRUGS.forEach(drug => { withDoses[drug.key] = []; withoutDoses[drug.key] = []; });
      sortedDates.forEach((date, i) => {
        const hasSymptom = flattenSymptoms(data[date]?.symptoms).includes(sym.key);
        DRUGS.forEach(drug => {
          let total = 0, count = 0;
          for (let j = Math.max(0, i-2); j <= i; j++) {
            total += (data[sortedDates[j]]?.drugs?.[drug.key]) || 0; count++;
          }
          const avg = count ? total / count : 0;
          if (hasSymptom) withDoses[drug.key].push(avg);
          else withoutDoses[drug.key].push(avg);
        });
      });
      DRUGS.forEach(drug => {
        const w = withDoses[drug.key], wo = withoutDoses[drug.key];
        if (w.length >= 2 && wo.length >= 2) {
          const wAvg = w.reduce((a,b)=>a+b,0)/w.length;
          const woAvg = wo.reduce((a,b)=>a+b,0)/wo.length;
          const diff = wAvg - woAvg;
          if (Math.abs(diff) > 0.5) {
            if (!results[sym.key]) results[sym.key] = { label: sym.label, drugs: [] };
            results[sym.key].drugs.push({ drug: drug.label, diff: diff.toFixed(1), withAvg: wAvg.toFixed(1), withoutAvg: woAvg.toFixed(1), n: w.length });
          }
        }
      });
    });
    return results;
  }, [data, sortedDates]);

  const totalDays = sortedDates.length;

  return (
    <div className="page">
      <div className="card">
        <h3>📊 每週藥物劑量趨勢</h3>
        {totalDays < 1 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>儲存第一天紀錄後即可顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef1}></canvas></div>}
      </div>

      {/* Daily Check-in Scores Trend */}
      <div className="card">
        <h3>📈 每日 Check-in 趨勢</h3>
        {(() => {
          const checkinDates = sortedDates.filter(d => (data[d]?.morningScores && Object.keys(data[d].morningScores).length > 0) || (data[d]?.eveningScores && Object.keys(data[d].eveningScores).length > 0));
          return checkinDates.length < 2
            ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 2 天 Check-in 資料才能顯示趨勢（起床/晚間Check-in）</p>
            : <div className="chart-container" style={{height:300}}><canvas ref={checkinChartRef}></canvas></div>;
        })()}
        <p style={{fontSize:'0.7em',color:'var(--text2)',marginTop:6}}>實線 = 🌅起床指標，虛線 = 🌙晚間指標（0-5分）</p>
      </div>

      <div className="card">
        <h3>📊 每週負面症狀頻率</h3>
        {totalDays < 3 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 3 天資料才能顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef2}></canvas></div>}
      </div>

      <div className="card">
        <h3>😴 睡眠追蹤趨勢</h3>
        {sortedDates.filter(d => data[d]?.sleep?.bedtime).length < 2 ?
          <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 2 天睡眠資料才能顯示圖表</p> :
          <div className="chart-container"><canvas ref={chartRef3}></canvas></div>
        }
      </div>

      {/* Sleep vs Symptoms correlation */}
      {(() => {
        const sleepDates = sortedDates.filter(d => data[d]?.sleep?.bedtime && data[d]?.sleep?.wakeTime);
        if (sleepDates.length < 5) return null;
        // Calculate sleep hours per day
        const sleepHours = {};
        sleepDates.forEach(d => {
          const s = data[d].sleep;
          const [bh,bm] = s.bedtime.split(':').map(Number);
          const [wh,wm] = s.wakeTime.split(':').map(Number);
          let mins = (wh*60+wm) - (bh*60+bm);
          if (mins <= 0) mins += 1440;
          sleepHours[d] = mins / 60;
        });
        const avgHours = Object.values(sleepHours).reduce((a,b)=>a+b,0) / Object.values(sleepHours).length;
        // Compare symptoms on low sleep vs good sleep days
        const lowSleepDays = sleepDates.filter(d => sleepHours[d] < avgHours - 0.5);
        const goodSleepDays = sleepDates.filter(d => sleepHours[d] >= avgHours + 0.5);
        if (lowSleepDays.length < 2 || goodSleepDays.length < 2) return null;
        const symCount = (days) => {
          const counts = {};
          days.forEach(d => {
            flattenSymptoms(data[d]?.symptoms).forEach(s => { counts[s] = (counts[s]||0) + 1; });
          });
          return counts;
        };
        const lowCounts = symCount(lowSleepDays);
        const goodCounts = symCount(goodSleepDays);
        const diffs = SYMPTOMS.filter(s => s.type === 'negative').map(s => ({
          label: s.label,
          lowRate: ((lowCounts[s.key]||0) / lowSleepDays.length * 100).toFixed(0),
          goodRate: ((goodCounts[s.key]||0) / goodSleepDays.length * 100).toFixed(0),
          diff: ((lowCounts[s.key]||0) / lowSleepDays.length - (goodCounts[s.key]||0) / goodSleepDays.length) * 100
        })).filter(d => Math.abs(d.diff) > 10).sort((a,b) => b.diff - a.diff);
        if (!diffs.length) return null;
        return (
          <div className="card">
            <h3>😴 睡眠 vs 症狀關聯</h3>
            <p style={{color:'var(--text2)',fontSize:'0.78em',marginBottom:8}}>
              睡不好 ({'<'}{(avgHours-0.5).toFixed(1)}h, {lowSleepDays.length}天) vs 睡得好 (≥{(avgHours+0.5).toFixed(1)}h, {goodSleepDays.length}天)
            </p>
            {diffs.map(d => (
              <div key={d.label} style={{fontSize:'0.85em',padding:'4px 0',display:'flex',justifyContent:'space-between'}}>
                <span>{d.label}</span>
                <span style={{color: d.diff > 0 ? 'var(--red)' : 'var(--green)'}}>
                  睡差:{d.lowRate}% vs 睡好:{d.goodRate}% {d.diff > 0 ? '⚠️' : '✅'}
                </span>
              </div>
            ))}
          </div>
        );
      })()}

      {correlations && Object.keys(correlations).length > 0 && (
        <div className="card">
          <h3>🔍 劑量 vs 身體指標關聯分析</h3>
          <p style={{color:'var(--text2)',fontSize:'0.8em',marginBottom:12}}>比較用藥日 vs 無用藥日的 Check-in 分數差異，以及舊版症狀關聯</p>
          {Object.values(correlations).map(corr => (
            <div key={corr.label} style={{marginBottom:16}}>
              <div style={{fontWeight:600,color: corr.isCheckin ? 'var(--blue)' : 'var(--orange)',marginBottom:6}}>{corr.label}</div>
              {corr.drugs.map(d => (
                <div key={d.drug} style={{fontSize:'0.85em',padding:'4px 0',display:'flex',justifyContent:'space-between'}}>
                  <span>{d.drug}</span>
                  <span style={{color: parseFloat(d.diff) > 0 ? 'var(--green)' : 'var(--red)'}}>
                    {parseFloat(d.diff) > 0 ? '↑' : '↓'} {d.diff}
                    {corr.isCheckin ? ` (用藥:${d.doseAvg} vs 無:${d.noDoseAvg})` : ` (有:${d.withAvg} vs 無:${d.withoutAvg})`}
                    {' '}n={d.n}
                  </span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Photo Comparison Timeline */}
      <PhotoTimeline data={data} sortedDates={sortedDates} />

      {/* Quick links to dedicated timeline pages */}
      <div className="card">
        <h3>📷 照片時間軸</h3>
        <div style={{display:'flex',gap:8}}>
          <button className="action-btn" style={{flex:1,margin:0,background:'var(--purple)',color:'#fff',fontWeight:600}} onClick={() => setTab('face_timeline')}>
            🤳 臉部變化
          </button>
          <button className="action-btn" style={{flex:1,margin:0,background:'var(--green)',color:'#fff',fontWeight:600}} onClick={() => setTab('body_timeline')}>
            💪 身材變化
          </button>
        </div>
        <p style={{fontSize:'0.75em',color:'var(--text2)',marginTop:6,textAlign:'center'}}>點選多張照片進行放大對比</p>
      </div>

      <div className="card">
        <h3>📈 統計摘要 / 荷爾蒙狀態推測</h3>
        <div style={{fontSize:'0.88em'}}>
          <p>總紀錄天數：<b>{totalDays}</b></p>
          {totalDays > 0 && (
            <p>紀錄範圍：{sortedDates[0]} ~ {sortedDates[sortedDates.length-1]}</p>
          )}
          {DRUGS.map(drug => {
            const days = sortedDates.filter(d => data[d]?.drugs?.[drug.key]);
            const total = days.reduce((sum, d) => sum + (data[d].drugs[drug.key] || 0), 0);
            if (!days.length) return null;
            return <p key={drug.key} style={{color: drug.color}}>{drug.label}: {days.length}天, 平均 {(total/days.length).toFixed(1)}{drug.unit}/天</p>;
          })}
          {/* Hormonal state inference from recent 7 days */}
          {totalDays >= 3 && (() => {
            const recent = sortedDates.slice(-7);
            const catCounts = {};
            SYMPTOM_CATEGORIES.forEach(c => { catCounts[c.key] = { pos: 0, neg: 0 }; });
            recent.forEach(d => {
              const syms = flattenSymptoms(data[d]?.symptoms);
              syms.forEach(s => {
                const sym = SYMPTOMS.find(x => x.key === s);
                if (sym) {
                  if (sym.type === 'positive') catCounts[sym.cat].pos++;
                  else catCounts[sym.cat].neg++;
                }
              });
            });
            const insights = [];
            // E2 analysis
            if (catCounts.estrogen.neg >= 3) insights.push({ text: 'E2 可能偏高 — 水腫/腫脹症狀頻繁出現', color: 'var(--red)', icon: '🔴' });
            else if (catCounts.estrogen.neg === 0 && recent.length >= 5) insights.push({ text: 'E2 看起來正常 — 無水腫/雌激素症狀', color: 'var(--green)', icon: '✅' });
            // Androgen
            if (catCounts.androgen.pos >= 3 && catCounts.androgen.neg <= 1) insights.push({ text: '雄性激素表現良好 — Pump/力量正常', color: 'var(--green)', icon: '💪' });
            else if (catCounts.androgen.neg >= 3) insights.push({ text: '雄性激素表現偏弱 — Flat/力量下降', color: 'var(--orange)', icon: '⚠️' });
            // Sexual
            if (catCounts.sexual.pos >= 2 && catCounts.sexual.neg === 0) insights.push({ text: '性功能正常 — 荷爾蒙平衡良好指標', color: 'var(--green)', icon: '🔥' });
            else if (catCounts.sexual.neg >= 2) insights.push({ text: '性功能下降 — 可能E2偏高或T偏低', color: 'var(--red)', icon: '⚠️' });
            // Mood
            if (catCounts.mood_energy.neg >= 3) insights.push({ text: '精神狀態不佳 — 可能跟睡眠或劑量有關', color: 'var(--orange)', icon: '🧠' });
            // Skin/DHT
            if (catCounts.skin_hair.neg >= 2) insights.push({ text: '皮膚問題 — 可能DHT偏高', color: 'var(--orange)', icon: '💆' });
            // Joint (E2 related - too low = dry joints)
            const jointDry = recent.filter(d => flattenSymptoms(data[d]?.symptoms).includes('joint_stiff')).length;
            if (jointDry >= 3) insights.push({ text: '關節卡頻繁 — E2可能偏低（關節需要E2潤滑）', color: 'var(--orange)', icon: '🦴' });
            if (!insights.length) return null;
            return (
              <div style={{marginTop:12,padding:10,background:'var(--card2)',borderRadius:8}}>
                <div style={{fontSize:'0.82em',fontWeight:600,color:'var(--purple)',marginBottom:6}}>📊 最近 {recent.length} 天荷爾蒙狀態推測：</div>
                {insights.map((ins, i) => (
                  <div key={i} style={{fontSize:'0.82em',padding:'3px 0',color:ins.color}}>
                    {ins.icon} {ins.text}
                  </div>
                ))}
                <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:6}}>* 僅供參考，建議搭配血液檢驗數據</div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// === SMART PAGE: PK Curve, Patterns, Blood Work, Dose Suggestions ===
function SmartPage({ data, updateData, selectedDate }) {
  const pkChartRef = useRef(null);
  const pkChart = useRef(null);
  const weightChartRef = useRef(null);
  const weightChart = useRef(null);
  const bloodChartRef = useRef(null);
  const bloodChartInst = useRef(null);
  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);

  // Blood work state
  const [bloodWork, setBloodWork] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('blood_work') || '[]');
      // Merge imported data: imported entries are base, saved entries override by date
      const byDate = {};
      IMPORTED_BLOOD_WORK.forEach(e => { byDate[e.date] = { ...e, _src: 'import' }; });
      saved.forEach(e => { byDate[e.date] = { ...byDate[e.date], ...e, _src: 'user' }; });
      return Object.values(byDate).sort((a,b) => a.date.localeCompare(b.date));
    } catch { return [...IMPORTED_BLOOD_WORK]; }
  });
  const [showBloodForm, setShowBloodForm] = useState(false);
  const [bloodForm, setBloodForm] = useState(() => {
    const f = { date: today(), note: '' };
    BLOOD_MARKERS.forEach(m => { f[m.key] = ''; });
    return f;
  });

  // Inventory state
  const [inventory, setInventory] = useState(loadInventory);
  const [showInventory, setShowInventory] = useState(false);

  // Protocol state
  const [protocols, setProtocols] = useState(loadProtocols);
  const [showProtocolForm, setShowProtocolForm] = useState(false);
  const [protocolForm, setProtocolForm] = useState({ name: '', startDate: today(), endDate: '', drugs: {}, notes: '' });

  // Dose calculator state
  const [calcMg, setCalcMg] = useState('');
  const [calcConc, setCalcConc] = useState('250');

  const saveBloodWork = (bw) => {
    setBloodWork(bw);
    localStorage.setItem('blood_work', JSON.stringify(bw));
  };

  // Per-drug PK charts
  const drugPkChartRef = useRef(null);
  const drugPkChart = useRef(null);

  // PK Chart - Total + E2
  useEffect(() => {
    const levels = calcPKLevels(data, 28);
    const validLevels = levels.filter(l => l.totalT > 0 || levels.indexOf(l) > levels.length - 29);
    if (!validLevels.length || !pkChartRef.current) return;

    if (pkChart.current) pkChart.current.destroy();

    const datasets = [{
      label: '總活性 T (mg)',
      data: validLevels.map(l => l.totalT),
      borderColor: '#7a94b0',
      backgroundColor: '#7a94b022',
      fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2, yAxisID: 'y'
    }, {
      label: 'E2 貢獻指數',
      data: validLevels.map(l => l.e2),
      borderColor: '#c4856a',
      backgroundColor: '#c4856a22',
      fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2, yAxisID: 'y1'
    }];

    // Mark injection points on total T line
    const pointStyles = validLevels.map(l => {
      const e = data[l.date];
      if (e && Object.entries(e.drugs || {}).some(([k,v]) => v > 0 && DRUGS.find(d=>d.key===k)?.pk)) return 'triangle';
      return 'circle';
    });
    const pointSizes = validLevels.map(l => {
      const e = data[l.date];
      if (e && Object.entries(e.drugs || {}).some(([k,v]) => v > 0 && DRUGS.find(d=>d.key===k)?.pk)) return 6;
      return 2;
    });
    datasets[0].pointStyle = pointStyles;
    datasets[0].pointRadius = pointSizes;

    pkChart.current = new Chart(pkChartRef.current, {
      type: 'line',
      data: { labels: validLevels.map(l => l.date.slice(5)), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#5c5850', font: { size: 9 } } },
          tooltip: {
            callbacks: {
              afterBody: (ctx) => {
                const idx = ctx[0]?.dataIndex;
                if (idx === undefined) return '';
                const l = validLevels[idx];
                const e = data[l.date];
                if (!e?.drugs) return '';
                const injections = Object.entries(e.drugs).filter(([k,v]) => v > 0 && DRUGS.find(d=>d.key===k)?.pk);
                if (!injections.length) return '';
                return '\n💉 當日注射:\n' + injections.map(([k,v]) => {
                  const d = DRUGS.find(x=>x.key===k);
                  return `  ${d?.label||k}: ${v} ${d?.unit||''}`;
                }).join('\n');
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#8a847b', maxTicksLimit: 10 }, grid: { color: '#e8e3dc' } },
          y: { title: { display: true, text: '活性 T (mg)', color: '#7a94b0' }, ticks: { color: '#7a94b0' }, grid: { color: '#e8e3dc' } },
          y1: { position: 'right', title: { display: true, text: 'E2 指數', color: '#c4856a' }, ticks: { color: '#c4856a' }, grid: { display: false } }
        }
      }
    });

    return () => { if (pkChart.current) pkChart.current.destroy(); };
  }, [data]);

  // Per-Drug PK concentration chart
  useEffect(() => {
    const levels = calcPKLevels(data, 28);
    const validLevels = levels.filter(l => {
      const anyDrug = Object.values(l.byDrug).some(v => v > 0.01);
      return anyDrug || levels.indexOf(l) > levels.length - 29;
    });
    if (!validLevels.length || !drugPkChartRef.current) return;
    if (drugPkChart.current) drugPkChart.current.destroy();

    // Find all drugs that have PK data in this range
    const activeDrugs = DRUGS.filter(d => d.pk && validLevels.some(l => (l.byDrug[d.key] || 0) > 0.01));
    if (!activeDrugs.length) return;

    const datasets = activeDrugs.map(drug => ({
      label: drug.label,
      data: validLevels.map(l => Math.round((l.byDrug[drug.key] || 0) * 100) / 100),
      borderColor: drug.color,
      backgroundColor: drug.color + '18',
      fill: true,
      tension: 0.4,
      pointRadius: validLevels.map(l => {
        const e = data[l.date];
        if (e?.drugs?.[drug.key] > 0) return 5;
        return 0;
      }),
      pointStyle: validLevels.map(l => {
        const e = data[l.date];
        if (e?.drugs?.[drug.key] > 0) return 'triangle';
        return 'circle';
      }),
      pointBackgroundColor: drug.color,
      borderWidth: 2
    }));

    drugPkChart.current = new Chart(drugPkChartRef.current, {
      type: 'line',
      data: { labels: validLevels.map(l => l.date.slice(5)), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#5c5850', font: { size: 9 } } },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const drug = activeDrugs[ctx.datasetIndex];
                const val = ctx.parsed.y;
                return `${drug.label}: ${val.toFixed(2)} mg (體內殘餘)`;
              },
              afterBody: (ctx) => {
                const idx = ctx[0]?.dataIndex;
                if (idx === undefined) return '';
                const l = validLevels[idx];
                const halfLifeInfo = activeDrugs.filter(d => (l.byDrug[d.key]||0) > 0.01).map(d => {
                  const hl = d.pk.esters ? d.pk.esters.map(e => e.halfLife + '天').join('/') : d.pk.halfLife + '天';
                  return `  ${d.label} 半衰期: ${hl}`;
                });
                return halfLifeInfo.length ? '\n📊 半衰期:\n' + halfLifeInfo.join('\n') : '';
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#8a847b', maxTicksLimit: 10 }, grid: { color: '#e8e3dc' } },
          y: {
            title: { display: true, text: '體內殘餘量 (mg)', color: '#5c5850' },
            ticks: { color: '#8a847b' }, grid: { color: '#e8e3dc' },
            beginAtZero: true
          }
        },
        interaction: { mode: 'index', intersect: false }
      }
    });

    return () => { if (drugPkChart.current) drugPkChart.current.destroy(); };
  }, [data]);

  // Weight chart
  useEffect(() => {
    const weightDates = sortedDates.filter(d => data[d]?.weight);
    if (weightDates.length < 2 || !weightChartRef.current) return;
    if (weightChart.current) weightChart.current.destroy();
    weightChart.current = new Chart(weightChartRef.current, {
      type: 'line',
      data: {
        labels: weightDates.map(d => d.slice(5)),
        datasets: [{
          label: '體重 (kg)',
          data: weightDates.map(d => data[d].weight),
          borderColor: '#c4a05a',
          backgroundColor: '#c4a05a22',
          fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#c4a05a'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
