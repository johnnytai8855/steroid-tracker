        {sleepImportMsg && <div style={{fontSize:'0.8em',color: sleepImportMsg.includes('✓') ? 'var(--green)' : 'var(--orange)',textAlign:'center',marginTop:4}}>{sleepImportMsg}</div>}
        {sleep.source && sleep.source !== 'manual' && <div className="sleep-source">來源：{sleep.source === 'health' ? 'Apple Health' : sleep.source === 'autosleep' ? 'AutoSleep' : sleep.source}</div>}
      </div>

      <div className="card">
        <h3>📝 備註</h3>
        <textarea className="note-input" placeholder="其他觀察、感受..."
          value={note} onChange={e => setNote(e.target.value)} />
      </div>

      <button className={`save-btn ${saveStatus}`} onClick={handleSave}>
        {saveStatus === 'saved' ? '✓ 已儲存' : '儲存紀錄'}
      </button>
    </div>
  );
}

function CalendarPage({ data, calMonth, setCalMonth, selectedDate, setSelectedDate, setTab }) {
  const [year, month] = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = today();

  const prevMonth = () => setCalMonth(month === 0 ? [year-1, 11] : [year, month-1]);
  const nextMonth = () => setCalMonth(month === 11 ? [year+1, 0] : [year, month+1]);

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) days.push(d);

  const clickDay = d => {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    setSelectedDate(dateStr);
    setTab('record');
  };

  return (
    <div className="page">
      <div className="cal-month">
        <button onClick={prevMonth}>◀</button>
        <div className="month-label">{year}年 {month+1}月</div>
        <button onClick={nextMonth}>▶</button>
      </div>
      <div className="cal-grid">
        {['日','一','二','三','四','五','六'].map(d => <div className="cal-header" key={d}>{d}</div>)}
        {days.map((d, i) => {
          if (!d) return <div className="cal-day empty" key={`e${i}`} />;
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const entry = data[dateStr];
          const hasDrugs = entry && Object.keys(entry.drugs || {}).length > 0;
          const allSyms = entry ? flattenSymptoms(entry.symptoms) : [];
          const hasSymptoms = allSyms.length > 0;
          const isToday = dateStr === todayStr;
          const isSel = dateStr === selectedDate;
          const negSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'negative');
          const posSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'positive');
          return (
            <div className={`cal-day ${isToday?'today':''} ${isSel?'selected':''}`} key={d} onClick={() => clickDay(d)}>
              <div className="num">{d}</div>
              <div className="dots">
                {hasDrugs && <div className="dot" style={{background:'var(--blue)'}} />}
                {negSymptoms.length > 0 && <div className="dot" style={{background:'var(--red)'}} />}
                {posSymptoms.length > 0 && <div className="dot" style={{background:'var(--green)'}} />}
                {entry?.hasPhotos && <div className="dot" style={{background:'var(--purple)'}} />}
                {entry?.sleep?.bedtime && <div className="dot" style={{background:'var(--pink)'}} />}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,display:'flex',gap:16,justifyContent:'center',fontSize:'0.78em',color:'var(--text2)'}}>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--blue)',marginRight:4,verticalAlign:'middle'}} />有用藥</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--red)',marginRight:4,verticalAlign:'middle'}} />有負面症狀</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--green)',marginRight:4,verticalAlign:'middle'}} />有正面反應</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--purple)',marginRight:4,verticalAlign:'middle'}} />有照片</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--pink)',marginRight:4,verticalAlign:'middle'}} />有睡眠</span>
      </div>

      {/* Recent entries */}
      <div className="card" style={{marginTop:16}}>
        <h3>最近紀錄</h3>
        {Object.keys(data).sort().reverse().slice(0, 10).map(date => {
          const e = data[date];
          const drugStr = Object.entries(e.drugs||{}).map(([k,v]) => `${DRUGS.find(d=>d.key===k)?.label||k} ${v}${DRUGS.find(d=>d.key===k)?.unit||''}`).join(', ');
          const norm = normalizeSymptoms(e.symptoms);
          const allSyms = flattenSymptoms(e.symptoms);
          const symParts = [];
          TIME_PERIODS.forEach(p => {
            const syms = (norm[p.key] || []).map(s => SYMPTOMS.find(x=>x.key===s)?.label||s);
            if (syms.length) symParts.push(`${p.label}: ${syms.join(', ')}`);
          });
          const symStr = symParts.length > 1 ? symParts.join(' | ') : allSyms.map(s => SYMPTOMS.find(x=>x.key===s)?.label||s).join(', ');
          if (!drugStr && !symStr) return null;
          return (
            <div className="hist-item" key={date} onClick={() => { setSelectedDate(date); setTab('record'); }} style={{cursor:'pointer'}}>
              <div className="hist-date">{date} ({['日','一','二','三','四','五','六'][parseDate(date).getDay()]})</div>
              {drugStr && <div className="hist-drugs">💊 {drugStr}</div>}
              {symStr && <div className="hist-symptoms">📋 {symStr}</div>}
              {e.sleep?.bedtime && (() => {
                const s = e.sleep;
                let sleepStr = `😴 ${s.bedtime}→${s.wakeTime||'?'}`;
                if (s.bedtime && s.wakeTime) {
                  const [bh,bm] = s.bedtime.split(':').map(Number);
                  const [wh,wm] = s.wakeTime.split(':').map(Number);
                  let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
                  sleepStr += ` (${Math.floor(mins/60)}h${mins%60>0?mins%60+'m':''})`;
                }
                if (s.quality) sleepStr += ` ${'⭐'.repeat(Math.min(s.quality,5))}`;
                return <div style={{fontSize:'0.82em',color:'var(--pink)',marginTop:2}}>{sleepStr}</div>;
              })()}
              {e.note && <div className="hist-note">📝 {e.note}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ChartPage({ data, setTab }) {
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chartRef3 = useRef(null);
  const chart1 = useRef(null);
  const chart2 = useRef(null);
  const chart3 = useRef(null);

  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);

  useEffect(() => {
    if (!sortedDates.length) return;

    // Weekly aggregation
    const weekly = {};
    sortedDates.forEach(date => {
      const d = parseDate(date);
      const weekStart = new Date(d);
      weekStart.setDate(d.getDate() - d.getDay());
      const wk = fmt(weekStart);
      if (!weekly[wk]) weekly[wk] = { drugs: {}, symptoms: {} };
      const entry = data[date];
      Object.entries(entry.drugs || {}).forEach(([k, v]) => {
        weekly[wk].drugs[k] = (weekly[wk].drugs[k] || 0) + v;
      });
      flattenSymptoms(entry.symptoms).forEach(s => {
        weekly[wk].symptoms[s] = (weekly[wk].symptoms[s] || 0) + 1;
      });
    });

    const weeks = Object.keys(weekly).sort();
    if (!weeks.length) return;

    // Drug chart
    if (chart1.current) chart1.current.destroy();
    chart1.current = new Chart(chartRef1.current, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: DRUGS.filter(d => weeks.some(w => weekly[w].drugs[d.key])).map(d => ({
          label: d.label,
          data: weeks.map(w => weekly[w].drugs[d.key] || 0),
          borderColor: d.color,
          backgroundColor: d.color + '15',
          fill: true, tension: 0.3, pointRadius: 2
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });

    // Symptom chart
    const negSymptoms = SYMPTOMS.filter(s => s.type === 'negative' && weeks.some(w => weekly[w].symptoms[s.key]));
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#6366f1','#a855f7','#f43f5e','#84cc16','#fb923c'];
    if (chart2.current) chart2.current.destroy();
    chart2.current = new Chart(chartRef2.current, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: negSymptoms.map((s, i) => ({
          label: s.label,
          data: weeks.map(w => weekly[w].symptoms[s.key] || 0),
          backgroundColor: (colors[i % colors.length]) + '88',
          borderColor: colors[i % colors.length],
          borderWidth: 1
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { stacked: true, ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { stacked: true, ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });

    // Sleep chart - daily sleep hours + quality
    const sleepDates = sortedDates.filter(d => data[d]?.sleep?.bedtime);
    if (sleepDates.length >= 2 && chartRef3.current) {
      if (chart3.current) chart3.current.destroy();
      chart3.current = new Chart(chartRef3.current, {
        type: 'bar',
        data: {
          labels: sleepDates.map(d => d.slice(5)),
          datasets: [{
            label: '深睡',
            data: sleepDates.map(d => parseInt(data[d].sleep.deep)||0),
            backgroundColor: '#6366f188', borderColor: '#6366f1', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: 'REM',
            data: sleepDates.map(d => parseInt(data[d].sleep.rem)||0),
            backgroundColor: '#a78bfa88', borderColor: '#a78bfa', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: '淺睡',
            data: sleepDates.map(d => parseInt(data[d].sleep.light)||0),
            backgroundColor: '#60a5fa88', borderColor: '#60a5fa', borderWidth: 1,
            stack: 'sleep'
          }, {
            label: '總時數 (hr)',
            data: sleepDates.map(d => {
              const s = data[d].sleep;
              if (!s.bedtime || !s.wakeTime) return 0;
              const [bh,bm] = s.bedtime.split(':').map(Number);
              const [wh,wm] = s.wakeTime.split(':').map(Number);
              let mins = (wh*60+wm) - (bh*60+bm);
              if (mins <= 0) mins += 1440;
              return +(mins/60).toFixed(1);
            }),
            type: 'line',
            borderColor: '#fbbf24',
            backgroundColor: '#fbbf2422',
            pointBackgroundColor: '#fbbf24',
            pointRadius: 4,
            tension: 0.3,
            yAxisID: 'y1'
          }, {
            label: 'HRV',
            data: sleepDates.map(d => data[d].sleep.hrv || data[d].sleep.sleepHRV || 0),
            type: 'line',
            borderColor: '#34d399',
            backgroundColor: '#34d39922',
            pointBackgroundColor: '#34d399',
            pointRadius: 3,
            tension: 0.3,
            borderDash: [4,4],
            yAxisID: 'y2'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
          scales: {
            x: { stacked: true, ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#222' } },
            y: { stacked: true, title: { display: true, text: '分鐘', color: '#888' }, ticks: { color: '#888' }, grid: { color: '#222' } },
            y1: { position: 'right', title: { display: true, text: '小時', color: '#fbbf24' }, ticks: { color: '#fbbf24' }, grid: { display: false } },
            y2: { display: false, min: 0, max: 6 }
          }
        }
      });
    }

    return () => {
      if (chart1.current) chart1.current.destroy();
      if (chart2.current) chart2.current.destroy();
      if (chart3.current) chart3.current.destroy();
    };
  }, [data, sortedDates]);

  // Correlation analysis
  const correlations = useMemo(() => {
    if (sortedDates.length < 7) return null;
    const results = {};
    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      const withDoses = {};
      const withoutDoses = {};
      DRUGS.forEach(drug => { withDoses[drug.key] = []; withoutDoses[drug.key] = []; });

      sortedDates.forEach((date, i) => {
        const entry = data[date];
        const hasSymptom = flattenSymptoms(entry.symptoms).includes(sym.key);
        // 3-day lookback
        DRUGS.forEach(drug => {
          let total = 0, count = 0;
          for (let j = Math.max(0, i-2); j <= i; j++) {
            const d2 = data[sortedDates[j]];
            total += (d2?.drugs?.[drug.key]) || 0;
            count++;
          }
          const avg = count ? total / count : 0;
          if (hasSymptom) withDoses[drug.key].push(avg);
          else withoutDoses[drug.key].push(avg);
        });
      });

      DRUGS.forEach(drug => {
        const w = withDoses[drug.key];
        const wo = withoutDoses[drug.key];
        if (w.length >= 2 && wo.length >= 2) {
          const wAvg = w.reduce((a,b)=>a+b,0)/w.length;
          const woAvg = wo.reduce((a,b)=>a+b,0)/wo.length;
          const diff = wAvg - woAvg;
          if (Math.abs(diff) > 0.5) {
            if (!results[sym.key]) results[sym.key] = { label: sym.label, drugs: [] };
            results[sym.key].drugs.push({
              drug: drug.label, diff: diff.toFixed(1), withAvg: wAvg.toFixed(1), withoutAvg: woAvg.toFixed(1), n: w.length
            });
          }
        }
      });
    });
    return results;
  }, [data, sortedDates]);

  const totalDays = sortedDates.length;

  return (
    <div className="page">
      <div className="card">
        <h3>📊 每週藥物劑量趨勢</h3>
        {totalDays < 3 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 3 天資料才能顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef1}></canvas></div>}
      </div>

      <div className="card">
        <h3>📊 每週負面症狀頻率</h3>
        {totalDays < 3 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 3 天資料才能顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef2}></canvas></div>}
      </div>

      <div className="card">
        <h3>😴 睡眠追蹤趨勢</h3>
        {sortedDates.filter(d => data[d]?.sleep?.bedtime).length < 2 ?
          <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 2 天睡眠資料才能顯示圖表</p> :
          <div className="chart-container"><canvas ref={chartRef3}></canvas></div>
        }
      </div>

      {/* Sleep vs Symptoms correlation */}
      {(() => {
        const sleepDates = sortedDates.filter(d => data[d]?.sleep?.bedtime && data[d]?.sleep?.wakeTime);
        if (sleepDates.length < 5) return null;
        // Calculate sleep hours per day
        const sleepHours = {};
        sleepDates.forEach(d => {
          const s = data[d].sleep;
          const [bh,bm] = s.bedtime.split(':').map(Number);
          const [wh,wm] = s.wakeTime.split(':').map(Number);
          let mins = (wh*60+wm) - (bh*60+bm);
          if (mins <= 0) mins += 1440;
          sleepHours[d] = mins / 60;
        });
        const avgHours = Object.values(sleepHours).reduce((a,b)=>a+b,0) / Object.values(sleepHours).length;
        // Compare symptoms on low sleep vs good sleep days
        const lowSleepDays = sleepDates.filter(d => sleepHours[d] < avgHours - 0.5);
        const goodSleepDays = sleepDates.filter(d => sleepHours[d] >= avgHours + 0.5);
        if (lowSleepDays.length < 2 || goodSleepDays.length < 2) return null;
        const symCount = (days) => {
          const counts = {};
          days.forEach(d => {
            flattenSymptoms(data[d]?.symptoms).forEach(s => { counts[s] = (counts[s]||0) + 1; });
          });
          return counts;
        };
        const lowCounts = symCount(lowSleepDays);
        const goodCounts = symCount(goodSleepDays);
        const diffs = SYMPTOMS.filter(s => s.type === 'negative').map(s => ({
          label: s.label,
          lowRate: ((lowCounts[s.key]||0) / lowSleepDays.length * 100).toFixed(0),
          goodRate: ((goodCounts[s.key]||0) / goodSleepDays.length * 100).toFixed(0),
          diff: ((lowCounts[s.key]||0) / lowSleepDays.length - (goodCounts[s.key]||0) / goodSleepDays.length) * 100
        })).filter(d => Math.abs(d.diff) > 10).sort((a,b) => b.diff - a.diff);
        if (!diffs.length) return null;
        return (
          <div className="card">
            <h3>😴 睡眠 vs 症狀關聯</h3>
            <p style={{color:'var(--text2)',fontSize:'0.78em',marginBottom:8}}>
              睡不好 ({'<'}{(avgHours-0.5).toFixed(1)}h, {lowSleepDays.length}天) vs 睡得好 (≥{(avgHours+0.5).toFixed(1)}h, {goodSleepDays.length}天)
            </p>
            {diffs.map(d => (
              <div key={d.label} style={{fontSize:'0.85em',padding:'4px 0',display:'flex',justifyContent:'space-between'}}>
                <span>{d.label}</span>
                <span style={{color: d.diff > 0 ? 'var(--red)' : 'var(--green)'}}>
                  睡差:{d.lowRate}% vs 睡好:{d.goodRate}% {d.diff > 0 ? '⚠️' : '✅'}
                </span>
              </div>
            ))}
          </div>
        );
      })()}

      {correlations && Object.keys(correlations).length > 0 && (
        <div className="card">
          <h3>🔍 劑量與症狀關聯分析</h3>
          <p style={{color:'var(--text2)',fontSize:'0.8em',marginBottom:12}}>比較出現症狀時 vs 無症狀時，前3天的平均劑量差異</p>
          {Object.values(correlations).map(corr => (
            <div key={corr.label} style={{marginBottom:16}}>
              <div style={{fontWeight:600,color:'var(--orange)',marginBottom:6}}>{corr.label}</div>
              {corr.drugs.map(d => (
                <div key={d.drug} style={{fontSize:'0.85em',padding:'4px 0',display:'flex',justifyContent:'space-between'}}>
                  <span>{d.drug}</span>
                  <span style={{color: parseFloat(d.diff) > 0 ? 'var(--red)' : 'var(--green)'}}>
                    {parseFloat(d.diff) > 0 ? '↑' : '↓'} {d.diff} (有:{d.withAvg} vs 無:{d.withoutAvg}, n={d.n})
                  </span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Photo Comparison Timeline */}
      <PhotoTimeline data={data} sortedDates={sortedDates} />

      {/* Quick links to dedicated timeline pages */}
      <div className="card">
        <h3>📷 照片時間軸</h3>
        <div style={{display:'flex',gap:8}}>
          <button className="action-btn" style={{flex:1,margin:0,background:'var(--purple)',color:'#fff',fontWeight:600}} onClick={() => setTab('face_timeline')}>
            🤳 臉部變化
          </button>
          <button className="action-btn" style={{flex:1,margin:0,background:'var(--green)',color:'#fff',fontWeight:600}} onClick={() => setTab('body_timeline')}>
            💪 身材變化
          </button>
        </div>
        <p style={{fontSize:'0.75em',color:'var(--text2)',marginTop:6,textAlign:'center'}}>點選多張照片進行放大對比</p>
      </div>

      <div className="card">
        <h3>📈 統計摘要 / 荷爾蒙狀態推測</h3>
        <div style={{fontSize:'0.88em'}}>
          <p>總紀錄天數：<b>{totalDays}</b></p>
          {totalDays > 0 && (
            <p>紀錄範圍：{sortedDates[0]} ~ {sortedDates[sortedDates.length-1]}</p>
          )}
          {DRUGS.map(drug => {
            const days = sortedDates.filter(d => data[d]?.drugs?.[drug.key]);
            const total = days.reduce((sum, d) => sum + (data[d].drugs[drug.key] || 0), 0);
            if (!days.length) return null;
            return <p key={drug.key} style={{color: drug.color}}>{drug.label}: {days.length}天, 平均 {(total/days.length).toFixed(1)}{drug.unit}/天</p>;
          })}
          {/* Hormonal state inference from recent 7 days */}
          {totalDays >= 3 && (() => {
            const recent = sortedDates.slice(-7);
            const catCounts = {};
            SYMPTOM_CATEGORIES.forEach(c => { catCounts[c.key] = { pos: 0, neg: 0 }; });
            recent.forEach(d => {
              const syms = flattenSymptoms(data[d]?.symptoms);
              syms.forEach(s => {
                const sym = SYMPTOMS.find(x => x.key === s);
                if (sym) {
                  if (sym.type === 'positive') catCounts[sym.cat].pos++;
                  else catCounts[sym.cat].neg++;
                }
              });
            });
            const insights = [];
            // E2 analysis
            if (catCounts.estrogen.neg >= 3) insights.push({ text: 'E2 可能偏高 — 水腫/腫脹症狀頻繁出現', color: 'var(--red)', icon: '🔴' });
            else if (catCounts.estrogen.neg === 0 && recent.length >= 5) insights.push({ text: 'E2 看起來正常 — 無水腫/雌激素症狀', color: 'var(--green)', icon: '✅' });
            // Androgen
            if (catCounts.androgen.pos >= 3 && catCounts.androgen.neg <= 1) insights.push({ text: '雄性激素表現良好 — Pump/力量正常', color: 'var(--green)', icon: '💪' });
            else if (catCounts.androgen.neg >= 3) insights.push({ text: '雄性激素表現偏弱 — Flat/力量下降', color: 'var(--orange)', icon: '⚠️' });
            // Sexual
            if (catCounts.sexual.pos >= 2 && catCounts.sexual.neg === 0) insights.push({ text: '性功能正常 — 荷爾蒙平衡良好指標', color: 'var(--green)', icon: '🔥' });
            else if (catCounts.sexual.neg >= 2) insights.push({ text: '性功能下降 — 可能E2偏高或T偏低', color: 'var(--red)', icon: '⚠️' });
            // Mood
            if (catCounts.mood_energy.neg >= 3) insights.push({ text: '精神狀態不佳 — 可能跟睡眠或劑量有關', color: 'var(--orange)', icon: '🧠' });
            // Skin/DHT
            if (catCounts.skin_hair.neg >= 2) insights.push({ text: '皮膚問題 — 可能DHT偏高', color: 'var(--orange)', icon: '💆' });
            // Joint (E2 related - too low = dry joints)
            const jointDry = recent.filter(d => flattenSymptoms(data[d]?.symptoms).includes('joint_stiff')).length;
            if (jointDry >= 3) insights.push({ text: '關節卡頻繁 — E2可能偏低（關節需要E2潤滑）', color: 'var(--orange)', icon: '🦴' });
            if (!insights.length) return null;
            return (
              <div style={{marginTop:12,padding:10,background:'var(--card2)',borderRadius:8}}>
                <div style={{fontSize:'0.82em',fontWeight:600,color:'var(--purple)',marginBottom:6}}>📊 最近 {recent.length} 天荷爾蒙狀態推測：</div>
                {insights.map((ins, i) => (
                  <div key={i} style={{fontSize:'0.82em',padding:'3px 0',color:ins.color}}>
                    {ins.icon} {ins.text}
                  </div>
                ))}
                <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:6}}>* 僅供參考，建議搭配血液檢驗數據</div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// === SMART PAGE: PK Curve, Patterns, Blood Work, Dose Suggestions ===
function SmartPage({ data, updateData, selectedDate }) {
  const pkChartRef = useRef(null);
  const pkChart = useRef(null);
  const weightChartRef = useRef(null);
  const weightChart = useRef(null);
  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);

  // Blood work state
  const [bloodWork, setBloodWork] = useState(() => {
    try { return JSON.parse(localStorage.getItem('blood_work') || '[]'); } catch { return []; }
  });
  const [showBloodForm, setShowBloodForm] = useState(false);
  const [bloodForm, setBloodForm] = useState({ date: today(), totalT: '', freeT: '', e2: '', shbg: '', hct: '', psa: '', prolactin: '', note: '' });

  const saveBloodWork = (bw) => {
    setBloodWork(bw);
    localStorage.setItem('blood_work', JSON.stringify(bw));
  };

  // PK Chart
  useEffect(() => {
    const levels = calcPKLevels(data, 21);
    const validLevels = levels.filter(l => l.totalT > 0 || levels.indexOf(l) > levels.length - 22);
    if (!validLevels.length || !pkChartRef.current) return;

    if (pkChart.current) pkChart.current.destroy();

    const datasets = [{
      label: '總活性 T (mg)',
      data: validLevels.map(l => l.totalT),
      borderColor: '#60a5fa',
      backgroundColor: '#60a5fa22',
      fill: true, tension: 0.4, pointRadius: 2, yAxisID: 'y'
    }, {
      label: 'E2 貢獻指數',
      data: validLevels.map(l => l.e2),
      borderColor: '#f472b6',
      backgroundColor: '#f472b622',
      fill: true, tension: 0.4, pointRadius: 2, yAxisID: 'y1'
    }];

    // Add individual drug lines
    DRUGS.filter(d => d.pk).forEach(drug => {
      const hasData = validLevels.some(l => (l.byDrug[drug.key] || 0) > 0.1);
      if (!hasData) return;
      datasets.push({
        label: drug.label,
        data: validLevels.map(l => l.byDrug[drug.key] || 0),
        borderColor: drug.color,
        borderDash: [4, 4],
        tension: 0.4, pointRadius: 0, borderWidth: 1, hidden: true
      });
    });

    // Mark injection days
    const injDates = validLevels.filter(l => {
      const e = data[l.date];
      return e && Object.entries(e.drugs || {}).some(([k,v]) => v > 0 && DRUGS.find(d=>d.key===k)?.pk);
    }).map(l => l.date);

    pkChart.current = new Chart(pkChartRef.current, {
      type: 'line',
      data: { labels: validLevels.map(l => l.date.slice(5)), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#ccc', font: { size: 9 } } },
          annotation: injDates.length ? undefined : undefined // placeholder
        },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#222' } },
          y: { title: { display: true, text: 'T (mg)', color: '#60a5fa' }, ticks: { color: '#60a5fa' }, grid: { color: '#222' } },
          y1: { position: 'right', title: { display: true, text: 'E2 指數', color: '#f472b6' }, ticks: { color: '#f472b6' }, grid: { display: false } }
        }
      }
    });

    return () => { if (pkChart.current) pkChart.current.destroy(); };
  }, [data]);

  // Weight chart
  useEffect(() => {
    const weightDates = sortedDates.filter(d => data[d]?.weight);
    if (weightDates.length < 2 || !weightChartRef.current) return;
    if (weightChart.current) weightChart.current.destroy();
    weightChart.current = new Chart(weightChartRef.current, {
      type: 'line',
      data: {
        labels: weightDates.map(d => d.slice(5)),
        datasets: [{
          label: '體重 (kg)',
          data: weightDates.map(d => data[d].weight),
          borderColor: '#fbbf24',
          backgroundColor: '#fbbf2422',
          fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#fbbf24'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#222' } },
          y: { ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });
    return () => { if (weightChart.current) weightChart.current.destroy(); };
  }, [data, sortedDates]);

  // Pattern detection
  const patterns = useMemo(() => detectPatterns(data), [data]);
  const doseSuggestions = useMemo(() => generateDoseSuggestion(data), [data]);

  const addBloodWork = () => {
    const entry = { ...bloodForm };
    Object.keys(entry).forEach(k => {
      if (k !== 'date' && k !== 'note' && entry[k]) entry[k] = parseFloat(entry[k]) || entry[k];
    });
    const updated = [...bloodWork.filter(b => b.date !== entry.date), entry].sort((a,b) => a.date.localeCompare(b.date));
    saveBloodWork(updated);
    setShowBloodForm(false);
    setBloodForm({ date: today(), totalT: '', freeT: '', e2: '', shbg: '', hct: '', psa: '', prolactin: '', note: '' });
  };

  return (
    <div className="page">
      {/* Pharmacokinetic Curve */}
      <div className="card">
        <h3>💉 藥物動力學曲線</h3>
        <p style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>根據注射紀錄，預估體內睾酮和 E2 濃度變化</p>
        <div className="chart-container"><canvas ref={pkChartRef}></canvas></div>
        <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:6}}>
          * 預估值僅供參考，實際血濃度受個體代謝、SHBG、注射深度等因素影響
        </div>
      </div>

      {/* Weight Trend */}
      <div className="card">
        <h3>⚖️ 體重趨勢</h3>
        {sortedDates.filter(d => data[d]?.weight).length < 2 ?
          <p style={{color:'var(--text2)',fontSize:'0.9em'}}>在每日紀錄中填入體重，2筆以上即可顯示趨勢</p> :
          <div className="chart-container"><canvas ref={weightChartRef}></canvas></div>
        }
      </div>

      {/* Pattern Recognition */}
      <div className="card">
        <h3>🔍 智慧模式辨識</h3>
        {patterns.length === 0 ? (
          <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要更多天數資料才能辨識模式（至少 5 天）</p>
        ) : (
          <>
            <p style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>AI 從你的歷史紀錄中發現的規律：</p>
            {patterns.filter(p => p.type !== 'schedule').map((p, i) => (
              <div className="pattern-card" key={i}>
                <div>{p.text}</div>
                <span className="pattern-conf" style={{background: p.confidence > 70 ? 'var(--green)' : p.confidence > 50 ? 'var(--blue)' : 'var(--text2)', color: '#fff'}}>
                  信心度 {p.confidence}%
                </span>
              </div>
            ))}
            {patterns.filter(p => p.type === 'schedule').length > 0 && (
              <div style={{marginTop:8}}>
                <div style={{fontSize:'0.82em',color:'var(--text2)',marginBottom:4}}>📅 注射排程：</div>
                {patterns.filter(p => p.type === 'schedule').map((p, i) => (
                  <div key={`s${i}`} style={{fontSize:'0.85em',padding:'3px 0'}}>{p.text}</div>
                ))}
              </div>
            )}
          </>
        )}
      </div>

      {/* Dosage Suggestion */}
      {doseSuggestions && doseSuggestions.length > 0 && (
        <div className="dose-suggest">
          <h4>💡 AI 劑量建議</h4>
          {doseSuggestions.map((s, i) => (
            <div key={i} style={{fontSize:'0.85em',padding:'4px 0',color: s.type === 'warning' ? 'var(--orange)' : s.type === 'good' ? 'var(--green)' : 'var(--text)'}}>
              {s.text}
            </div>
          ))}
          <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:8}}>* 僅供參考，請勿自行調整處方藥劑量，務必諮詢醫師</div>
        </div>
      )}

      {/* Blood Work */}
      <div className="card">
        <h3>🩸 血液報告</h3>
        <button className="action-btn" style={{marginBottom:10}} onClick={() => setShowBloodForm(!showBloodForm)}>
          {showBloodForm ? '收起' : '+ 新增血液報告'}
        </button>
        {showBloodForm && (
          <div style={{marginBottom:12}}>
            <div className="blood-grid">
              <div className="blood-field">
                <label>日期</label>
                <input type="date" value={bloodForm.date} onChange={e => setBloodForm(f => ({...f, date: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>Total T (ng/dL)</label>
                <input type="number" inputMode="decimal" placeholder="例: 800" value={bloodForm.totalT} onChange={e => setBloodForm(f => ({...f, totalT: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>Free T (pg/mL)</label>
                <input type="number" inputMode="decimal" placeholder="例: 15" value={bloodForm.freeT} onChange={e => setBloodForm(f => ({...f, freeT: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>E2 (pg/mL)</label>
                <input type="number" inputMode="decimal" placeholder="例: 30" value={bloodForm.e2} onChange={e => setBloodForm(f => ({...f, e2: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>SHBG (nmol/L)</label>
                <input type="number" inputMode="decimal" placeholder="例: 35" value={bloodForm.shbg} onChange={e => setBloodForm(f => ({...f, shbg: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>HCT (%)</label>
                <input type="number" inputMode="decimal" placeholder="例: 47" value={bloodForm.hct} onChange={e => setBloodForm(f => ({...f, hct: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>PSA (ng/mL)</label>
                <input type="number" inputMode="decimal" placeholder="例: 0.8" value={bloodForm.psa} onChange={e => setBloodForm(f => ({...f, psa: e.target.value}))} />
              </div>
              <div className="blood-field">
                <label>泌乳素 (ng/mL)</label>
                <input type="number" inputMode="decimal" placeholder="例: 10" value={bloodForm.prolactin} onChange={e => setBloodForm(f => ({...f, prolactin: e.target.value}))} />
              </div>
            </div>
            <textarea className="note-input" style={{marginTop:8,minHeight:40}} placeholder="備註（用藥狀態、是否空腹等）"
              value={bloodForm.note} onChange={e => setBloodForm(f => ({...f, note: e.target.value}))} />
            <button className="save-btn" style={{marginTop:8}} onClick={addBloodWork}>儲存血液報告</button>
          </div>
        )}

        {bloodWork.length > 0 ? (
          <div>
            {bloodWork.slice().reverse().map((bw, i) => {
              const pkLevel = calcPKLevels(data, 30).find(l => l.date === bw.date);
              return (
                <div key={i} style={{background:'var(--card2)',borderRadius:8,padding:10,marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <b style={{color:'var(--blue)',fontSize:'0.9em'}}>{bw.date}</b>
                    <button style={{background:'none',border:'none',color:'var(--red)',fontSize:'0.8em',cursor:'pointer'}}
                      onClick={() => saveBloodWork(bloodWork.filter(b => b.date !== bw.date))}>刪除</button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,fontSize:'0.8em'}}>
                    {bw.totalT && <div>Total T: <b style={{color: bw.totalT > 1000 ? 'var(--orange)' : bw.totalT < 300 ? 'var(--red)' : 'var(--green)'}}>{bw.totalT}</b></div>}
                    {bw.freeT && <div>Free T: <b>{bw.freeT}</b></div>}
                    {bw.e2 && <div>E2: <b style={{color: bw.e2 > 50 ? 'var(--red)' : bw.e2 < 15 ? 'var(--orange)' : 'var(--green)'}}>{bw.e2}</b></div>}
                    {bw.shbg && <div>SHBG: <b>{bw.shbg}</b></div>}
                    {bw.hct && <div>HCT: <b style={{color: bw.hct > 52 ? 'var(--red)' : 'var(--green)'}}>{bw.hct}%</b></div>}
                    {bw.psa && <div>PSA: <b>{bw.psa}</b></div>}
                    {bw.prolactin && <div>泌乳素: <b>{bw.prolactin}</b></div>}
                  </div>
                  {pkLevel && pkLevel.totalT > 0 && (
                    <div style={{fontSize:'0.75em',color:'var(--purple)',marginTop:4}}>
                      💉 抽血當日預估活性 T: {pkLevel.totalT}mg | E2 指數: {pkLevel.e2.toFixed(1)}
                    </div>
                  )}
                  {bw.e2 && pkLevel?.e2 > 0 && (
                    <div style={{fontSize:'0.75em',color:'var(--text2)',marginTop:2}}>
                      📊 你的 E2 實際值 {bw.e2} vs AI 預估指數 {pkLevel.e2.toFixed(1)} — {bw.e2 > 40 ? '偏高，可能需要控制' : bw.e2 < 15 ? '偏低，關節可能乾' : '在舒適區'}
                    </div>
                  )}
                  {bw.note && <div style={{fontSize:'0.75em',color:'var(--text2)',marginTop:2}}>📝 {bw.note}</div>}
                </div>
              );
            })}
          </div>
        ) : (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>尚無血液報告。定期抽血可以驗證 AI 預估的準確度。</p>
        )}
      </div>

      {/* iOS Shortcut quick link */}
      <div className="card">
        <h3>⚡ 自動化捷徑</h3>
        <p style={{fontSize:'0.82em',color:'var(--text2)',lineHeight:1.6}}>
          用 iOS 捷徑自動匯入睡眠和體重，URL 格式：
        </p>
        <div style={{background:'var(--card2)',borderRadius:6,padding:8,margin:'6px 0',fontSize:'0.75em',wordBreak:'break-all',color:'var(--green)'}}>
          {window.location.origin + window.location.pathname}?sleep=<b>BASE64_JSON</b>
        </div>
        <p style={{fontSize:'0.75em',color:'var(--text2)',lineHeight:1.5}}>
          JSON 格式：{'{"bedtime":"23:30","wakeTime":"07:15","deep":"95","rem":"60","light":"120","source":"autosleep"}'}<br/>
          體重：?weight=75.2<br/>
          可合併：?sleep=...&weight=75.2<br/><br/>
          捷徑步驟：讀取健康資料 → 轉 JSON → Base64 編碼 → 拷貝 → 打開 URL<br/>
          打開後 App 會自動儲存，不需手動操作！
        </p>
      </div>
    </div>
  );
}

function PhotoTimeline({ data, sortedDates }) {
  const [compareType, setCompareType] = useState('face');
  const [compareDate1, setCompareDate1] = useState('');
  const [compareDate2, setCompareDate2] = useState('');
  const [comparePhoto1, setComparePhoto1] = useState(null);
  const [comparePhoto2, setComparePhoto2] = useState(null);

  const photoDates = useMemo(() => {
    return sortedDates.filter(d => data[d]?.hasPhotos);
  }, [data, sortedDates]);

  const [photos, setPhotos] = useState([]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const loaded = [];
      for (const date of photoDates.slice(-20)) {
        const photo = await loadPhoto(date, compareType);
        if (photo) {
          loaded.push({ date, photo, analysis: compareType === 'face' ? data[date]?.faceAnalysis : data[date]?.bodyAnalysis });
        }
      }
      if (cancelled) return;
      setPhotos(loaded);
      if (loaded.length >= 2 && !compareDate1) {
        setCompareDate1(loaded[0].date);
        setCompareDate2(loaded[loaded.length - 1].date);
      }
    })();
    return () => { cancelled = true; };
  }, [photoDates, compareType, data]);

  // Load compare photos when dates change
  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (compareDate1) {
        const p = await loadPhoto(compareDate1, compareType);
        if (!cancelled) setComparePhoto1(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate1]?.faceAnalysis : data[compareDate1]?.bodyAnalysis } : null);
      }
      if (compareDate2) {
        const p = await loadPhoto(compareDate2, compareType);
        if (!cancelled) setComparePhoto2(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate2]?.faceAnalysis : data[compareDate2]?.bodyAnalysis } : null);
      }
    })();
    return () => { cancelled = true; };
  }, [compareDate1, compareDate2, compareType, data]);

  // Swelling trend chart
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!chartRef.current) return;
    const datesWithAnalysis = sortedDates.filter(d => data[d]?.faceAnalysis);
    if (datesWithAnalysis.length < 2) { if (chartInst.current) chartInst.current.destroy(); return; }

    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'line',
      data: {
        labels: datesWithAnalysis,
        datasets: [{
          label: '💪 充血度',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.pumpScore||0),
          borderColor: '#34d399',
          backgroundColor: '#34d39922',
          fill: false, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#34d399'
        }, {
          label: '📐 線條',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.definitionScore||0),
          borderColor: '#60a5fa',
          backgroundColor: '#60a5fa22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#60a5fa'
        }, {
          label: '💧 水腫',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.waterScore||0),
          borderColor: '#fb923c',
          backgroundColor: '#fb923c22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#fb923c'
        }, {
          label: '腫脹指數',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.swellingIndex),
          borderColor: '#a78bfa',
          backgroundColor: '#a78bfa22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#a78bfa', hidden: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { min: 0, max: 100, ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });
    return () => { if (chartInst.current) chartInst.current.destroy(); };
  }, [data, sortedDates]);

  if (!photoDates.length) {
    return (
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <p style={{color:'var(--text2)',fontSize:'0.85em'}}>尚無照片紀錄。在紀錄頁拍攝臉部或身材照，即可在此追蹤變化。</p>
      </div>
    );
  }

  return (
    <>
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={`sym-btn ${compareType==='face'?'active':''}`}
            style={{background: compareType==='face'?'var(--purple)':'var(--card2)', color: compareType==='face'?'#fff':'var(--text2)', borderColor: compareType==='face'?'var(--purple)':'var(--border)'}}
            onClick={() => setCompareType('face')}>臉部</button>
          <button className={`sym-btn ${compareType==='body'?'active':''}`}
            style={{background: compareType==='body'?'var(--purple)':'var(--card2)', color: compareType==='body'?'#fff':'var(--text2)', borderColor: compareType==='body'?'var(--purple)':'var(--border)'}}
            onClick={() => setCompareType('body')}>身材</button>
        </div>
        {photos.length > 0 ? (
          <div className="compare-container">
            {photos.map(p => (
              <div className="compare-card" key={p.date}>
                <img src={p.photo} alt={p.date} />
                <div className="compare-date">{p.date.slice(5)}</div>
                {p.analysis && <div className="compare-score">{p.analysis.pumpLabel||''} | 線條:{p.analysis.definitionScore||0} | 水:{p.analysis.waterScore||0}</div>}
              </div>
            ))}
          </div>
        ) : (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>此類型尚無照片</p>
        )}
      </div>

      {/* Side-by-side comparison */}
      {photos.length >= 2 && (
        <div className="ai-card">
          <h3>🔍 兩日對比</h3>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <select value={compareDate1} onChange={e => setCompareDate1(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
            <span style={{color:'var(--text2)',alignSelf:'center'}}>vs</span>
            <select value={compareDate2} onChange={e => setCompareDate2(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
          </div>
          <div style={{display:'flex',gap:8}}>
            {comparePhoto1 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto1.photo} alt={compareDate1} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate1}</div>
                {comparePhoto1.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto1.analysis.pumpLabel} | 線條:{comparePhoto1.analysis.definitionScore||0} | 水:{comparePhoto1.analysis.waterScore||0}</div>}
              </div>
            )}
            {comparePhoto2 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto2.photo} alt={compareDate2} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate2}</div>
                {comparePhoto2.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto2.analysis.pumpLabel} | 線條:{comparePhoto2.analysis.definitionScore||0} | 水:{comparePhoto2.analysis.waterScore||0}</div>}
              </div>
            )}
          </div>
          {comparePhoto1?.analysis && comparePhoto2?.analysis && (
            <div style={{marginTop:12,padding:10,background:'var(--card2)',borderRadius:8,fontSize:'0.82em'}}>
              <div style={{fontWeight:600,marginBottom:6,color:'var(--purple)'}}>差異分析</div>
              {['pumpScore','definitionScore','waterScore','swellingIndex','redness','warmth'].map(k => {
                const labels = {pumpScore:'💪 充血度',definitionScore:'📐 線條',waterScore:'💧 水腫',swellingIndex:'腫脹指數',redness:'泛紅',warmth:'色溫'};
                const diff = comparePhoto2.analysis[k] - comparePhoto1.analysis[k];
                return (
                  <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}>
                    <span style={{color:'var(--text2)'}}>{labels[k]}</span>
                    <span style={{color: diff > 5 ? 'var(--red)' : diff < -5 ? 'var(--green)' : 'var(--text2)'}}>
                      {diff > 0 ? '+' : ''}{diff} {diff > 5 ? '↑' : diff < -5 ? '↓' : '→'}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className="ai-card">
        <h3>🤖 臉部指數趨勢</h3>
        {sortedDates.filter(d => data[d]?.faceAnalysis).length < 2 ? (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>需要至少 2 天的臉部照片才能顯示趨勢圖</p>
        ) : (
          <div className="chart-container"><canvas ref={chartRef}></canvas></div>
        )}
      </div>
    </>
  );
}

// === Dedicated Photo Timeline Page (Face or Body) with Multi-Select & Lightbox ===
function PhotoTimelinePage({ data, type, setTab }) {
  const [photos, setPhotos] = useState([]);
  const [selected, setSelected] = useState([]);
  const [lightboxOpen, setLightboxOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const typeLabel = type === 'face' ? '臉部' : '身材';

  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);
  const photoDates = useMemo(() => sortedDates.filter(d => data[d]?.hasPhotos), [data, sortedDates]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    (async () => {
      const loaded = [];
      for (const date of photoDates) {
        const photo = await loadPhoto(date, type);
        if (photo && !cancelled) {
          const analysis = type === 'face' ? data[date]?.faceAnalysis : data[date]?.bodyAnalysis;
          loaded.push({ date, photo, analysis });
        }
      }
      if (!cancelled) {
        setPhotos(loaded);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [photoDates, type]);

  const toggleSelect = (date) => {
    setSelected(prev => prev.includes(date) ? prev.filter(d => d !== date) : [...prev, date]);
  };

  const openLightbox = () => {
    if (selected.length === 0) {
      // If nothing selected, show all
      setSelected(photos.map(p => p.date));
    }
    setLightboxOpen(true);
  };

  const lightboxPhotos = photos.filter(p => selected.includes(p.date));

  return (
    <div className="page">
      <button className="back-btn" onClick={() => setTab('chart')}>← 返回分析</button>
      <div className="card">
        <h3>{type === 'face' ? '🤳' : '💪'} {typeLabel}變化時間軸</h3>
        <p style={{fontSize:'0.82em',color:'var(--text2)',marginBottom:10}}>
          共 {photos.length} 張照片 — 點選照片可多選，再點「對比」放大比較
        </p>
        {selected.length > 0 && (
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button className="save-btn" style={{flex:1,padding:'10px',fontSize:'0.85em'}} onClick={openLightbox}>
              🔍 對比已選 {selected.length} 張
            </button>
            <button className="action-btn" style={{flex:'0 0 70px',margin:0,fontSize:'0.82em'}} onClick={() => setSelected([])}>
              清除
            </button>
          </div>
        )}
        {loading ? (
          <div style={{textAlign:'center',padding:30,color:'var(--text2)'}}>載入照片中...</div>
        ) : photos.length === 0 ? (
          <div style={{textAlign:'center',padding:30,color:'var(--text2)'}}>
            尚無{typeLabel}照片。在紀錄頁拍攝{typeLabel}照即可在此追蹤變化。
          </div>
        ) : (
          <div className="timeline-grid">
            {photos.map(p => (
              <div key={p.date} className={`timeline-cell ${selected.includes(p.date) ? 'selected' : ''}`}
                onClick={() => toggleSelect(p.date)}>
                <img src={p.photo} alt={p.date} loading="lazy" />
                <div className="tl-date">
                  {p.date.slice(5)}
                  {p.analysis && <span style={{display:'block',fontSize:'0.9em'}}>💪{p.analysis.pumpScore||0} 📐{p.analysis.definitionScore||0} 💧{p.analysis.waterScore||0}</span>}
                </div>
                <div className="tl-check">✓</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Lightbox overlay */}
      {lightboxOpen && (
        <div className="lightbox-overlay" onClick={(e) => { if (e.target === e.currentTarget) setLightboxOpen(false); }}>
          <div className="lightbox-header">
            <span style={{fontSize:'0.9em'}}>{typeLabel}對比 — {lightboxPhotos.length} 張</span>
            <button onClick={() => setLightboxOpen(false)}>✕</button>
          </div>
          <div className="lightbox-body">
            {lightboxPhotos.map(p => (
              <div className="lb-item" key={p.date}>
                <img src={p.photo} alt={p.date} />
                <div className="lb-info">
                  {p.date}
                  {p.analysis && <><br/>💪 {p.analysis.pumpLabel||''} | 📐 線條:{p.analysis.definitionScore||0} | 💧 水:{p.analysis.waterScore||0}</>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function MorePage({ data, updateData }) {
  const [importStatus, setImportStatus] = useState('');
  const fileRef = useRef(null);

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const dates = Object.keys(data).sort();
    let csv = 'Date,' + DRUGS.map(d=>d.label).join(',') + ',' + SYMPTOMS.map(s=>s.label).join(',') + ',睡眠時數,睡眠品質,深睡分鐘,REM分鐘,Note\n';
    dates.forEach(date => {
      const e = data[date];
      const drugs = DRUGS.map(d => e.drugs?.[d.key] || '');
      const allSyms = flattenSymptoms(e.symptoms);
      const syms = SYMPTOMS.map(s => allSyms.includes(s.key) ? 1 : '');
      let sleepHrs = '', sleepQ = '', deepMin = '', remMin = '';
      if (e.sleep?.bedtime && e.sleep?.wakeTime) {
        const [bh,bm] = e.sleep.bedtime.split(':').map(Number);
        const [wh,wm] = e.sleep.wakeTime.split(':').map(Number);
        let mins = (wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
        sleepHrs = (mins/60).toFixed(1);
      }
      if (e.sleep?.quality) sleepQ = e.sleep.quality;
      if (e.sleep?.deep) deepMin = e.sleep.deep;
      if (e.sleep?.rem) remMin = e.sleep.rem;
      csv += `${date},${drugs.join(',')},${syms.join(',')},${sleepHrs},${sleepQ},${deepMin},${remMin},${(e.note||'').replace(/,/g,'；')}\n`;
    });
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const importJSON = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        const merged = { ...data, ...imported };
        updateData(merged);
        setImportStatus(`✓ 匯入成功！合併後共 ${Object.keys(merged).length} 天紀錄`);
      } catch { setImportStatus('✗ 檔案格式錯誤'); }
    };
    reader.readAsText(file);
  };

  const clearAll = () => {
    if (window.confirm('確定要清除所有資料嗎？此操作無法復原！')) {
      updateData({});
    }
  };

  const totalDays = Object.keys(data).length;

  return (
    <div className="page">
      <div className="card">
        <h3>📤 匯出資料</h3>
        <button className="action-btn" onClick={exportJSON}>匯出 JSON（完整備份）</button>
        <button className="action-btn" onClick={exportCSV}>匯出 CSV（可用 Excel 開啟）</button>
      </div>

      <div className="card">
        <h3>📥 匯入資料</h3>
        <button className="action-btn" onClick={() => fileRef.current?.click()}>選擇 JSON 檔案匯入</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importJSON} />
        {importStatus && <p style={{marginTop:8,fontSize:'0.85em',color: importStatus.startsWith('✓') ? 'var(--green)' : 'var(--red)'}}>{importStatus}</p>}
      </div>

      <div className="card">
        <h3>ℹ️ 資料統計</h3>
        <p style={{fontSize:'0.9em'}}>
          目前共有 <b style={{color:'var(--blue)'}}>{totalDays}</b> 天紀錄<br/>
          資料儲存於瀏覽器本機，不會上傳至任何伺服器。<br/>
          建議定期匯出 JSON 備份。
        </p>
      </div>

      <div className="card">
        <h3>⚠️ 危險操作</h3>
        <button className="action-btn" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={clearAll}>清除所有資料</button>
      </div>

      <div className="card">
        <h3>📸 照片管理（IndexedDB）</h3>
        <button className="action-btn" onClick={async () => {
          try {
            const photos = await getAllPhotos();
            const keys = Object.keys(photos);
            if (!keys.length) { alert('沒有儲存的照片'); return; }
            const blob = new Blob([JSON.stringify(photos)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `steroid_photos_${today()}.json`;
            a.click(); URL.revokeObjectURL(url);
            alert(`✓ 已匯出 ${keys.length} 張照片`);
          } catch(err) { alert('匯出失敗: ' + err.message); }
        }}>匯出所有照片（JSON）</button>
        <button className="action-btn" onClick={() => {
          const input = document.createElement('input');
          input.type = 'file'; input.accept = '.json';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
              try {
                const photos = JSON.parse(ev.target.result);
                const count = await importPhotos(photos);
                alert(`✓ 匯入 ${count} 張照片成功！`);
              } catch(err) { alert('✗ 檔案格式錯誤: ' + err.message); }
            };
            reader.readAsText(file);
          };
          input.click();
        }}>匯入照片（JSON）</button>
        <button className="action-btn" style={{color:'var(--orange)',borderColor:'var(--orange)'}} onClick={async () => {
          try {
            const keys = await getAllPhotoKeys();
            if (!keys.length) { alert('沒有儲存的照片'); return; }
            if (window.confirm(`確定要刪除全部 ${keys.length} 張照片嗎？`)) {
              await clearAllPhotos();
              alert('已清除所有照片');
            }
          } catch(err) { alert('清除失敗: ' + err.message); }
        }}>清除所有照片</button>
        <p style={{fontSize:'0.78em',color:'var(--text2)',marginTop:8}}>
          照片儲存於 IndexedDB，不受瀏覽器快取清理影響。建議定期匯出備份。
        </p>
      </div>

      <AutoSleepImport data={data} updateData={updateData} />

      <div className="card" style={{fontSize:'0.78em',color:'var(--text2)'}}>
        用藥追蹤 App v6.0<br/>
        本工具僅供個人紀錄用途，不構成醫療建議。
      </div>
    </div>
  );
}

// === AutoSleep CSV Import Component ===
function AutoSleepImport({ data, updateData }) {
  const [csvPreview, setCsvPreview] = useState(null);
  const [importResult, setImportResult] = useState('');
  const csvFileRef = useRef(null);

  const handleCSVFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const entries = parseAutoSleepCSV(ev.target.result);
        if (!entries.length) {
          setImportResult('⚠️ 無法解析 CSV，請確認是 AutoSleep 匯出的格式');
          return;
        }
        setCsvPreview(entries);
      } catch (err) {
        setImportResult('⚠️ 檔案格式錯誤：' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const doImport = () => {
    if (!csvPreview) return;
    const { newData, count } = bulkImportSleep(data, csvPreview);
    updateData(newData);
    setImportResult(`✓ 成功匯入 ${count} 天的 AutoSleep 資料！`);
    setCsvPreview(null);
    setTimeout(() => setImportResult(''), 4000);
  };

  const existingDates = csvPreview ? csvPreview.filter(e => data[e.date]?.sleep).length : 0;

  return (
    <div className="card">
      <h3>😴 AutoSleep 匯入</h3>
      <p style={{fontSize:'0.82em',color:'var(--text2)',lineHeight:1.6,marginBottom:10}}>
        從 AutoSleep App 匯出 CSV，直接匯入所有睡眠紀錄
      </p>

      <div style={{background:'var(--card2)',borderRadius:8,padding:12,fontSize:'0.78em',color:'var(--text)',lineHeight:1.7,marginBottom:10}}>
        <b style={{color:'var(--blue)'}}>匯出步驟：</b><br/>
        1. 開啟 AutoSleep App → 按「歷史」<br/>
        2. 右上角「⋯」→「匯出資料」<br/>
        3. 選擇日期範圍 → 格式選 CSV<br/>
        4. 傳到 iPhone 或 AirDrop 到電腦<br/>
        5. 在這裡點下面的按鈕上傳
      </div>

      <button className="action-btn" style={{background:'var(--blue)',color:'#fff',fontWeight:600}}
        onClick={() => csvFileRef.current?.click()}>
        📁 選擇 AutoSleep CSV 檔案
      </button>
      <input ref={csvFileRef} type="file" accept=".csv,.CSV" style={{display:'none'}} onChange={handleCSVFile} />

      {csvPreview && (
        <div style={{marginTop:12}}>
          <div style={{background:'var(--card2)',borderRadius:8,padding:12}}>
            <div style={{fontSize:'0.9em',fontWeight:600,color:'var(--green)',marginBottom:8}}>
              📊 預覽：找到 {csvPreview.length} 天睡眠資料
            </div>
            <div style={{fontSize:'0.78em',color:'var(--text2)',marginBottom:8}}>
              日期範圍：{csvPreview[0].date} ~ {csvPreview[csvPreview.length-1].date}
              {existingDates > 0 && <span style={{color:'var(--orange)'}}> （{existingDates} 天會覆蓋現有資料）</span>}
            </div>
            <div style={{maxHeight:200,overflowY:'auto',fontSize:'0.75em'}}>
              {csvPreview.slice(0, 10).map((e, i) => {
                const s = e.sleep;
                return (
                  <div key={i} style={{padding:'4px 0',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
                    <span>{e.date}</span>
                    <span>{s.bedtime}→{s.wakeTime}</span>
                    <span>深睡{s.deep}m</span>
                    <span>HR{s.sleepHR}</span>
                    <span>HRV{s.hrv}</span>
                    <span>SpO2 {s.spo2}%</span>
                  </div>
                );
              })}
              {csvPreview.length > 10 && <div style={{padding:4,color:'var(--text2)'}}>...還有 {csvPreview.length - 10} 天</div>}
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="save-btn" style={{flex:1}} onClick={doImport}>✓ 確認匯入 {csvPreview.length} 天</button>
            <button className="action-btn" style={{flex:'0 0 80px',margin:0}} onClick={() => setCsvPreview(null)}>取消</button>
          </div>
        </div>
      )}

      {importResult && (
        <div style={{marginTop:8,padding:8,borderRadius:8,textAlign:'center',fontSize:'0.85em',
          background: importResult.includes('✓') ? 'rgba(52,211,153,0.15)' : 'rgba(251,146,60,0.15)',
          color: importResult.includes('✓') ? 'var(--green)' : 'var(--orange)'}}>
          {importResult}
        </div>
      )}

      <div style={{marginTop:12,fontSize:'0.75em',color:'var(--text2)',lineHeight:1.5}}>
        匯入的資料包含：入睡/起床時間、深睡、效率、睡眠心率、HRV、血氧飽和度等完整資訊。<br/>
        AutoSleep 的深睡/品質/效率會自動轉換成本系統的格式。
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
