<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const SYMPTOMS = [
  { key: 'face_swollen', label: '臉腫', type: 'negative' },

  { key: 'skin_good', label: '皮膚好', type: 'positive' },
  { key: 'mood_good', label: '心情好', type: 'positive' },

  { key: 'allday', label: '整天' },
  { key: 'morning', label: '早上' },
  { key: 'afternoon', label: '下午' },
  { key: 'evening', label: '晚上' },
  { key: 'midnight', label: '半夜' },
];

// Normalize symptoms: old format (array) → new format (object with time periods)
const normalizeSymptoms = (symptoms) => {
  if (!symptoms) return { allday: [], morning: [], afternoon: [], evening: [], midnight: [] };
  if (Array.isArray(symptoms)) return { allday: symptoms, morning: [], afternoon: [], evening: [], midnight: [] };
  return { allday: symptoms.allday || [], morning: symptoms.morning || [], afternoon: symptoms.afternoon || [], evening: symptoms.evening || [], midnight: symptoms.midnight || [] };
};

// Flatten symptoms object to array (for charts/analysis backward compat)
const flattenSymptoms = (symptoms) => {
  const norm = normalizeSymptoms(symptoms);
  const all = new Set([...norm.allday, ...norm.morning, ...norm.afternoon, ...norm.evening, ...norm.midnight]);
  return [...all];
};

const fmt = d => d.toISOString().slice(0, 10);
const today = () => fmt(new Date());
const parseDate = s => { const [y,m,d] = s.split('-'); return new Date(y, m-1, d); };

// Data store - text data in one key, photos in separate keys
const loadData = () => {
  try { return JSON.parse(localStorage.getItem('steroid_tracker') || '{}'); } catch { return {}; }
};
const saveData = data => localStorage.setItem('steroid_tracker', JSON.stringify(data));

// Photo storage: separate keys to avoid hitting single-key size limits
const loadPhoto = (date, type) => {
  try { return localStorage.getItem(`photo_${date}_${type}`) || null; } catch { return null; }
};
const savePhoto = (date, type, dataUrl) => {
  if (dataUrl) localStorage.setItem(`photo_${date}_${type}`, dataUrl);
  else localStorage.removeItem(`photo_${date}_${type}`);
};
const getStorageUsage = () => {
  let total = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    total += localStorage.getItem(key).length * 2; // UTF-16
  }
  return total;
};

// Compress image to target width, return base64 JPEG
const compressImage = (file, maxWidth = 480, quality = 0.6) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// AI Analysis: compute face/body metrics from image
const analyzePhoto = (dataUrl, type) => {
  // type: 'face' or 'body'
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 300; // higher res for better analysis
      let w = img.width, h = img.height;
      if (w > h) { h = (size / w) * h; w = size; } else { w = (size / h) * w; h = size; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);
      const pixels = imageData.data;
      const n = pixels.length / 4;

      // --- Global stats ---
      let totalR = 0, totalG = 0, totalB = 0, totalBright = 0;
      let skinPixels = 0, rednessSum = 0;
      // Per-pixel brightness array for edge/contrast analysis
      const brightMap = new Float32Array(n);

      for (let i = 0; i < pixels.length; i += 4) {
        const idx = i / 4;
        const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
        const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
        brightMap[idx] = brightness;
        totalR += r; totalG += g; totalB += b;
        totalBright += brightness;
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r - g) > 10 && brightness > 50 && brightness < 230) {
          skinPixels++;
          rednessSum += (r - g) / 255;
        }
      }

      const avgBright = totalBright / n;
      const avgR = totalR / n, avgG = totalG / n, avgB = totalB / n;
      const skinRatio = skinPixels / n;
      const avgRedness = skinPixels > 0 ? rednessSum / skinPixels : 0;

      // --- Edge detection (Sobel-like) for muscle definition ---
      // More edges in skin area = more visible muscle lines/definition
      let edgeSum = 0, edgeCount = 0;
      let skinEdgeSum = 0, skinEdgeCount = 0;
      const edgeMap = new Float32Array(n);
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const idx = y * w + x;
          // Sobel gradient magnitude
          const gx = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[y*w+(x-1)] - brightMap[(y+1)*w+(x-1)]
                     + brightMap[(y-1)*w+(x+1)] + 2*brightMap[y*w+(x+1)] + brightMap[(y+1)*w+(x+1)];
          const gy = -brightMap[(y-1)*w+(x-1)] - 2*brightMap[(y-1)*w+x] - brightMap[(y-1)*w+(x+1)]
                     + brightMap[(y+1)*w+(x-1)] + 2*brightMap[(y+1)*w+x] + brightMap[(y+1)*w+(x+1)];
          const mag = Math.sqrt(gx * gx + gy * gy);
          edgeMap[idx] = mag;
          edgeSum += mag;
          edgeCount++;
          // Check if this pixel is skin-colored
          const pi = idx * 4;
          const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
          if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && brightMap[idx] > 50 && brightMap[idx] < 230) {
            skinEdgeSum += mag;
            skinEdgeCount++;
          }
        }
      }
      const avgEdge = edgeCount > 0 ? edgeSum / edgeCount : 0;
      const avgSkinEdge = skinEdgeCount > 0 ? skinEdgeSum / skinEdgeCount : 0;

      // --- Region analysis for body photos ---
      // Split into top/middle/bottom thirds
      const thirdH = Math.floor(h / 3);
      const regionStats = (startY, endY) => {
        let rSum = 0, bSum = 0, brSum = 0, cnt = 0, eSum = 0, skCnt = 0;
        for (let y = startY; y < endY; y++) {
          for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            const pi = idx * 4;
            const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
            const br = brightMap[idx];
            rSum += r; bSum += b; brSum += br; cnt++;
            eSum += edgeMap[idx] || 0;
            if (r > 80 && g > 40 && b > 20 && r > g && r > b && (r-g) > 10 && br > 50 && br < 230) skCnt++;
          }
        }
        return { avgBright: brSum/cnt, avgEdge: eSum/cnt, skinRatio: skCnt/cnt, avgR: rSum/cnt, avgB: bSum/cnt };
      };
      const topRegion = regionStats(0, thirdH);
      const midRegion = regionStats(thirdH, thirdH * 2);
      const botRegion = regionStats(thirdH * 2, h);

      // --- Local contrast (for pump detection) ---
      // High local contrast in skin = vascularity/pump; low = flat
      let contrastSum = 0, contrastCount = 0;
      const blockSize = 8;
      for (let by = 0; by < h - blockSize; by += blockSize) {
        for (let bx = 0; bx < w - blockSize; bx += blockSize) {
          let bMin = 255, bMax = 0, hasSkin = false;
          for (let dy = 0; dy < blockSize; dy++) {
            for (let dx = 0; dx < blockSize; dx++) {
              const idx = (by+dy) * w + (bx+dx);
              const br = brightMap[idx];
              if (br < bMin) bMin = br;
              if (br > bMax) bMax = br;
              const pi = idx * 4;
              const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
              if (r > 80 && g > 40 && b > 20 && r > g && r > b) hasSkin = true;
            }
          }
          if (hasSkin) {
            contrastSum += (bMax - bMin);
            contrastCount++;
          }
        }
      }
      const localContrast = contrastCount > 0 ? contrastSum / contrastCount : 0;

      // --- Brightness variance in skin (smooth=水腫, textured=definition) ---
      let brightVarSum = 0, brightVarCnt = 0;
      for (let i = 0; i < n; i++) {
        const pi = i * 4;
        const r = pixels[pi], g = pixels[pi+1], b = pixels[pi+2];
        if (r > 80 && g > 40 && b > 20 && r > g && r > b && brightMap[i] > 50 && brightMap[i] < 230) {
          brightVarSum += Math.pow(brightMap[i] - avgBright, 2);
          brightVarCnt++;
        }
      }
      const skinBrightVar = brightVarCnt > 0 ? Math.sqrt(brightVarSum / brightVarCnt) : 0;

      // === Compute scores ===
      const brightnessScore = Math.min(100, (avgBright / 180) * 100);
      const rednessScore = Math.min(100, avgRedness * 300);
      const puffScore = Math.min(100, skinRatio * 200);
      const swellingIndex = Math.round(brightnessScore * 0.3 + rednessScore * 0.4 + puffScore * 0.3);
      const warmth = Math.round(((avgR - avgB) / 255) * 100 + 50);

      // Muscle definition: edge density in skin areas (0-100)
      // avgSkinEdge typically 5-50 range
      const definitionScore = Math.min(100, Math.round((avgSkinEdge / 35) * 100));

      // Pump score: local contrast + edge density (higher = more pumped/vascular)
      // localContrast typically 20-100
      const pumpRaw = (localContrast / 80) * 50 + (avgSkinEdge / 30) * 30 + (skinBrightVar / 40) * 20;
      const pumpScore = Math.min(100, Math.max(0, Math.round(pumpRaw)));

        // Belly: high brightness + low edge (smooth) + high skin ratio in mid region = water
        const midSmooth = Math.max(0, 1 - midRegion.avgEdge / 25);
        const midBright = midRegion.avgBright / 200;
        const midSkin = midRegion.skinRatio;
        waterScore = Math.min(100, Math.round((midSmooth * 40 + midBright * 30 + midSkin * 30) * 100));
      } else {
        // Face: puffiness = brightness + redness + skin smoothness
        const faceSmooth = Math.max(0, 1 - avgSkinEdge / 30);
        waterScore = Math.min(100, Math.round((faceSmooth * 30 + (avgBright/200) * 35 + skinRatio * 35) * 100));
      }

      // Flat vs pump label
      const pumpLabel = pumpScore > 65 ? '💪 Pump' : pumpScore > 40 ? '正常' : '😐 Flat';
      const defLabel = definitionScore > 60 ? '✨ 明顯' : definitionScore > 35 ? '普通' : '不明顯';
      const waterLabel = waterScore > 60 ? '💧 偏水' : waterScore > 35 ? '輕微' : '✅ 乾爽';

      resolve({
        brightness: Math.round(brightnessScore),
        redness: Math.round(rednessScore),
        swellingIndex: Math.min(100, swellingIndex),
        warmth: Math.min(100, Math.max(0, warmth)),
        skinRatio: Math.round(skinRatio * 100),
        definitionScore: Math.min(100, definitionScore),
        pumpScore,
        waterScore: Math.min(100, waterScore),
        pumpLabel,
        defLabel,
        waterLabel,
        type: type || 'face',
      });
    };
    img.src = dataUrl;
  });
};

function RecordPage({ data, updateData, selectedDate, setSelectedDate, saveStatus, setSaveStatus }) {
  const entry = data[selectedDate] || { drugs: {}, symptoms: {}, note: '' };
  const [drugs, setDrugs] = useState(entry.drugs);
  const [drugTimes, setDrugTimes] = useState(entry.drugTimes || {});
  const [symptoms, setSymptoms] = useState(() => normalizeSymptoms(entry.symptoms));
  const [activePeriod, setActivePeriod] = useState('allday');
  const [note, setNote] = useState(entry.note || '');
  const [facePhoto, setFacePhoto] = useState(null);
  const [bodyPhoto, setBodyPhoto] = useState(null);
  const [faceAnalysis, setFaceAnalysis] = useState(null);
  const [bodyAnalysis, setBodyAnalysis] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const faceInputRef = useRef(null);
  const bodyInputRef = useRef(null);

  useEffect(() => {
    const e = data[selectedDate] || { drugs: {}, symptoms: {}, note: '' };
    setDrugs(e.drugs || {});
    setDrugTimes(e.drugTimes || {});
    setSymptoms(normalizeSymptoms(e.symptoms));
    setActivePeriod('allday');
    setNote(e.note || '');
    setSaveStatus('');
    // Load photos for this date
    const fp = loadPhoto(selectedDate, 'face');
    const bp = loadPhoto(selectedDate, 'body');
    setFacePhoto(fp);
    setBodyPhoto(bp);
    setFaceAnalysis(null);
    setBodyAnalysis(null);
    // Auto-analyze if photos exist
    if (fp) analyzePhoto(fp, 'face').then(setFaceAnalysis);
    if (bp) analyzePhoto(bp, 'body').then(setBodyAnalysis);
  }, [selectedDate, data]);

  const changeDate = delta => {
    const d = parseDate(selectedDate);
    d.setDate(d.getDate() + delta);
    setSelectedDate(fmt(d));
  };

  const setDrug = (key, val) => setDrugs(prev => ({ ...prev, [key]: val }));
  const setDrugTime = (key, val) => setDrugTimes(prev => ({ ...prev, [key]: val }));
  const toggleSymptom = key => setSymptoms(prev => {
    const current = prev[activePeriod] || [];
    const updated = current.includes(key) ? current.filter(s => s !== key) : [...current, key];
    return { ...prev, [activePeriod]: updated };
  });

  const handlePhoto = async (e, type) => {
    const file = e.target.files[0];
    if (!file) return;
    setAnalyzing(true);
    try {
      const compressed = await compressImage(file, 480, 0.6);
      if (type === 'face') {
        setFacePhoto(compressed);
        savePhoto(selectedDate, 'face', compressed);
        const analysis = await analyzePhoto(compressed, 'face');
        setFaceAnalysis(analysis);
        // Save analysis in data
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].faceAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      } else {
        setBodyPhoto(compressed);
        savePhoto(selectedDate, 'body', compressed);
        const analysis = await analyzePhoto(compressed, 'body');
        setBodyAnalysis(analysis);
        const newData = { ...data };
        if (!newData[selectedDate]) newData[selectedDate] = { drugs: {}, symptoms: [], note: '' };
        newData[selectedDate].bodyAnalysis = analysis;
        newData[selectedDate].hasPhotos = true;
        updateData(newData);
      }
    } catch (err) { console.error('Photo error:', err); }
    setAnalyzing(false);
  };

  const removePhoto = (type) => {
    if (type === 'face') { setFacePhoto(null); setFaceAnalysis(null); savePhoto(selectedDate, 'face', null); }
    else { setBodyPhoto(null); setBodyAnalysis(null); savePhoto(selectedDate, 'body', null); }
    const newData = { ...data };
    if (newData[selectedDate]) {
      if (type === 'face') delete newData[selectedDate].faceAnalysis;
      else delete newData[selectedDate].bodyAnalysis;
      const hasFace = type === 'face' ? false : !!loadPhoto(selectedDate, 'face');
      const hasBody = type === 'body' ? false : !!loadPhoto(selectedDate, 'body');
      newData[selectedDate].hasPhotos = hasFace || hasBody;
      updateData(newData);
    }
  };

  const handleSave = () => {
    const cleanDrugs = {};
    Object.entries(drugs).forEach(([k, v]) => { if (v && parseFloat(v) > 0) cleanDrugs[k] = parseFloat(v); });
    const existing = data[selectedDate] || {};
    const hasAnySymptoms = Object.values(symptoms).some(arr => arr.length > 0);
    const cleanTimes = {};
    Object.entries(drugTimes).forEach(([k, v]) => { if (v && cleanDrugs[k]) cleanTimes[k] = v; });
    const newData = { ...data, [selectedDate]: { ...existing, drugs: cleanDrugs, drugTimes: cleanTimes, symptoms, note, updatedAt: new Date().toISOString() } };
    if (!hasAnySymptoms && !Object.keys(cleanDrugs).length && !note && !existing.hasPhotos) delete newData[selectedDate];
    updateData(newData);
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus(''), 1500);
  };

  const isToday = selectedDate === today();
  const dayOfWeek = ['日','一','二','三','四','五','六'][parseDate(selectedDate).getDay()];

  // Storage usage
  const storageBytes = useMemo(() => getStorageUsage(), [facePhoto, bodyPhoto, data]);
  const storageMB = (storageBytes / 1024 / 1024).toFixed(1);
  const storageWarn = storageBytes > 4 * 1024 * 1024;

  const MetricBar = ({ label, value, color }) => (
    <div className="metric-row">
      <span style={{color:'var(--text2)'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div className="metric-bar">
          <div className="metric-fill" style={{width:`${value}%`, background: color}} />
        </div>
        <span style={{minWidth:30,textAlign:'right',color}}>{value}</span>
      </div>
    </div>
  );

  const AnalysisCard = ({ title, analysis }) => {
    if (!analysis) return null;
    const level = analysis.swellingIndex < 30 ? '正常' : analysis.swellingIndex < 55 ? '輕微' : analysis.swellingIndex < 75 ? '偏高' : '明顯';
    const levelColor = analysis.swellingIndex < 30 ? 'var(--green)' : analysis.swellingIndex < 55 ? 'var(--blue)' : analysis.swellingIndex < 75 ? 'var(--orange)' : 'var(--red)';
    const pumpColor = (analysis.pumpScore||0) > 65 ? 'var(--green)' : (analysis.pumpScore||0) > 40 ? 'var(--blue)' : 'var(--orange)';
    const defColor = (analysis.definitionScore||0) > 60 ? 'var(--green)' : (analysis.definitionScore||0) > 35 ? 'var(--blue)' : 'var(--text2)';
    const waterColor = (analysis.waterScore||0) > 60 ? 'var(--red)' : (analysis.waterScore||0) > 35 ? 'var(--orange)' : 'var(--green)';
    const isBody = analysis.type === 'body' || title.includes('身');
    return (
      <div className="ai-card">
        <h3>🤖 {title} AI 分析</h3>
        {/* Main status badges */}
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:pumpColor}}>{analysis.pumpLabel || (analysis.pumpScore > 65 ? '💪 Pump' : analysis.pumpScore > 40 ? '正常' : '😐 Flat')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>充血狀態</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:waterColor}}>{analysis.waterLabel || (analysis.waterScore > 60 ? '💧 偏水' : analysis.waterScore > 35 ? '輕微' : '✅ 乾爽')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>{isBody ? '腹部水腫' : '臉部水腫'}</div>
          </div>
          <div style={{background:'var(--card2)',borderRadius:10,padding:'8px 14px',textAlign:'center',minWidth:80}}>
            <div style={{fontSize:'1.4em',fontWeight:700,color:defColor}}>{analysis.defLabel || (analysis.definitionScore > 60 ? '✨ 明顯' : analysis.definitionScore > 35 ? '普通' : '不明顯')}</div>
            <div style={{fontSize:'0.7em',color:'var(--text2)',marginTop:2}}>肌肉線條</div>
          </div>
        </div>
        {/* Detailed metrics */}
        <MetricBar label="💪 充血度 (Pump)" value={analysis.pumpScore||0} color={pumpColor} />
        <MetricBar label="📐 肌肉線條" value={analysis.definitionScore||0} color={defColor} />
        <MetricBar label="💧 水腫程度" value={analysis.waterScore||0} color={waterColor} />
        <MetricBar label="🔴 腫脹指數" value={analysis.swellingIndex} color={levelColor} />
        <MetricBar label="泛紅" value={analysis.redness} color="var(--red)" />
        <MetricBar label="亮度" value={analysis.brightness} color="var(--blue)" />
        <MetricBar label="色溫" value={analysis.warmth} color="var(--pink)" />
      </div>
    );
  };

  return (
    <div className="page">
      <div className="date-nav">
        <button onClick={() => changeDate(-1)}>◀ 前一天</button>
        <div className="date">{selectedDate.slice(5)} ({dayOfWeek}){isToday && ' 📍'}</div>
        <button onClick={() => changeDate(1)}>後一天 ▶</button>
      </div>

      {storageWarn && (
        <div className="storage-warn">⚠️ 儲存空間已用 {storageMB}MB，接近上限。建議匯出備份後清理舊照片。</div>
      )}

      <div className="card">
        <h3>📸 臉部 & 身材照</h3>
        <div className="photo-section">
          <div className="photo-slot">
            <h4>臉部</h4>
            <div className={`photo-frame ${facePhoto?'has-photo':''}`} onClick={() => !facePhoto && faceInputRef.current?.click()}>
              {facePhoto ? (
                <>
                  <img src={facePhoto} alt="臉部" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('face'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝臉部照</div>
                </div>
              )}
            </div>
            <input ref={faceInputRef} className="photo-input" type="file" accept="image/*" capture="user"
              onChange={e => handlePhoto(e, 'face')} />
          </div>
          <div className="photo-slot">
            <h4>身材</h4>
            <div className={`photo-frame ${bodyPhoto?'has-photo':''}`} onClick={() => !bodyPhoto && bodyInputRef.current?.click()}>
              {bodyPhoto ? (
                <>
                  <img src={bodyPhoto} alt="身材" />
                  <button className="remove-photo" onClick={e => { e.stopPropagation(); removePhoto('body'); }}>✕</button>
                </>
              ) : (
                <div className="placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  <div>點擊拍攝身材照</div>
                </div>
              )}
            </div>
            <input ref={bodyInputRef} className="photo-input" type="file" accept="image/*" capture="environment"
              onChange={e => handlePhoto(e, 'body')} />
          </div>
        </div>
        {analyzing && <p style={{textAlign:'center',color:'var(--purple)',marginTop:8,fontSize:'0.85em'}}>🔄 分析中...</p>}
        <p style={{fontSize:'0.72em',color:'var(--text2)',marginTop:8,textAlign:'center'}}>
          儲存空間：{storageMB} MB / ~5 MB
        </p>
      </div>

      {(faceAnalysis || bodyAnalysis) && (
        <>
          {faceAnalysis && <AnalysisCard title="臉部" analysis={faceAnalysis} />}
          {bodyAnalysis && <AnalysisCard title="身材" analysis={bodyAnalysis} />}
        </>
      )}

      <div className="card">
        <h3>💊 藥物劑量</h3>
        {DRUGS.map(d => (
          <div className="drug-row" key={d.key} style={{flexWrap:'wrap'}}>
            <div className="drug-label" style={{color: d.color}}>{d.label}</div>
            <input className="drug-input" type="number" step="any" placeholder="0"
              value={drugs[d.key] || ''} onChange={e => setDrug(d.key, e.target.value)}
              inputMode="decimal" style={{flex:'1 1 60px',minWidth:60}} />
            <div className="drug-unit">{d.unit}</div>
            <input type="time" value={drugTimes[d.key] || ''}
              onChange={e => setDrugTime(d.key, e.target.value)}
              style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',color:'var(--text)',fontSize:'0.82em',outline:'none',width:90,flexShrink:0}}
              placeholder="時間" />
            <button onClick={() => { const now = new Date(); setDrugTime(d.key, `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`); }}
              style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',color:'var(--blue)',fontSize:'0.75em',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>現在</button>
          </div>
        ))}
      </div>

      <div className="card">
        <h3>📋 症狀紀錄</h3>
        <div className="period-tabs">
          {TIME_PERIODS.map(p => {
            const count = (symptoms[p.key] || []).length;
            return (
              <button key={p.key} className={`period-tab ${activePeriod===p.key?'active':''}`}
                onClick={() => setActivePeriod(p.key)}>
                {p.label}
                {count > 0 && <span className="period-count">{count}</span>}
              </button>
            );
          })}
        </div>
        <div className="sym-grid">
          {SYMPTOMS.map(s => {
            const isActive = (symptoms[activePeriod] || []).includes(s.key);
            const inOtherPeriods = TIME_PERIODS.filter(p => p.key !== activePeriod && (symptoms[p.key] || []).includes(s.key)).map(p => p.label);
            return (
              <button key={s.key} className={`sym-btn ${s.type} ${isActive?'active':''}`}
                onClick={() => toggleSymptom(s.key)}>
                {s.label}
                {inOtherPeriods.length > 0 && <span className="sym-time-label">({inOtherPeriods.join('/')})</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div className="card">
        <h3>📝 備註</h3>
        <textarea className="note-input" placeholder="其他觀察、感受..."
          value={note} onChange={e => setNote(e.target.value)} />
      </div>

      <button className={`save-btn ${saveStatus}`} onClick={handleSave}>
        {saveStatus === 'saved' ? '✓ 已儲存' : '儲存紀錄'}
      </button>
    </div>
  );
}

function CalendarPage({ data, calMonth, setCalMonth, selectedDate, setSelectedDate, setTab }) {
  const [year, month] = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = today();

  const prevMonth = () => setCalMonth(month === 0 ? [year-1, 11] : [year, month-1]);
  const nextMonth = () => setCalMonth(month === 11 ? [year+1, 0] : [year, month+1]);

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) days.push(d);

  const clickDay = d => {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    setSelectedDate(dateStr);
    setTab('record');
  };

  return (
    <div className="page">
      <div className="cal-month">
        <button onClick={prevMonth}>◀</button>
        <div className="month-label">{year}年 {month+1}月</div>
        <button onClick={nextMonth}>▶</button>
      </div>
      <div className="cal-grid">
        {['日','一','二','三','四','五','六'].map(d => <div className="cal-header" key={d}>{d}</div>)}
        {days.map((d, i) => {
          if (!d) return <div className="cal-day empty" key={`e${i}`} />;
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const entry = data[dateStr];
          const hasDrugs = entry && Object.keys(entry.drugs || {}).length > 0;
          const allSyms = entry ? flattenSymptoms(entry.symptoms) : [];
          const hasSymptoms = allSyms.length > 0;
          const isToday = dateStr === todayStr;
          const isSel = dateStr === selectedDate;
          const negSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'negative');
          const posSymptoms = allSyms.filter(s => SYMPTOMS.find(x=>x.key===s)?.type === 'positive');
          return (
            <div className={`cal-day ${isToday?'today':''} ${isSel?'selected':''}`} key={d} onClick={() => clickDay(d)}>
              <div className="num">{d}</div>
              <div className="dots">
                {hasDrugs && <div className="dot" style={{background:'var(--blue)'}} />}
                {negSymptoms.length > 0 && <div className="dot" style={{background:'var(--red)'}} />}
                {posSymptoms.length > 0 && <div className="dot" style={{background:'var(--green)'}} />}
                {entry?.hasPhotos && <div className="dot" style={{background:'var(--purple)'}} />}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,display:'flex',gap:16,justifyContent:'center',fontSize:'0.78em',color:'var(--text2)'}}>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--blue)',marginRight:4,verticalAlign:'middle'}} />有用藥</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--red)',marginRight:4,verticalAlign:'middle'}} />有負面症狀</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--green)',marginRight:4,verticalAlign:'middle'}} />有正面反應</span>
        <span><span className="dot" style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--purple)',marginRight:4,verticalAlign:'middle'}} />有照片</span>
      </div>

      {/* Recent entries */}
      <div className="card" style={{marginTop:16}}>
        <h3>最近紀錄</h3>
        {Object.keys(data).sort().reverse().slice(0, 10).map(date => {
          const e = data[date];
          const drugStr = Object.entries(e.drugs||{}).map(([k,v]) => `${DRUGS.find(d=>d.key===k)?.label||k} ${v}${DRUGS.find(d=>d.key===k)?.unit||''}`).join(', ');
          const norm = normalizeSymptoms(e.symptoms);
          const allSyms = flattenSymptoms(e.symptoms);
          const symParts = [];
          TIME_PERIODS.forEach(p => {
            const syms = (norm[p.key] || []).map(s => SYMPTOMS.find(x=>x.key===s)?.label||s);
            if (syms.length) symParts.push(`${p.label}: ${syms.join(', ')}`);
          });
          const symStr = symParts.length > 1 ? symParts.join(' | ') : allSyms.map(s => SYMPTOMS.find(x=>x.key===s)?.label||s).join(', ');
          if (!drugStr && !symStr) return null;
          return (
            <div className="hist-item" key={date} onClick={() => { setSelectedDate(date); setTab('record'); }} style={{cursor:'pointer'}}>
              <div className="hist-date">{date} ({['日','一','二','三','四','五','六'][parseDate(date).getDay()]})</div>
              {drugStr && <div className="hist-drugs">💊 {drugStr}</div>}
              {symStr && <div className="hist-symptoms">📋 {symStr}</div>}
              {e.note && <div className="hist-note">📝 {e.note}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ChartPage({ data }) {
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chart1 = useRef(null);
  const chart2 = useRef(null);

  const sortedDates = useMemo(() => Object.keys(data).sort(), [data]);

  useEffect(() => {
    if (!sortedDates.length) return;

    // Weekly aggregation
    const weekly = {};
    sortedDates.forEach(date => {
      const d = parseDate(date);
      const weekStart = new Date(d);
      weekStart.setDate(d.getDate() - d.getDay());
      const wk = fmt(weekStart);
      if (!weekly[wk]) weekly[wk] = { drugs: {}, symptoms: {} };
      const entry = data[date];
      Object.entries(entry.drugs || {}).forEach(([k, v]) => {
        weekly[wk].drugs[k] = (weekly[wk].drugs[k] || 0) + v;
      });
      flattenSymptoms(entry.symptoms).forEach(s => {
        weekly[wk].symptoms[s] = (weekly[wk].symptoms[s] || 0) + 1;
      });
    });

    const weeks = Object.keys(weekly).sort();
    if (!weeks.length) return;

    // Drug chart
    if (chart1.current) chart1.current.destroy();
    chart1.current = new Chart(chartRef1.current, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: DRUGS.filter(d => weeks.some(w => weekly[w].drugs[d.key])).map(d => ({
          label: d.label,
          data: weeks.map(w => weekly[w].drugs[d.key] || 0),
          borderColor: d.color,
          backgroundColor: d.color + '15',
          fill: true, tension: 0.3, pointRadius: 2
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });

    // Symptom chart
    const negSymptoms = SYMPTOMS.filter(s => s.type === 'negative' && weeks.some(w => weekly[w].symptoms[s.key]));
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#6366f1','#a855f7','#f43f5e','#84cc16','#fb923c'];
    if (chart2.current) chart2.current.destroy();
    chart2.current = new Chart(chartRef2.current, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: negSymptoms.map((s, i) => ({
          label: s.label,
          data: weeks.map(w => weekly[w].symptoms[s.key] || 0),
          backgroundColor: (colors[i % colors.length]) + '88',
          borderColor: colors[i % colors.length],
          borderWidth: 1
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { stacked: true, ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { stacked: true, ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });

    return () => {
      if (chart1.current) chart1.current.destroy();
      if (chart2.current) chart2.current.destroy();
    };
  }, [data, sortedDates]);

  // Correlation analysis
  const correlations = useMemo(() => {
    if (sortedDates.length < 7) return null;
    const results = {};
    SYMPTOMS.filter(s => s.type === 'negative').forEach(sym => {
      const withDoses = {};
      const withoutDoses = {};
      DRUGS.forEach(drug => { withDoses[drug.key] = []; withoutDoses[drug.key] = []; });

      sortedDates.forEach((date, i) => {
        const entry = data[date];
        const hasSymptom = flattenSymptoms(entry.symptoms).includes(sym.key);
        // 3-day lookback
        DRUGS.forEach(drug => {
          let total = 0, count = 0;
          for (let j = Math.max(0, i-2); j <= i; j++) {
            const d2 = data[sortedDates[j]];
            total += (d2?.drugs?.[drug.key]) || 0;
            count++;
          }
          const avg = count ? total / count : 0;
          if (hasSymptom) withDoses[drug.key].push(avg);
          else withoutDoses[drug.key].push(avg);
        });
      });

      DRUGS.forEach(drug => {
        const w = withDoses[drug.key];
        const wo = withoutDoses[drug.key];
        if (w.length >= 2 && wo.length >= 2) {
          const wAvg = w.reduce((a,b)=>a+b,0)/w.length;
          const woAvg = wo.reduce((a,b)=>a+b,0)/wo.length;
          const diff = wAvg - woAvg;
          if (Math.abs(diff) > 0.5) {
            if (!results[sym.key]) results[sym.key] = { label: sym.label, drugs: [] };
            results[sym.key].drugs.push({
              drug: drug.label, diff: diff.toFixed(1), withAvg: wAvg.toFixed(1), withoutAvg: woAvg.toFixed(1), n: w.length
            });
          }
        }
      });
    });
    return results;
  }, [data, sortedDates]);

  const totalDays = sortedDates.length;

  return (
    <div className="page">
      <div className="card">
        <h3>📊 每週藥物劑量趨勢</h3>
        {totalDays < 3 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 3 天資料才能顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef1}></canvas></div>}
      </div>

      <div className="card">
        <h3>📊 每週負面症狀頻率</h3>
        {totalDays < 3 ? <p style={{color:'var(--text2)',fontSize:'0.9em'}}>需要至少 3 天資料才能顯示圖表</p> :
        <div className="chart-container"><canvas ref={chartRef2}></canvas></div>}
      </div>

      {correlations && Object.keys(correlations).length > 0 && (
        <div className="card">
          <h3>🔍 劑量與症狀關聯分析</h3>
          <p style={{color:'var(--text2)',fontSize:'0.8em',marginBottom:12}}>比較出現症狀時 vs 無症狀時，前3天的平均劑量差異</p>
          {Object.values(correlations).map(corr => (
            <div key={corr.label} style={{marginBottom:16}}>
              <div style={{fontWeight:600,color:'var(--orange)',marginBottom:6}}>{corr.label}</div>
              {corr.drugs.map(d => (
                <div key={d.drug} style={{fontSize:'0.85em',padding:'4px 0',display:'flex',justifyContent:'space-between'}}>
                  <span>{d.drug}</span>
                  <span style={{color: parseFloat(d.diff) > 0 ? 'var(--red)' : 'var(--green)'}}>
                    {parseFloat(d.diff) > 0 ? '↑' : '↓'} {d.diff} (有:{d.withAvg} vs 無:{d.withoutAvg}, n={d.n})
                  </span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Photo Comparison Timeline */}
      <PhotoTimeline data={data} sortedDates={sortedDates} />

      <div className="card">
        <h3>📈 統計摘要</h3>
        <div style={{fontSize:'0.88em'}}>
          <p>總紀錄天數：<b>{totalDays}</b></p>
          {totalDays > 0 && (
            <p>紀錄範圍：{sortedDates[0]} ~ {sortedDates[sortedDates.length-1]}</p>
          )}
          {DRUGS.map(drug => {
            const days = sortedDates.filter(d => data[d]?.drugs?.[drug.key]);
            const total = days.reduce((sum, d) => sum + (data[d].drugs[drug.key] || 0), 0);
            if (!days.length) return null;
            return <p key={drug.key} style={{color: drug.color}}>{drug.label}: {days.length}天, 平均 {(total/days.length).toFixed(1)}{drug.unit}/天</p>;
          })}
        </div>
      </div>
    </div>
  );
}

function PhotoTimeline({ data, sortedDates }) {
  const [compareType, setCompareType] = useState('face');
  const [compareDate1, setCompareDate1] = useState('');
  const [compareDate2, setCompareDate2] = useState('');
  const [comparePhoto1, setComparePhoto1] = useState(null);
  const [comparePhoto2, setComparePhoto2] = useState(null);

  const photoDates = useMemo(() => {
    return sortedDates.filter(d => data[d]?.hasPhotos);
  }, [data, sortedDates]);

  const [photos, setPhotos] = useState([]);

  useEffect(() => {
    const loaded = [];
    photoDates.slice(-20).forEach(date => {
      const photo = loadPhoto(date, compareType);
      if (photo) {
        loaded.push({ date, photo, analysis: compareType === 'face' ? data[date]?.faceAnalysis : data[date]?.bodyAnalysis });
      }
    });
    setPhotos(loaded);
    // Set default compare dates
    if (loaded.length >= 2 && !compareDate1) {
      setCompareDate1(loaded[0].date);
      setCompareDate2(loaded[loaded.length - 1].date);
    }
  }, [photoDates, compareType, data]);

  // Load compare photos when dates change
  useEffect(() => {
    if (compareDate1) {
      const p = loadPhoto(compareDate1, compareType);
      setComparePhoto1(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate1]?.faceAnalysis : data[compareDate1]?.bodyAnalysis } : null);
    }
    if (compareDate2) {
      const p = loadPhoto(compareDate2, compareType);
      setComparePhoto2(p ? { photo: p, analysis: compareType === 'face' ? data[compareDate2]?.faceAnalysis : data[compareDate2]?.bodyAnalysis } : null);
    }
  }, [compareDate1, compareDate2, compareType, data]);

  // Swelling trend chart
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!chartRef.current) return;
    const datesWithAnalysis = sortedDates.filter(d => data[d]?.faceAnalysis);
    if (datesWithAnalysis.length < 2) { if (chartInst.current) chartInst.current.destroy(); return; }

    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'line',
      data: {
        labels: datesWithAnalysis,
        datasets: [{
          label: '💪 充血度',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.pumpScore||0),
          borderColor: '#34d399',
          backgroundColor: '#34d39922',
          fill: false, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#34d399'
        }, {
          label: '📐 線條',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.definitionScore||0),
          borderColor: '#60a5fa',
          backgroundColor: '#60a5fa22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#60a5fa'
        }, {
          label: '💧 水腫',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.waterScore||0),
          borderColor: '#fb923c',
          backgroundColor: '#fb923c22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#fb923c'
        }, {
          label: '腫脹指數',
          data: datesWithAnalysis.map(d => data[d].faceAnalysis.swellingIndex),
          borderColor: '#a78bfa',
          backgroundColor: '#a78bfa22',
          fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#a78bfa', hidden: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#ccc', font: { size: 10 } } } },
        scales: {
          x: { ticks: { color: '#888', maxTicksLimit: 8 }, grid: { color: '#222' } },
          y: { min: 0, max: 100, ticks: { color: '#888' }, grid: { color: '#222' } }
        }
      }
    });
    return () => { if (chartInst.current) chartInst.current.destroy(); };
  }, [data, sortedDates]);

  if (!photoDates.length) {
    return (
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <p style={{color:'var(--text2)',fontSize:'0.85em'}}>尚無照片紀錄。在紀錄頁拍攝臉部或身材照，即可在此追蹤變化。</p>
      </div>
    );
  }

  return (
    <>
      <div className="ai-card">
        <h3>📸 照片對比時間軸</h3>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={`sym-btn ${compareType==='face'?'active':''}`}
            style={{background: compareType==='face'?'var(--purple)':'var(--card2)', color: compareType==='face'?'#fff':'var(--text2)', borderColor: compareType==='face'?'var(--purple)':'var(--border)'}}
            onClick={() => setCompareType('face')}>臉部</button>
          <button className={`sym-btn ${compareType==='body'?'active':''}`}
            style={{background: compareType==='body'?'var(--purple)':'var(--card2)', color: compareType==='body'?'#fff':'var(--text2)', borderColor: compareType==='body'?'var(--purple)':'var(--border)'}}
            onClick={() => setCompareType('body')}>身材</button>
        </div>
        {photos.length > 0 ? (
          <div className="compare-container">
            {photos.map(p => (
              <div className="compare-card" key={p.date}>
                <img src={p.photo} alt={p.date} />
                <div className="compare-date">{p.date.slice(5)}</div>
                {p.analysis && <div className="compare-score">{p.analysis.pumpLabel||''} | 線條:{p.analysis.definitionScore||0} | 水:{p.analysis.waterScore||0}</div>}
              </div>
            ))}
          </div>
        ) : (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>此類型尚無照片</p>
        )}
      </div>

      {/* Side-by-side comparison */}
      {photos.length >= 2 && (
        <div className="ai-card">
          <h3>🔍 兩日對比</h3>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <select value={compareDate1} onChange={e => setCompareDate1(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
            <span style={{color:'var(--text2)',alignSelf:'center'}}>vs</span>
            <select value={compareDate2} onChange={e => setCompareDate2(e.target.value)}
              style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px',color:'var(--text)',fontSize:'0.85em'}}>
              {photos.map(p => <option key={p.date} value={p.date}>{p.date}</option>)}
            </select>
          </div>
          <div style={{display:'flex',gap:8}}>
            {comparePhoto1 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto1.photo} alt={compareDate1} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate1}</div>
                {comparePhoto1.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto1.analysis.pumpLabel} | 線條:{comparePhoto1.analysis.definitionScore||0} | 水:{comparePhoto1.analysis.waterScore||0}</div>}
              </div>
            )}
            {comparePhoto2 && (
              <div style={{flex:1,textAlign:'center'}}>
                <img src={comparePhoto2.photo} alt={compareDate2} style={{width:'100%',borderRadius:10,border:'2px solid var(--border)'}} />
                <div style={{fontSize:'0.8em',color:'var(--text2)',marginTop:4}}>{compareDate2}</div>
                {comparePhoto2.analysis && <div style={{fontSize:'0.8em',color:'var(--purple)'}}>{comparePhoto2.analysis.pumpLabel} | 線條:{comparePhoto2.analysis.definitionScore||0} | 水:{comparePhoto2.analysis.waterScore||0}</div>}
              </div>
            )}
          </div>
          {comparePhoto1?.analysis && comparePhoto2?.analysis && (
            <div style={{marginTop:12,padding:10,background:'var(--card2)',borderRadius:8,fontSize:'0.82em'}}>
              <div style={{fontWeight:600,marginBottom:6,color:'var(--purple)'}}>差異分析</div>
              {['pumpScore','definitionScore','waterScore','swellingIndex','redness','warmth'].map(k => {
                const labels = {pumpScore:'💪 充血度',definitionScore:'📐 線條',waterScore:'💧 水腫',swellingIndex:'腫脹指數',redness:'泛紅',warmth:'色溫'};
                const diff = comparePhoto2.analysis[k] - comparePhoto1.analysis[k];
                return (
                  <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}>
                    <span style={{color:'var(--text2)'}}>{labels[k]}</span>
                    <span style={{color: diff > 5 ? 'var(--red)' : diff < -5 ? 'var(--green)' : 'var(--text2)'}}>
                      {diff > 0 ? '+' : ''}{diff} {diff > 5 ? '↑' : diff < -5 ? '↓' : '→'}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className="ai-card">
        <h3>🤖 臉部指數趨勢</h3>
        {sortedDates.filter(d => data[d]?.faceAnalysis).length < 2 ? (
          <p style={{color:'var(--text2)',fontSize:'0.85em'}}>需要至少 2 天的臉部照片才能顯示趨勢圖</p>
        ) : (
          <div className="chart-container"><canvas ref={chartRef}></canvas></div>
        )}
      </div>
    </>
  );
}

function MorePage({ data, updateData }) {
  const [importStatus, setImportStatus] = useState('');
  const fileRef = useRef(null);

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const dates = Object.keys(data).sort();
    let csv = 'Date,' + DRUGS.map(d=>d.label).join(',') + ',' + SYMPTOMS.map(s=>s.label).join(',') + ',Note\n';
    dates.forEach(date => {
      const e = data[date];
      const drugs = DRUGS.map(d => e.drugs?.[d.key] || '');
      const allSyms = flattenSymptoms(e.symptoms);
      const syms = SYMPTOMS.map(s => allSyms.includes(s.key) ? 1 : '');
      csv += `${date},${drugs.join(',')},${syms.join(',')},${(e.note||'').replace(/,/g,'；')}\n`;
    });
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `steroid_tracker_${today()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const importJSON = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        const merged = { ...data, ...imported };
        updateData(merged);
        setImportStatus(`✓ 匯入成功！合併後共 ${Object.keys(merged).length} 天紀錄`);
      } catch { setImportStatus('✗ 檔案格式錯誤'); }
    };
    reader.readAsText(file);
  };

  const clearAll = () => {
    if (window.confirm('確定要清除所有資料嗎？此操作無法復原！')) {
      updateData({});
    }
  };

  const totalDays = Object.keys(data).length;

  return (
    <div className="page">
      <div className="card">
        <h3>📤 匯出資料</h3>
        <button className="action-btn" onClick={exportJSON}>匯出 JSON（完整備份）</button>
        <button className="action-btn" onClick={exportCSV}>匯出 CSV（可用 Excel 開啟）</button>
      </div>

      <div className="card">
        <h3>📥 匯入資料</h3>
        <button className="action-btn" onClick={() => fileRef.current?.click()}>選擇 JSON 檔案匯入</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importJSON} />
        {importStatus && <p style={{marginTop:8,fontSize:'0.85em',color: importStatus.startsWith('✓') ? 'var(--green)' : 'var(--red)'}}>{importStatus}</p>}
      </div>

      <div className="card">
        <h3>ℹ️ 資料統計</h3>
        <p style={{fontSize:'0.9em'}}>
          目前共有 <b style={{color:'var(--blue)'}}>{totalDays}</b> 天紀錄<br/>
          資料儲存於瀏覽器本機，不會上傳至任何伺服器。<br/>
          建議定期匯出 JSON 備份。
        </p>
      </div>

      <div className="card">
        <h3>⚠️ 危險操作</h3>
        <button className="action-btn" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={clearAll}>清除所有資料</button>
      </div>

      <div className="card">
        <h3>📸 照片管理</h3>
        <button className="action-btn" onClick={() => {
          const photoKeys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('photo_')) photoKeys.push(key);
          }
          if (!photoKeys.length) { alert('沒有儲存的照片'); return; }
          const photos = {};
          photoKeys.forEach(k => photos[k] = localStorage.getItem(k));
          const blob = new Blob([JSON.stringify(photos)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `steroid_photos_${today()}.json`;
          a.click(); URL.revokeObjectURL(url);
        }}>匯出所有照片（JSON）</button>
        <button className="action-btn" onClick={() => {
          const input = document.createElement('input');
          input.type = 'file'; input.accept = '.json';
          input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
              try {
                const photos = JSON.parse(ev.target.result);
                let count = 0;
                Object.entries(photos).forEach(([k, v]) => {
                  if (k.startsWith('photo_')) { localStorage.setItem(k, v); count++; }
                });
                alert(`✓ 匯入 ${count} 張照片成功！`);
              } catch { alert('✗ 檔案格式錯誤'); }
            };
            reader.readAsText(file);
          };
          input.click();
        }}>匯入照片（JSON）</button>
        <button className="action-btn" style={{color:'var(--orange)',borderColor:'var(--orange)'}} onClick={() => {
          const photoKeys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('photo_')) photoKeys.push(key);
          }
          if (!photoKeys.length) { alert('沒有儲存的照片'); return; }
          if (window.confirm(`確定要刪除全部 ${photoKeys.length} 張照片嗎？`)) {
            photoKeys.forEach(k => localStorage.removeItem(k));
            alert('已清除所有照片');
          }
        }}>清除所有照片</button>
        <p style={{fontSize:'0.78em',color:'var(--text2)',marginTop:8}}>
          儲存空間使用：{(getStorageUsage() / 1024 / 1024).toFixed(1)} MB / ~5 MB
        </p>
      </div>

      <div className="card" style={{fontSize:'0.78em',color:'var(--text2)'}}>
        用藥追蹤 App v3.0<br/>
        本工具僅供個人紀錄用途，不構成醫療建議。
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
